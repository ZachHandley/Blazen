name: wasm-ci

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm32-check:
    name: cargo check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    env:
      # Workspace crates inherit the root `[workspace.lints.clippy]` deny gate
      # via CI; mirror that on the wasm32 check pass so any new warnings on
      # the wasm32 target fail the build.
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm32-check
          cache-on-failure: true

      - name: cargo check blazen-core (wasm32, no-default-features)
        run: cargo check --target wasm32-unknown-unknown -p blazen-core --no-default-features

      - name: cargo check blazen-memory (wasm32, no-default-features)
        run: cargo check --target wasm32-unknown-unknown -p blazen-memory --no-default-features

      - name: cargo check blazen-llm (wasm32, no-default-features, tsify)
        run: cargo check --target wasm32-unknown-unknown -p blazen-llm --no-default-features --features tsify

  wasm-sdk-build-test:
    name: blazen-wasm-sdk (wasm-pack build + node test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-sdk
          workspaces: |
            .
            crates/blazen-wasm-sdk
          cache-on-failure: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: wasm-pack build (--target web --release)
        working-directory: crates/blazen-wasm-sdk
        run: wasm-pack build --target web --release

      - name: wasm-pack test (--node --release)
        working-directory: crates/blazen-wasm-sdk
        run: wasm-pack test --node --release

  wasm-sdk-clippy:
    name: blazen-wasm-sdk clippy (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-sdk-clippy
          workspaces: |
            crates/blazen-wasm-sdk
          cache-on-failure: true

      - name: cargo clippy (wasm32)
        working-directory: crates/blazen-wasm-sdk
        # blazen-wasm-sdk is excluded from the workspace and uses its own
        # `[lints.clippy]` section (all=warn, pedantic=warn). We intentionally
        # omit `-D warnings` here so the job mirrors the crate's own lint
        # gate rather than the workspace's stricter deny gate.
        run: cargo clippy --target wasm32-unknown-unknown

  workers-vitest:
    name: cloudflare-worker vitest (workerd)
    runs-on: ubuntu-latest
    needs: wasm-sdk-build-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workers-vitest
          workspaces: |
            crates/blazen-wasm-sdk
          cache-on-failure: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: wasm-pack build (--target web --release)
        # The vitest test imports `crates/blazen-wasm-sdk/pkg/*` directly, so
        # we rebuild here to make this job self-contained (no cross-job
        # artifact handoff).
        working-directory: crates/blazen-wasm-sdk
        run: wasm-pack build --target web --release

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: examples/cloudflare-worker/pnpm-lock.yaml

      - name: pnpm install (ignore root workspace)
        # The example is intentionally not part of the root pnpm-workspace.yaml
        # (which lists `crates/blazen-node` and `website`), so install with
        # --ignore-workspace to use the example's own pnpm-lock.yaml.
        working-directory: examples/cloudflare-worker
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: pnpm test (vitest run)
        working-directory: examples/cloudflare-worker
        run: pnpm test
