[package]
name = "blazen"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Blazen - A Rust-native AI workflow engine with event-driven orchestration"
readme = "../../README.md"

[features]
default = ["llm"]
llm = ["blazen-llm"]
persist = ["blazen-persist", "blazen-core/persist"]
pipeline = ["blazen-pipeline"]
prompts = ["blazen-prompts"]
telemetry = ["blazen-telemetry", "blazen-core/telemetry"]
all = ["llm", "persist", "pipeline", "prompts", "telemetry"]
# Local inference (grouped by modality)
local-embeddings = ["blazen-llm/embed", "blazen-llm/candle-embed"]
local-llm = ["blazen-llm/mistralrs", "blazen-llm/llamacpp", "blazen-llm/candle-llm"]
local-image = ["blazen-llm/diffusion"]
# Modality-grouped local-audio toggle. Activates every functional audio
# backend (TTS: any-tts + OpenAI HTTP + Piper; STT: whisper.cpp + candle;
# music: MusicGen + AudioGen; codec: EnCodec + DAC). Renamed from the
# pre-PR-AUDIO `whispercpp`/`tts`/`candle-audio` aliases (still kept as
# deprecated forwarders on `blazen-llm` for one transition cycle).
local-audio = [
    "blazen-llm/audio-tts-anytts",
    "blazen-llm/audio-tts-openai",
    "blazen-llm/audio-tts-piper",
    "blazen-llm/audio-stt-whispercpp",
    "blazen-llm/audio-stt-candle",
    "blazen-llm/audio-music-musicgen",
    "blazen-llm/audio-music-audiogen",
    "blazen-llm/audio-codec-encodec",
    "blazen-llm/audio-codec-dac",
]
local-all = ["local-embeddings", "local-llm", "local-image", "local-audio"]

[dependencies]
blazen-events.workspace = true
blazen-macros.workspace = true
blazen-core.workspace = true
blazen-llm = { workspace = true, optional = true }
blazen-persist = { workspace = true, optional = true }
blazen-pipeline = { workspace = true, optional = true }
blazen-prompts = { workspace = true, optional = true }
blazen-telemetry = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tokio-stream.workspace = true
anyhow.workspace = true
dotenvy = "0.15"

[lints]
workspace = true
