[package]
name = "blazen"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Blazen - A Rust-native AI workflow engine with event-driven orchestration"

[features]
default = ["llm"]
llm = ["blazen-llm"]
persist = ["blazen-persist", "blazen-core/persist"]
pipeline = ["blazen-pipeline"]
prompts = ["blazen-prompts"]
telemetry = ["blazen-telemetry", "blazen-core/telemetry"]
all = ["llm", "persist", "pipeline", "prompts", "telemetry"]

[dependencies]
blazen-events.workspace = true
blazen-macros.workspace = true
blazen-core.workspace = true
blazen-llm = { workspace = true, optional = true }
blazen-persist = { workspace = true, optional = true }
blazen-pipeline = { workspace = true, optional = true }
blazen-prompts = { workspace = true, optional = true }
blazen-telemetry = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tokio-stream.workspace = true
anyhow.workspace = true
dotenvy = "0.15"

[lints]
workspace = true
