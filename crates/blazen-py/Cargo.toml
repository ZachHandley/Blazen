[package]
name = "blazen-py"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Python bindings for the Blazen workflow engine"

[lib]
name = "blazen"
crate-type = ["cdylib", "rlib"]
# pyo3's `extension-module` feature strips libpython link symbols; with that
# feature on, the empty default lib-test target fails to link. Disable the
# test target — there are no Rust unit tests in this crate (the Python-side
# tests live in `crates/blazen-py/python/tests/` and are run by uv/pytest).
test = false
doctest = false

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
blazen-controlplane = { workspace = true, optional = true }
blazen-core.workspace = true
blazen-embed-tract = { workspace = true, optional = true }
blazen-events.workspace = true
blazen-llm = { workspace = true, features = ["reqwest", "pyo3-serde"] }
blazen-manager = { workspace = true, features = ["hf-loader"] }
blazen-memory.workspace = true
blazen-memory-valkey = { workspace = true, features = ["redis-tcp", "upstash"] }
blazen-model-cache.workspace = true
blazen-peer = { workspace = true, features = ["server", "client", "http-transport"] }
blazen-persist = { workspace = true, features = ["redb", "valkey"] }
blazen-pipeline.workspace = true
blazen-prompts.workspace = true
blazen-telemetry = { workspace = true, features = ["history", "spans"] }
futures-core.workspace = true
bytes.workspace = true
chrono.workspace = true
futures-util.workspace = true
pyo3.workspace = true
pyo3-async-runtimes.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid.workspace = true
base64.workspace = true
pythonize = "0.28"
pyo3-stub-gen = "0.22"
pyo3-stub-gen-derive = "0.22"
blazen-train = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
blazen-3d = { version = "0.0.0-dev", path = "../blazen-3d", default-features = false, optional = true }

[features]
default = ["local-all"]
extension-module = ["pyo3/extension-module"]
# Local inference backends (feature-gated, populated per-phase)
embed = ["blazen-llm/embed"]
candle-embed = ["blazen-llm/candle-embed"]
mistralrs = ["blazen-llm/mistralrs"]
llamacpp = ["blazen-llm/llamacpp"]
candle-llm = ["blazen-llm/candle-llm"]
diffusion = ["blazen-llm/diffusion"]
whispercpp = ["blazen-llm/whispercpp"]
tts = ["blazen-llm/tts"]
audio-music-stable-audio = ["blazen-llm/audio-music-stable-audio"]
audio-stt-whisper-streaming = ["blazen-llm/audio-stt-whisper-streaming"]
audio-tts-bark = ["blazen-llm/audio-tts-bark"]
audio-tts-f5 = ["blazen-llm/audio-tts-f5"]
audio-vc-rvc = ["blazen-llm/audio-vc-rvc"]
# 3D-pipeline bridge surface (HTTP-proxy backend forwards to upstream 3D services).
threed = ["blazen-llm/threed", "dep:blazen-3d"]
threed-compat-proxy = ["threed", "blazen-llm/threed-compat-proxy", "blazen-3d/compat-proxy"]
tiktoken = ["blazen-llm/tiktoken"]
# Pure-Rust ONNX embedding backend (musl/WASM-friendly alternative to fastembed).
tract = ["dep:blazen-embed-tract"]
# ORT-backed embedding backend (faster than tract on x86_64/aarch64 where ORT
# ships prebuilts; target-gated optional dep so musl builds skip it).
fastembed = ["blazen-llm/embed", "dep:blazen-embed-fastembed"]
local-all = ["embed", "fastembed", "tract", "candle-embed", "mistralrs", "llamacpp", "candle-llm", "diffusion", "whispercpp", "tts", "tiktoken", "distributed", "otlp", "prometheus", "langfuse", "audio-music-stable-audio", "training"]
# Telemetry exporters
otlp = ["blazen-telemetry/otlp"]
prometheus = ["blazen-telemetry/prometheus"]
langfuse = ["blazen-telemetry/langfuse"]
# Distributed workflow types (RemoteWorkflowRequest/Response, PeerClient ABC)
# and the control-plane orchestrator/worker bindings.
distributed = [
    "blazen-core/distributed",
    "blazen-peer/server",
    "blazen-peer/client",
    "dep:blazen-controlplane",
    "blazen-controlplane/client",
    "blazen-controlplane/server",
    "blazen-controlplane/model-client",
    "dep:tonic",
]
blazen-embed-fastembed = ["dep:blazen-embed-fastembed"]
# Local LoRA fine-tuning via `ModelManager.train_lora`. Pulls in
# `blazen-train` (engine + interop with blazen-llm error type) plus
# `tokenizers` for the `JsonlDataset` Python wrapper that loads a
# tokenizer.json from disk.
training = [
    "dep:blazen-train",
    "blazen-train/engine",
    "blazen-train/blazen-llm-interop",
    "dep:tokenizers",
    "dep:candle-core",
    "blazen-manager/training",
]
[lints]
workspace = true

[[example]]
name = "stub_gen"
path = "examples/stub_gen.rs"

[target.'cfg(unix)'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }

[target.'cfg(not(target_env = "musl"))'.dependencies]
blazen-embed-fastembed = { workspace = true, optional = true }
