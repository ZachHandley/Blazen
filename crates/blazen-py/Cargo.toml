[package]
name = "blazen-py"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Python bindings for the Blazen workflow engine"

[lib]
name = "blazen"
crate-type = ["cdylib", "rlib"]

[dependencies]
async-trait.workspace = true
blazen-core.workspace = true
blazen-events.workspace = true
blazen-llm = { workspace = true, features = ["reqwest", "pyo3-serde"] }
blazen-memory.workspace = true
blazen-memory-valkey.workspace = true
blazen-prompts.workspace = true
chrono.workspace = true
pyo3.workspace = true
pyo3-async-runtimes.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
base64.workspace = true
pythonize = "0.28"
pyo3-stub-gen = "0.21"
pyo3-stub-gen-derive = "0.21"

[features]
default = []
extension-module = ["pyo3/extension-module"]
# Local inference backends (feature-gated, populated per-phase)
fastembed = ["blazen-llm/fastembed"]
candle-embed = ["blazen-llm/candle-embed"]
mistralrs = ["blazen-llm/mistralrs"]
llamacpp = ["blazen-llm/llamacpp"]
candle-llm = ["blazen-llm/candle-llm"]
diffusion = ["blazen-llm/diffusion"]
whispercpp = ["blazen-llm/whispercpp"]
piper = ["blazen-llm/piper"]
local-all = ["fastembed", "candle-embed", "mistralrs", "llamacpp", "candle-llm", "diffusion", "whispercpp", "piper"]

[lints]
workspace = true

[[example]]
name = "stub_gen"
path = "examples/stub_gen.rs"
