[package]
name = "blazen-py"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Python bindings for the Blazen workflow engine"

[lib]
name = "blazen"
crate-type = ["cdylib", "rlib"]
# pyo3's `extension-module` feature strips libpython link symbols; with that
# feature on, the empty default lib-test target fails to link. Disable the
# test target — there are no Rust unit tests in this crate (the Python-side
# tests live in `crates/blazen-py/python/tests/` and are run by uv/pytest).
test = false
doctest = false

[dependencies]
async-trait.workspace = true
blazen-core.workspace = true
blazen-embed-tract = { workspace = true, optional = true }
blazen-events.workspace = true
blazen-llm = { workspace = true, features = ["reqwest", "pyo3-serde"] }
blazen-manager.workspace = true
blazen-memory.workspace = true
blazen-memory-valkey.workspace = true
blazen-model-cache.workspace = true
blazen-peer = { workspace = true, features = ["server", "client"] }
blazen-persist = { workspace = true, features = ["redb", "valkey"] }
blazen-pipeline.workspace = true
blazen-prompts.workspace = true
blazen-telemetry = { workspace = true, features = ["history", "spans"] }
chrono.workspace = true
pyo3.workspace = true
pyo3-async-runtimes.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid.workspace = true
base64.workspace = true
pythonize = "0.28"
pyo3-stub-gen = "0.22"
pyo3-stub-gen-derive = "0.22"

[features]
default = ["local-all"]
extension-module = ["pyo3/extension-module"]
# Local inference backends (feature-gated, populated per-phase)
embed = ["blazen-llm/embed"]
candle-embed = ["blazen-llm/candle-embed"]
mistralrs = ["blazen-llm/mistralrs"]
llamacpp = ["blazen-llm/llamacpp"]
candle-llm = ["blazen-llm/candle-llm"]
diffusion = ["blazen-llm/diffusion"]
whispercpp = ["blazen-llm/whispercpp"]
piper = ["blazen-llm/piper"]
tiktoken = ["blazen-llm/tiktoken"]
# Pure-Rust ONNX embedding backend (musl/WASM-friendly alternative to fastembed).
tract = ["dep:blazen-embed-tract"]
local-all = ["embed", "candle-embed", "mistralrs", "llamacpp", "candle-llm", "diffusion", "whispercpp", "piper"]
# Telemetry exporters
otlp = ["blazen-telemetry/otlp"]
prometheus = ["blazen-telemetry/prometheus"]
# Distributed workflow types (RemoteWorkflowRequest/Response, PeerClient ABC)
distributed = ["blazen-core/distributed", "blazen-peer/server", "blazen-peer/client"]

[lints]
workspace = true

[[example]]
name = "stub_gen"
path = "examples/stub_gen.rs"

[target.'cfg(unix)'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }
