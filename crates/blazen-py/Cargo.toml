[package]
name = "blazen-py"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Python bindings for the Blazen workflow engine"

[lib]
name = "blazen"
crate-type = ["cdylib"]

[dependencies]
async-trait.workspace = true
blazen-core.workspace = true
blazen-events.workspace = true
blazen-llm = { workspace = true, features = ["reqwest", "pyo3-serde"] }
blazen-memory.workspace = true
blazen-memory-valkey.workspace = true
blazen-prompts.workspace = true
chrono.workspace = true
pyo3 = { workspace = true, features = ["extension-module"] }
pyo3-async-runtimes.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
base64.workspace = true
pythonize = "0.28"
pyo3-stub-gen = "0.20"
pyo3-stub-gen-derive = "0.20"

[lints]
workspace = true

[[bin]]
name = "stub_gen"
path = "src/bin/stub_gen.rs"
