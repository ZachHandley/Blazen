language = "C"
cpp_compat = true
pragma_once = true
include_guard = "BLAZEN_H"
no_includes = false
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]

# Auto-generated banner; cbindgen prepends this verbatim.
header = "/* Auto-generated by blazen-cabi build.rs. DO NOT EDIT. Run `cargo build -p blazen-cabi --release` to regenerate. */"

# Every exported symbol is already namespaced with `blazen_` at the Rust source
# layer. We do NOT set `prefix = \"BLAZEN\"` here because that would prepend the
# prefix again to enum tags / type names that already say Blazen*.
style = "type"
documentation = true
documentation_style = "doxy"
line_length = 100
tab_width = 4

[parse]
parse_deps = false
# We intentionally do NOT parse blazen-uniffi — its types are not in the
# cabi C surface. Anything we want to expose, we re-declare via opaque
# newtype structs in `crates/blazen-cabi/src/`.

[export]
# Limit to symbols defined in this crate (extern "C" fns + #[repr(C)] types).
prefix = ""
item_types = ["enums", "structs", "opaque", "functions", "constants", "globals", "typedefs"]

[fn]
prefix = ""

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[const]
allow_static_const = true
