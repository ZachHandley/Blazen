[package]
name = "blazen-uniffi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Multi-language bindings (Go, Swift, Kotlin, Ruby) for the Blazen workflow engine via Mozilla UniFFI"

[lib]
name = "blazen_uniffi"
# cdylib  — dynamic linking for Kotlin JNI on linux/macos, Ruby native ext
# staticlib — static linking for Go cgo, Swift XCFramework, Ruby fat-gem when desired
# rlib    — lets us run cargo tests against the crate
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
async-trait.workspace = true
blazen-core.workspace = true
blazen-embed-tract = { workspace = true, optional = true }
blazen-events.workspace = true
blazen-llm = { workspace = true, features = ["reqwest"] }
blazen-manager.workspace = true
blazen-memory.workspace = true
blazen-memory-valkey = { workspace = true, features = ["redis-tcp", "upstash"] }
blazen-model-cache.workspace = true
blazen-controlplane = { workspace = true, optional = true, features = ["client", "model-client"] }
blazen-peer = { workspace = true, features = ["server", "client", "http-transport"] }
blazen-persist = { workspace = true, features = ["redb", "valkey"] }
blazen-pipeline.workspace = true
blazen-prompts.workspace = true
blazen-telemetry = { workspace = true, features = ["history", "spans"] }
bytes.workspace = true
chrono.workspace = true
futures-util.workspace = true
parking_lot = "0.12"
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uniffi = { workspace = true, features = ["cli"] }
uuid.workspace = true
blazen-train = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }
base64.workspace = true
tonic = { workspace = true, optional = true, features = ["tls-aws-lc"] }
blazen-3d = { version = "0.0.0-dev", path = "../blazen-3d", default-features = false, optional = true }
blazen-audio-tts = { workspace = true, optional = true }
blazen-audio-stt = { workspace = true, optional = true }
image = { version = "0.25.10", default-features = false, features = ["png", "jpeg"], optional = true }

[build-dependencies]
uniffi_build.workspace = true

[features]
# Match blazen-py's feature graph so all four UniFFI bindings (Go/Swift/Kotlin/Ruby)
# get the same surface as the Python bindings. See crates/blazen-py/Cargo.toml.
default = ["local-all"]

# Local inference backends
embed = ["blazen-llm/embed"]
candle-embed = ["blazen-llm/candle-embed"]
mistralrs = ["blazen-llm/mistralrs"]
llamacpp = ["blazen-llm/llamacpp"]
candle-llm = ["blazen-llm/candle-llm"]
diffusion = ["blazen-llm/diffusion"]
whispercpp = ["blazen-llm/whispercpp"]
tts = ["blazen-llm/tts"]
tiktoken = ["blazen-llm/tiktoken"]
tract = ["blazen-llm/embed-tract", "dep:blazen-embed-tract"]
# ORT-backed embedding backend (faster than tract on x86_64/aarch64 where ORT
# ships prebuilts; target-gated optional dep so musl builds skip it).
fastembed = ["blazen-llm/embed", "blazen-llm/embed-fastembed", "dep:blazen-embed-fastembed"]

# Hugging Face metadata-backed loader powering `UniffiModelManager::load_from_hf`.
# Forwards to `blazen-manager/hf-loader`.
hf-loader = ["blazen-manager/hf-loader"]

# Local LoRA fine-tuning via `UniffiModelManager::train_lora`. Pulls in
# `blazen-train` (engine + interop with blazen-llm error type) and the
# matching `training` arm of `blazen-manager`.
training = [
    "dep:blazen-train",
    "blazen-train/engine",
    "blazen-train/blazen-llm-interop",
    "dep:tokenizers",
    "dep:candle-core",
    "blazen-manager/training",
]

local-all = [
    "embed",
    "fastembed",
    "tract",
    "candle-embed",
    "mistralrs",
    "llamacpp",
    "candle-llm",
    "diffusion",
    "whispercpp",
    "tts",
    "audio-tts-piper",
    # NC-licensed audio providers: included so a prebuilt
    # libblazen_uniffi.a exposes every symbol the foreign bindings
    # generated by scripts/regen-bindings.sh reference. Without these
    # the Go/Kotlin/Ruby cgo/JNA/FFI link fails with "undefined
    # reference to uniffi_blazen_uniffi_fn_*_<provider>" for the
    # corresponding factories. Runtime NC enforcement is via
    # warn_nc_once on first use, not compile-time exclusion.
    "audio-tts-spark",
    "audio-tts-bark",
    "audio-tts-f5",
    "audio-stt-faster-whisper",
    "audio-stt-whisper-streaming",
    "triposr",
    "threed-compat-proxy",
    "audio-music-stable-audio",
    "audio-music-musicgen",
    "audio-music-audiogen",
    "audio-vc-rvc",
    "tiktoken",
    "distributed",
    "otlp",
    "otlp-http",
    "prometheus",
    "langfuse",
    "hf-loader",
    "training",
]

# Stable Audio (latent diffusion text-to-music).
audio-music-stable-audio = ["blazen-llm/audio-music-stable-audio", "dep:candle-core"]
# MusicGen native text-to-music (Meta, candle port).
audio-music-musicgen = ["blazen-llm/audio-music-musicgen", "dep:candle-core"]
# AudioGen native text-to-SFX (Meta, candle port; shares the MusicGen LM head).
audio-music-audiogen = ["blazen-llm/audio-music-audiogen", "dep:candle-core"]
audio-stt-whisper-streaming = ["blazen-llm/audio-stt-whisper-streaming"]
audio-stt-faster-whisper = ["blazen-llm/audio-stt-faster-whisper", "dep:blazen-audio-stt", "blazen-audio-stt/faster-whisper"]
audio-tts-bark = ["blazen-llm/audio-tts-bark"]
audio-tts-f5 = ["blazen-llm/audio-tts-f5"]
audio-tts-piper = ["blazen-llm/audio-tts-piper", "dep:blazen-audio-tts", "blazen-audio-tts/piper"]
audio-tts-spark = ["blazen-llm/audio-tts-spark", "dep:blazen-audio-tts", "blazen-audio-tts/spark-tts"]
audio-vc = ["blazen-llm/audio-vc"]
audio-vc-rvc = ["audio-vc", "blazen-llm/audio-vc-rvc", "dep:candle-core"]

# 3D-pipeline bridge surface (HTTP-proxy backend forwards to upstream 3D services).
# `threed` pulls in the bridge surface through `blazen-llm` plus the
# `blazen-3d` crate that owns the four capability traits.
# `threed-compat-proxy` additionally enables the `Compat3dProvider`
# HTTP-proxy backend in `blazen-3d` so the UniFFI bindings can expose it.
threed = ["blazen-llm/threed", "dep:blazen-3d"]
threed-compat-proxy = [
    "threed",
    "blazen-llm/threed-compat-proxy",
    "blazen-3d/compat-proxy",
]
# Native TripoSR single-image-to-3D backend (candle-based; downloads
# weights from Hugging Face). Forwards into the `blazen-llm/triposr`
# bridge feature.
triposr = [
    "threed",
    "blazen-llm/triposr",
    "blazen-3d/triposr",
    "dep:image",
]

# Telemetry exporters
otlp = ["blazen-telemetry/otlp"]
otlp-http = ["blazen-telemetry/otlp-http"]
prometheus = ["blazen-telemetry/prometheus"]
langfuse = ["blazen-telemetry/langfuse"]

# Distributed peer types (RemoteWorkflowRequest/Response, PeerClient, PeerServer)
# plus control-plane orchestrator/worker types (ControlPlaneClient, ControlPlaneWorker).
distributed = [
    "blazen-core/distributed",
    "blazen-peer/server",
    "blazen-peer/client",
    "dep:blazen-controlplane",
    "dep:tonic",
]
blazen-embed-fastembed = ["dep:blazen-embed-fastembed"]

[lints]
workspace = true

[target.'cfg(unix)'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }

[target.'cfg(not(target_env = "musl"))'.dependencies]
blazen-embed-fastembed = { workspace = true, optional = true }
