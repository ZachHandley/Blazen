[package]
name = "blazen-llm"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "LLM provider abstraction layer for the Blazen workflow engine"
build = "build.rs"

[build-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[features]
default = ["content-detect"]
reqwest = ["dep:reqwest"]
tiktoken = ["dep:tiktoken-rs"]
# Magic-number-based file-type detection for the content store. Adds the
# `infer` dependency. Disable for footprint-sensitive embedded targets;
# detection then falls back to extension + MIME hints.
content-detect = ["dep:infer"]
tsify = ["dep:tsify-next", "dep:wasm-bindgen"]
pyo3-serde = ["dep:pythonize", "dep:pyo3"]
# Local inference backends (populated per-phase as crates land)
embed = ["dep:blazen-embed"]      # Phase 2: local embeddings via blazen-embed facade
candle-embed = ["dep:blazen-embed-candle"]   # Phase 6: local embeddings via candle
mistralrs = ["dep:blazen-llm-mistralrs"]      # Phase 3: local LLM via mistral.rs
llamacpp = ["dep:blazen-llm-llamacpp"]       # Phase 8: local LLM via llama.cpp
# External-engine proxy: vLLM server over its OpenAI-compatible HTTP surface
# plus runtime LoRA mount/unmount endpoints. Pulls in `reqwest` because the
# bridge in backends/vllm.rs drives the SSE response stream directly.
vllm = ["dep:blazen-llm-vllm", "dep:reqwest"]
# External-engine proxy: Ollama server over its native HTTP surface
# (/api/generate, /api/chat, /api/embeddings, /api/tags, /api/show, /api/pull,
# /api/create, /api/delete). Adapter mounting uses /api/create with a Modelfile
# `ADAPTER` directive. Pulls in `reqwest` because the bridge in
# backends/ollama.rs drives the NDJSON response stream directly.
ollama = ["dep:blazen-llm-ollama", "dep:reqwest"]
# External-engine proxy: llama.cpp's `llama-server` HTTP binary over its
# OpenAI-compat surface + native /completion, /slots, /health, and
# /lora-adapters endpoints (runtime adapter toggle, not load — adapters
# must be preloaded at startup via the --lora CLI flag). Distinct from
# `llamacpp` above which links the in-process llama-cpp-sys-2 runtime.
# Pulls in `reqwest` because the bridge in backends/llamacpp_server.rs
# drives the SSE response stream directly.
llamacpp-server = ["dep:blazen-llm-llamacpp-server", "dep:reqwest"]
# External-engine proxy: HuggingFace Text Generation Inference (TGI) server.
# Supports both the native /generate + /generate_stream (SSE) surface and the
# OpenAI-compatible /v1/chat/completions + /v1/completions + /v1/models surface
# (TGI ≥ 1.4). Adapters must be preloaded at server startup via
# `--lora-adapters <id1> <id2> ...` and selected per-request via `adapter_id`.
# Pulls in `reqwest` because the bridge in backends/tgi.rs drives the SSE
# response stream directly.
tgi = ["dep:blazen-llm-tgi", "dep:reqwest"]
candle-llm = ["dep:blazen-llm-candle"]     # Phase 7: local LLM via candle
diffusion = ["dep:blazen-image-diffusion"]      # Phase 5: bridge + types only (no native runtime)
# Forwarding activator: pull the diffusion-rs runtime so the bridge actually
# runs generation instead of returning EngineNotAvailable. Split from
# `diffusion` so workspace consumers can opt into the bridge surface (e.g.
# for tests / type stubs) without paying the multi-GB native dep cost. GPU
# acceleration is opt-in via `diffusion-rs` directly in the binary crate --
# see the comment block in `crates/blazen-image-diffusion/Cargo.toml`.
diffusion-engine = ["diffusion", "blazen-image-diffusion/engine"]

# ---------------------------------------------------------------------------
# Audio bridges (PR-AUDIO restructure)
# ---------------------------------------------------------------------------
# Canonical feature names. Each `audio-*` feature activates the matching
# blazen-audio-* crate at the bridge level; backend-specific sub-features
# (e.g. `audio-stt-whispercpp`) forward into the engine crate's own feature
# flag to actually link the backend.

# Text-to-speech bridge surface (DynTtsProvider impl of AudioGeneration).
audio-tts          = ["dep:blazen-audio", "dep:blazen-audio-tts"]
audio-tts-anytts   = ["audio-tts", "blazen-audio-tts/anytts"]
audio-tts-openai   = ["audio-tts", "blazen-audio-tts/openai"]
audio-tts-piper    = ["audio-tts", "blazen-audio-tts/piper"]
audio-tts-bark     = ["audio-tts", "blazen-audio-tts/bark"]
audio-tts-f5       = ["audio-tts", "blazen-audio-tts/f5-tts"]
audio-tts-spark    = ["audio-tts", "blazen-audio-tts/spark-tts"]

# Speech-to-text bridge surface (DynSttProvider impl of Transcription).
audio-stt          = ["dep:blazen-audio", "dep:blazen-audio-stt"]
audio-stt-whispercpp = ["audio-stt", "blazen-audio-stt/whispercpp"]
audio-stt-candle   = ["audio-stt", "blazen-audio-stt/candle"]
# Defaults the VAD runtime to `vad-ort` (ONNX Runtime) for the native
# targets this is built for; musl/wasm consumers wanting the streaming
# backend would instead select `blazen-audio-stt/vad-tract` (pure-Rust).
audio-stt-whisper-streaming = ["audio-stt", "blazen-audio-stt/whisper-streaming", "blazen-audio-stt/vad-ort"]
audio-stt-faster-whisper = ["audio-stt", "blazen-audio-stt/faster-whisper"]

# Music / SFX bridge surface (DynMusicProvider impl of AudioGeneration).
audio-music        = ["dep:blazen-audio", "dep:blazen-audio-music", "dep:candle-core"]
audio-music-musicgen = ["audio-music", "blazen-audio-music/musicgen"]
audio-music-audiogen = ["audio-music", "blazen-audio-music/audiogen"]
audio-music-stable-audio = ["audio-music", "blazen-audio-music/stable-audio"]

# Neural audio codec bridge surface (DynCodecProvider impl of Codec).
audio-codec        = ["dep:blazen-audio", "dep:blazen-audio-codec"]
audio-codec-encodec = ["audio-codec", "blazen-audio-codec/encodec"]
audio-codec-dac    = ["audio-codec", "blazen-audio-codec/dac"]

# Voice-conversion bridge surface (speaker-transform engines: RVC, ...).
audio-vc          = ["dep:blazen-audio", "dep:blazen-audio-vc"]
audio-vc-rvc      = ["audio-vc", "blazen-audio-vc/rvc"]

# ---------------------------------------------------------------------------
# Backwards-compat aliases (deprecated — slated for removal in 2 releases).
# Kept so existing downstream Cargo manifests continue to build during the
# restructure transition window.
# ---------------------------------------------------------------------------
whispercpp     = ["audio-stt-whispercpp"]
piper          = ["audio-tts-piper"]
tts            = ["audio-tts-anytts"]
candle-audio   = ["audio-music-musicgen"]
# `lmstudio` enables the LM Studio HTTP-proxy backend. Adds the
# `blazen-llm-lmstudio` crate and `reqwest` so the trait-impl bridge in
# backends/lmstudio.rs drives the SSE response stream directly.
lmstudio = ["dep:blazen-llm-lmstudio", "dep:reqwest"]

# 3D-pipeline bridge surface (texturizer/rigger/refiner/animator capability
# traits live in `blazen-3d`). `threed-compat-proxy` enables the HTTP proxy
# backend `Compat3dProvider` for forwarding multipart requests to upstream
# 3D services.
threed              = ["dep:blazen-3d"]
threed-compat-proxy = ["threed", "blazen-3d/compat-proxy"]
# Native `TripoSR` single-image-to-3D backend. Pulls in the `triposr`
# feature on `blazen-3d` (which itself activates the candle runtime and
# `blazen-3d-core` primitives), the `image` crate (PNG + JPEG decode
# only -- no need for the full image-format zoo) to convert the
# `ThreeDRequest::image_url` payload into raw RGB, and `reqwest` to
# fetch the image bytes from HTTP / HTTPS / data: URIs. The trait
# bridge lives at `src/backends/triposr.rs` and is gated on this
# feature.
triposr = ["threed", "blazen-3d/triposr", "dep:image", "dep:reqwest", "dep:candle-core"]
# Direct-typed fastembed (ORT) backend for the concrete `FastembedProvider`
# class in `providers/concrete/embed.rs`. Pulls in the
# `blazen-embed-fastembed` crate directly (rather than going through the
# `blazen-embed` facade) so the provider can name the concrete
# `FastEmbedModel` inner type. Only links on ORT-supported targets — see
# the `blazen-embed/Cargo.toml` target-cfg matrix.
embed-fastembed = ["dep:blazen-embed-fastembed"]
# Direct-typed tract (pure-Rust ONNX) backend for the concrete
# `TractEmbedProvider` class in `providers/concrete/embed.rs`. Pulls in
# `blazen-embed-tract` directly so the provider can name the concrete
# `TractEmbedModel` inner type. Pure-Rust, builds on every target.
embed-tract = ["dep:blazen-embed-tract"]

[dependencies]
blazen-events.workspace = true
async-trait.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { version = "1", default-features = false, features = ["sync", "macros"] }
tokio-util = { workspace = true, features = ["io"] }
futures-util.workspace = true
futures-core.workspace = true
tracing.workspace = true
bytes.workspace = true
chrono.workspace = true
reqwest = { workspace = true, optional = true }
tiktoken-rs = { version = "0.11", optional = true }
tsify-next = { version = "0.5", features = ["js", "json"], optional = true }
wasm-bindgen = { version = "=0.2.122", optional = true }
pythonize = { version = "0.28", optional = true }
pyo3 = { version = "0.28", optional = true }
base64 = { workspace = true }
infer = { workspace = true, optional = true }
uuid.workspace = true
blazen-embed = { workspace = true, optional = true }
blazen-llm-mistralrs = { workspace = true, optional = true }
blazen-embed-candle = { workspace = true, optional = true }
blazen-image-diffusion = { workspace = true, optional = true }
blazen-llm-candle = { workspace = true, optional = true }
blazen-llm-llamacpp = { workspace = true, optional = true }
blazen-llm-vllm = { workspace = true, optional = true }
blazen-audio-tts = { workspace = true, optional = true }
blazen-audio = { workspace = true, optional = true }
blazen-audio-stt = { workspace = true, optional = true }
blazen-audio-music = { workspace = true, optional = true }
blazen-audio-codec = { workspace = true, optional = true }
blazen-llm-ollama = { workspace = true, optional = true }
blazen-llm-llamacpp-server = { workspace = true, optional = true }
blazen-llm-tgi = { workspace = true, optional = true }
blazen-llm-lmstudio = { workspace = true, optional = true }
blazen-audio-vc = { workspace = true, optional = true }
blazen-3d = { version = "0.0.0-dev", path = "../blazen-3d", optional = true }
image = { version = "0.25.10", default-features = false, features = ["jpeg", "png"], optional = true }
candle-core = { workspace = true, optional = true }
blazen-embed-fastembed = { workspace = true, optional = true }
blazen-embed-tract = { workspace = true, optional = true }

# Timer/runtime features only on native targets (mio doesn't support any wasm32 target)
[target.'cfg(not(any(target_os = "wasi", target_arch = "wasm32")))'.dependencies]
tokio = { version = "1", default-features = false, features = ["rt", "time", "fs", "io-util"] }

# Browser WASM only (not WASIp2 -- WASIp2 has no JS runtime).
# `web-sys`, `uuid["js"]`, and `getrandom["js"]` all transitively pull
# `wasm-bindgen`, which the wasi build cannot satisfy (no JS shim host),
# so they live in the browser-only block.
[target.'cfg(all(target_arch = "wasm32", not(target_os = "wasi")))'.dependencies]
wasm-bindgen = "=0.2.122"
wasm-bindgen-futures = "=0.4.72"
js-sys = "0.3.99"
web-sys = { version = "0.3.99", features = [
    "Request",
    "RequestInit",
    "Response",
    "Headers",
    "Window",
    "ReadableStream",
    "ReadableStreamDefaultReader",
] }
uuid = { workspace = true, features = ["js"] }
getrandom = { version = "0.4", features = ["wasm_js"] }

# Cross-wasm32 deps (browser + wasi). web-time transparently re-exports
# std::time on native/wasi and uses Performance.now() in the browser; the
# source unconditionally imports `web_time::Instant` under cfg(wasm32) so
# both wasm flavors must pull the dep. web-time does NOT pull wasm-bindgen.
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1"

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
