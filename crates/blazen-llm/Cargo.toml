[package]
name = "blazen-llm"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "LLM provider abstraction layer for the Blazen workflow engine"

[features]
default = []
reqwest = ["dep:reqwest"]
tiktoken = ["dep:tiktoken-rs"]

[dependencies]
blazen-events.workspace = true
async-trait.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { version = "1", default-features = false, features = ["sync", "macros"] }
futures-util.workspace = true
tracing.workspace = true
bytes.workspace = true
chrono.workspace = true
reqwest = { workspace = true, optional = true }
tiktoken-rs = { version = "0.9", optional = true }

# Timer/runtime features only on native targets (mio doesn't support any wasm32 target)
[target.'cfg(not(any(target_os = "wasi", target_arch = "wasm32")))'.dependencies]
tokio = { version = "1", default-features = false, features = ["rt", "time"] }

# Browser WASM only (not WASIp2 -- WASIp2 has no JS runtime)
[target.'cfg(all(target_arch = "wasm32", not(target_os = "wasi")))'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Request",
    "RequestInit",
    "Response",
    "Headers",
    "Window",
    "ReadableStream",
    "ReadableStreamDefaultReader",
] }

[lints]
workspace = true
