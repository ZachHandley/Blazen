[package]
name = "blazen-llm"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "LLM provider abstraction layer for the Blazen workflow engine"

[features]
default = []
openai = ["reqwest"]
anthropic = ["reqwest"]
gemini = ["reqwest"]
fal = ["reqwest"]
azure = ["reqwest"]
all-providers = ["openai", "anthropic", "gemini", "fal", "azure"]
tiktoken = ["dep:tiktoken-rs"]

[dependencies]
blazen-events.workspace = true
async-trait.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { version = "1", default-features = false, features = ["sync", "macros", "rt", "time"] }
futures-util.workspace = true
tracing.workspace = true
bytes.workspace = true
chrono.workspace = true
reqwest = { workspace = true, optional = true }
tiktoken-rs = { version = "0.9", optional = true }

[lints]
workspace = true
