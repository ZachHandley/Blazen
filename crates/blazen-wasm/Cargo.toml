[package]
name = "blazen-wasm"
version = "0.0.0-dev"
edition = "2024"
license = "MPL-2.0"
authors = ["Zach Handley <zachhandley@gmail.com>"]
description = "Blazen WASM component for ZLayer deployment"
rust-version = "1.91"

[lib]
crate-type = ["cdylib"]

[dependencies]
blazen-llm = { version = "0.0.0-dev", path = "../blazen-llm", default-features = false }
async-trait = "0.1"
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wit-bindgen = "0.36"
futures-util = "0.3"

[package.metadata.component]
package = "blazen:handler"

[lints.rust]
unsafe_code = "allow"
unsafe_op_in_unsafe_fn = "allow"
dead_code = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# WIT-generated code triggers these — not fixable
same_length_and_capacity = "allow"
