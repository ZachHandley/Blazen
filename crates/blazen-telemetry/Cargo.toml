[package]
name = "blazen-telemetry"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Observability and telemetry for Blazen workflows"

[dependencies]
# Always needed
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tokio = { version = "1", default-features = false, features = ["sync", "macros"] }

# For TracingCompletionModel + wasi OTLP/Langfuse `Arc<dyn HttpClient>` plumbing.
blazen-llm = { workspace = true, optional = true }
blazen-events = { workspace = true }
async-trait = { workspace = true }
futures-util = { workspace = true }

# OTLP (feature-gated)
opentelemetry = { version = "0.31", optional = true }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.31", default-features = false, optional = true }
opentelemetry-http = { version = "0.31", default-features = false, optional = true }
tracing-opentelemetry = { version = "0.32", optional = true }
http = { version = "1.1", default-features = false, features = ["std"], optional = true }
bytes = { workspace = true, optional = true }

# Prometheus (feature-gated)
metrics = { version = "0.24", optional = true, package = "metrics" }
metrics-exporter-prometheus = { version = "0.18", features = ["http-listener"], optional = true }

# Base64 used by the wasi langfuse dispatcher to build the `Authorization:
# Basic ...` header by hand (reqwest's `basic_auth` helper is unavailable on
# wasi). Optional + only pulled in by the `langfuse` feature.
base64 = { workspace = true, optional = true }

# Reqwest is the HTTP client for native langfuse and the native otlp-http
# transport. On non-wasi wasm32 we ship a `web_sys::fetch`-backed HttpClient
# instead; on wasi we ship a `blazen_llm::http::HttpClient`-backed one.
# `reqwest` is kept as an unconditional optional dep so the `dep:reqwest`
# feature activator works on every target — source-level `cfg(not(target_os
# = "wasi"))` gates ensure it's never actually used on wasi.
reqwest = { workspace = true, optional = true }

# Browser-only (`wasm32-unknown-unknown`): web-sys + wasm-bindgen primitives
# for the fetch-backed `HttpClient` used by the OTLP HTTP exporter, and
# `spawn_local` for the langfuse dispatcher. Excluded on wasi (no DOM /
# wasm-bindgen ABI on wasi).
[target.'cfg(all(target_arch = "wasm32", not(target_os = "wasi")))'.dependencies]
wasm-bindgen = { version = "=0.2.118", optional = true }
wasm-bindgen-futures = { version = "=0.4.68", optional = true }
js-sys = { version = "=0.3.95", optional = true }
web-sys = { version = "=0.3.95", optional = true, features = [
    "Request",
    "RequestInit",
    "Response",
    "Headers",
    "Window",
] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", default-features = false, features = ["rt", "rt-multi-thread", "time"] }

# Wasi (`wasm32-wasip1*`): the napi-rs wasi runtime ships a tokio runtime, so
# the langfuse dispatcher uses `tokio::spawn`. We need the `rt` feature for
# `tokio::runtime::Handle::try_current` + `Handle::spawn`.
[target.'cfg(target_os = "wasi")'.dependencies]
tokio = { version = "1", default-features = false, features = ["rt"] }

[features]
default = ["spans"]
spans = ["dep:blazen-llm"]
history = []
otlp = ["dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "opentelemetry-otlp/grpc-tonic", "opentelemetry-otlp/trace", "opentelemetry-otlp/internal-logs", "dep:tracing-opentelemetry"]
# Note: `otlp-http` deliberately does NOT pull `opentelemetry-otlp/reqwest-blocking-client`
# (or `reqwest-client`). On wasm32 those reqwest-backed `HttpClient`s are `!Send`,
# which violates the trait's `Send + Sync` bound. Instead this crate provides its
# own `HttpClient` impls: `ReqwestHttpClient` on native (thin wrapper around
# `reqwest::Client`), `WasmFetchHttpClient` on browser wasm32 (`web_sys::fetch`-
# backed), and `WasiFetchHttpClient` on wasi (`Arc<dyn blazen_llm::HttpClient>`-
# backed via the napi-rs `setDefaultHttpClient` host hook).
otlp-http = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-http",
    "opentelemetry-otlp/http-proto",
    "opentelemetry-otlp/trace",
    "opentelemetry-otlp/internal-logs",
    "dep:tracing-opentelemetry",
    "dep:reqwest",
    "dep:http",
    "dep:bytes",
    "dep:wasm-bindgen",
    "dep:wasm-bindgen-futures",
    "dep:js-sys",
    "dep:web-sys",
    "dep:blazen-llm",
]
prometheus = ["dep:metrics", "dep:metrics-exporter-prometheus"]
# `wasm-bindgen-futures` is pulled in on browser wasm32 so the dispatcher
# background task can be spawned via `spawn_local` (no tokio time driver
# there). On wasi we use `tokio::spawn` instead. `blazen-llm` is pulled in
# unconditionally so the wasi dispatcher can route requests through
# `Arc<dyn blazen_llm::HttpClient>` (host-registered fetch client). `base64`
# is used by the wasi dispatcher for manual Basic-auth header construction.
langfuse = [
    "dep:reqwest",
    "dep:wasm-bindgen-futures",
    "dep:blazen-llm",
    "dep:base64",
]
all = ["spans", "history", "otlp", "otlp-http", "prometheus", "langfuse"]

[lints]
workspace = true
