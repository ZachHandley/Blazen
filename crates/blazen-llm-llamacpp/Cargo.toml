[package]
name = "blazen-llm-llamacpp"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Local LLM backend for Blazen using llama.cpp inference engine"

[dependencies]
# llama-cpp = { version = "...", optional = true }  -- commented until Phase 8
blazen-model-cache = { workspace = true }
serde = { workspace = true }
serde_json.workspace = true
tokio = { workspace = true }
tracing.workspace = true
thiserror = { workspace = true }

[features]
default = ["cpu"]
# Intended feature flags for Phase 8 when the llama-cpp dep is added:
#   engine   = ["dep:llama-cpp"]
#   cpu      = ["engine"]
#   cuda     = ["engine", "llama-cpp/cuda"]
#   metal    = ["engine", "llama-cpp/metal"]
#   vulkan   = ["engine", "llama-cpp/vulkan"]
#   rocm     = ["engine", "llama-cpp/rocm"]
#
# For now, these are no-op feature flags that exist so that downstream crates
# can already declare their feature mappings without breaking.
engine = []
cpu = ["engine"]
cuda = ["engine"]
metal = ["engine"]
vulkan = ["engine"]
rocm = ["engine"]

[lints]
workspace = true
