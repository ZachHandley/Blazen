[package]
name = "blazen-audio-stt"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Multi-backend speech-to-text engine crate for Blazen (whisper.cpp, candle)"

[dependencies]
async-trait.workspace = true
blazen-audio.workspace = true
blazen-model-cache = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
ct2rs = { version = "0.9.18", features = ["whisper"], optional = true }
futures-core.workspace = true
futures-util.workspace = true
hf-hub = { workspace = true, features = ["ureq"], optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
tokenizers = { workspace = true, optional = true }
tokio = { workspace = true, features = ["fs", "macros", "rt", "sync"] }
tracing.workspace = true
tract-onnx = { workspace = true, optional = true }
# whisper-rs with default-features = false compiles on all platforms (CPU-only).
# Platform-specific acceleration is opt-in via `cuda`, `metal`, `coreml` features
# below, which are intentionally NO-OP at the library level â€” see the
# `cuda`/`metal`/`coreml` feature comments.
whisper-rs = { version = "0.16", default-features = false, optional = true }

[features]
default = []

# `live-models` gates integration tests that download real model weights
# from HuggingFace on first run (~75 MB for whisper-tiny). Off by default
# so `cargo test` stays hermetic; enable explicitly in CI/local runs that
# can tolerate the network + disk cost.
live-models = []

# ---- Backend feature gates ----
#
# `whispercpp` enables the whisper.cpp-backed SttBackend implementation in
# `src/backends/whispercpp.rs`. It pulls in the `whisper-rs` Rust bindings
# (CPU-only by default â€” see the platform-specific features below) and
# `blazen-model-cache` for GGML model downloads.
whispercpp = ["dep:whisper-rs", "dep:blazen-model-cache"]

# `candle` enables the Candle-backed Whisper SttBackend in
# `src/backends/candle.rs`. Pulls in `candle-core`, `candle-nn`,
# `candle-transformers` (which provides the Whisper model), `tokenizers`
# (the HuggingFace Whisper tokenizer), and `hf-hub` (for downloading the
# `openai/whisper-*` HuggingFace repos).
#
# Basic transcription only; LoRA adapter support is deferred to PR-WL (#38).
candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:hf-hub",
]

# ---- Platform-specific acceleration features ----
#
# `cuda`, `metal`, `coreml` are intentionally NO-OP flags at the library
# level for the whisper.cpp backend. Cargo features cannot be gated on
# `cfg()` targets, and `--all-features` must pass on every platform.
# Activating `whisper-rs/metal` on Linux or `whisper-rs/cuda` without an
# NVIDIA GPU / CUDA toolkit causes hard compile errors from the whisper.cpp
# build system.
#
# To enable GPU acceleration for whisper.cpp, add `whisper-rs` as a direct
# dependency in your **binary crate** with the desired features:
#
#   [dependencies]
#   whisper-rs = { version = "0.16", default-features = false, features = ["cuda"] }
#
# Cargo's feature unification will merge them with the `whispercpp` dep
# here. The Candle backend selects the device via the `device` field on
# `CandleWhisperConfig` (`Device::Cpu`, `Device::new_cuda(idx)`, or
# `Device::new_metal(idx)`).
cuda = ["whispercpp"]
metal = ["whispercpp"]
coreml = ["whispercpp"]

# `whisper-streaming` enables the low-latency streaming Whisper backend in
# `src/backends/whisper_streaming.rs`. It builds on the Candle Whisper
# weights (`candle` feature) and uses `tract-onnx` to run the Silero VAD
# ONNX model that chunks incoming audio into utterance windows. Implements
# [`SttBackend::stream`]; the file-based `transcribe` returns `Unsupported`
# (callers should route to the `candle` backend for blocking transcription).
whisper-streaming = ["candle", "dep:tract-onnx"]

# `faster-whisper` enables the CTranslate2-backed Whisper SttBackend in
# `src/backends/faster_whisper/`. Pulls in `ct2rs` (Rust bindings to
# CTranslate2) with its `whisper` sub-feature, which in turn vendors and
# compiles CTranslate2's C++ source on the first build (~5â€“10 min cold,
# fast on incremental rebuilds). See `crates/blazen-audio-stt/README.md`
# for system requirements (cmake â‰Ą 3.18, C++ toolchain, optional
# CUDA/MKL/OpenBLAS/Accelerate for acceleration).
faster-whisper = ["dep:ct2rs", "dep:hf-hub", "dep:blazen-model-cache"]

[lints]
workspace = true

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
