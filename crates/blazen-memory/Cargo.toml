[package]
name = "blazen-memory"
version = "0.0.0-dev"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Memory and vector store for Blazen with ELID integration"

[features]
default = ["jsonl"]
jsonl = []

[dependencies]
blazen-llm.workspace = true
elid = { version = "0.4.3", default-features = false, features = ["embeddings"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
tokio = { version = "1", default-features = false, features = ["sync"] }
tracing = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

# tokio/fs is needed for the JSONL backend (not available on WASM)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", default-features = false, features = ["fs"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
futures-util = { workspace = true }
tempfile = "3"

[lints]
workspace = true
