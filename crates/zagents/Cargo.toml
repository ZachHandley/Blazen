[package]
name = "zagents"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = ["llm"]
llm = ["zagents-llm"]
persist = ["zagents-persist"]
openai = ["llm", "zagents-llm/openai"]
anthropic = ["llm", "zagents-llm/anthropic"]
all = ["openai", "anthropic", "persist"]

[dependencies]
zagents-events.workspace = true
zagents-macros.workspace = true
zagents-core.workspace = true
zagents-llm = { workspace = true, optional = true }
zagents-persist = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tokio-stream.workspace = true
anyhow.workspace = true

[lints]
workspace = true
