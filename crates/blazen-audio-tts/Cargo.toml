[package]
name = "blazen-audio-tts"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Local text-to-speech backend for Blazen using any-tts (Kokoro-82M, VibeVoice, Qwen3-TTS)"

[dependencies]
blazen-model-cache = { workspace = true }
serde = { workspace = true }
serde_json.workspace = true
tokio = { workspace = true }
tracing.workspace = true
thiserror = { workspace = true }
any-tts = { version = "0.1.2", default-features = false, features = ["kokoro", "vibevoice", "qwen3-tts", "download"], optional = true }

[features]
default = []
# `engine` activates the underlying any-tts crate; without it the provider
# compiles as a stub and synthesis surfaces `EngineNotAvailable`.
engine = ["dep:any-tts"]

[lints]
workspace = true
