[package]
name = "blazen-pipeline"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Multi-workflow pipeline orchestration for Blazen"

[dependencies]
blazen-core.workspace = true
blazen-events.workspace = true
blazen-llm.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { version = "1", default-features = false, features = ["sync", "macros", "rt", "time"] }
tokio-stream = { version = "0.1", default-features = false, features = ["sync"] }
chrono.workspace = true
uuid.workspace = true
indexmap.workspace = true
tracing.workspace = true
futures-util.workspace = true
thiserror.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", default-features = false, features = ["rt-multi-thread"] }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tokio-stream.workspace = true
anyhow.workspace = true

[lints]
workspace = true
