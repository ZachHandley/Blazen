[package]
name = "blazen-peer"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Distributed workflow execution peer for Blazen — gRPC server + client over tonic"

[dependencies]
postcard = { workspace = true, features = ["alloc"] }
blazen-core = { workspace = true }
blazen-events = { workspace = true }
blazen-llm = { workspace = true, optional = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_bytes = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

# Native-only transport stack. tonic / rustls / tokio["full"] do not build
# for wasm32-wasi*; the `http-transport` feature provides a pure-HTTP
# alternative for those targets that only needs `blazen-llm::HttpClient`.
[target.'cfg(not(any(target_os = "wasi", target_arch = "wasm32")))'.dependencies]
tonic = { workspace = true, features = ["tls-aws-lc"] }
tonic-prost = { workspace = true }
prost = { workspace = true }
rustls = { workspace = true, features = ["aws-lc-rs"] }
tokio-rustls = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

# Proto codegen depends on a native compiler stack (protoc / prost). Skip
# it on wasm targets — the `pb` module is itself cfg-gated to native.
[target.'cfg(not(any(target_os = "wasi", target_arch = "wasm32")))'.build-dependencies]
tonic-prost-build = { workspace = true }

[features]
default = ["server", "client"]
server = []
client = []
http-transport = ["dep:blazen-llm"]

[lints]
workspace = true
