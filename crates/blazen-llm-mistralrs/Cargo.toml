[package]
name = "blazen-llm-mistralrs"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Local LLM backend for Blazen using mistral.rs inference engine"

[dependencies]
blazen-model-cache = { workspace = true }
async-trait.workspace = true
tokio = { workspace = true }
serde = { workspace = true }
serde_json.workspace = true
tracing.workspace = true
thiserror.workspace = true
futures-util.workspace = true
tokio-stream.workspace = true
anyhow.workspace = true

# mistralrs with default-features = false compiles on all platforms (CPU-only).
# Platform-specific acceleration is opt-in via `cuda`, `metal`, etc. features.
mistralrs = { version = "0.8.1", optional = true, default-features = false }

# Image decoding for vision message inputs. Only needed when the `engine`
# feature is active, since mistral.rs consumes `image::DynamicImage` values
# for multimodal requests.
image = { version = "0.25", optional = true, default-features = false, features = [
    "jpeg",
    "png",
    "gif",
    "webp",
    "bmp",
    "tiff",
    "ico",
] }
base64 = { workspace = true, optional = true }

[features]
default = []
engine = ["dep:mistralrs", "dep:image", "dep:base64"]

# Platform-specific acceleration features.
#
# `cuda`, `metal`, `accelerate`, and `mkl` are intentionally NO-OP marker
# flags at this library level -- they exist so `cargo --all-features` doesn't
# break on every platform and so downstream binary crates know which features
# to enable directly on `mistralrs` (where activating e.g. `mistralrs/metal`
# on Linux or `mistralrs/cuda` without an NVIDIA GPU is a hard compile error
# from candle's backend guards). To actually turn one on, declare `mistralrs`
# as a direct dependency in your **binary crate** with the desired feature
# and Cargo's feature unification will merge it with the `engine` dep here:
#
#   [dependencies]
#   mistralrs = { version = "0.8.1", default-features = false, features = ["cuda"] }
#
# `flash-attn`, by contrast, IS a real forwarder: enabling it activates
# `mistralrs/flash-attn`, which builds FlashAttention-2 kernels via nvcc at
# compile time. Requirements:
#   - CUDA toolkit >= 11.8
#   - GPU compute capability >= 8.0 (Ampere or newer; Hopper / Ada also work)
#   - Turing (sm_75) GPUs cannot compile flash-attn -- fall back to eager
#     attention by leaving this feature off.
cuda = ["engine"]
metal = ["engine"]
accelerate = ["engine"]
mkl = ["engine"]
flash-attn = ["cuda", "mistralrs/flash-attn"]

[lints]
workspace = true
