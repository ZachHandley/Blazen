[package]
name = "blazen-wasm-sdk"
version = "0.0.0-dev"
edition = "2024"
license = "MPL-2.0"
authors = ["Zach Handley <zachhandley@gmail.com>"]
repository = "https://github.com/ZachHandley/Blazen"
rust-version = "1.91"
description = "Blazen SDK for TypeScript/JavaScript via WebAssembly"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
blazen-core = { version = "0.0.0-dev", path = "../blazen-core", default-features = false, features = ["distributed"] }
blazen-embed-tract = { version = "0.0.0-dev", path = "../blazen-embed-tract" }
blazen-events = { version = "0.0.0-dev", path = "../blazen-events", features = ["tsify"] }
blazen-llm = { version = "0.0.0-dev", path = "../blazen-llm", default-features = false, features = ["tsify"] }
blazen-memory = { version = "0.0.0-dev", path = "../blazen-memory", default-features = false }
blazen-memory-valkey = { version = "0.0.0-dev", path = "../blazen-memory-valkey", default-features = false, features = ["upstash"] }
elid = { version = "0.4.3", default-features = false, features = ["embeddings"] }
blazen-prompts = { version = "0.0.0-dev", path = "../blazen-prompts", default-features = false }
blazen-pipeline = { version = "0.0.0-dev", path = "../blazen-pipeline", default-features = false }
blazen-manager = { version = "0.0.0-dev", path = "../blazen-manager", default-features = false }
blazen-telemetry = { version = "0.0.0-dev", path = "../blazen-telemetry", default-features = false, features = ["history", "otlp-http", "langfuse"] }
blazen-peer = { version = "0.0.0-dev", path = "../blazen-peer", default-features = false, features = ["client", "http-transport"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry", "std"] }
tsify-next = { version = "0.5", features = ["js", "json"] }
wasm-bindgen = "=0.2.118"
wasm-bindgen-futures = "=0.4.68"
js-sys = "=0.3.95"
web-sys = { version = "=0.3.95", features = [
    "ReadableStream",
    "ReadableStreamDefaultController",
    "ReadableStreamDefaultReader",
    "ReadableStreamReadResult",
    "QueuingStrategy",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "=0.6.5"
console_error_panic_hook = "0.1"
async-trait = "0.1"
futures-util = "0.3"
tokio = { version = "1", default-features = false, features = ["sync"] }
bytes = "1"
chrono = { version = "0.4", default-features = false, features = ["serde", "wasmbind", "clock"] }
uuid = { version = "1", default-features = false, features = ["v4", "serde"] }

[features]
default = []
# Bundled tiktoken-rs BPE counter (~8 MB embedded BPE tables added to the
# wasm bundle). Off by default because that bundle-size cost is unacceptable
# for a default browser delivery. Opt in by building this crate with
# `wasm-pack build --features tiktoken` -- intended for the separate
# `@blazen-dev/sdk-tiktoken` npm package whose only difference from the main
# `@blazen-dev/sdk` package is this feature being enabled. Browser callers
# who don't bundle tiktoken can plug their own JS tokeniser through the
# always-on `TokenCounter` JS-callback class in `tokens.rs` instead.
tiktoken = ["blazen-llm/tiktoken"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
uuid = { version = "1", features = ["js"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "=0.3.68"

[lints.rust]
# unsafe impl Send/Sync is required for WASM single-threaded interop
unsafe_code = "allow"
dead_code = "warn"

[lints.clippy]
all = "warn"
pedantic = "warn"
