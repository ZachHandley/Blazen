[package]
name = "blazen-wasm-sdk"
version = "0.0.0-dev"
edition = "2024"
license = "AGPL-3.0-or-later"
authors = ["Zach Handley <zachhandley@gmail.com>"]
repository = "https://github.com/ZachHandley/Blazen"
rust-version = "1.85"
description = "Blazen SDK for TypeScript/JavaScript via WebAssembly"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
blazen-llm = { version = "0.0.0-dev", path = "../blazen-llm", default-features = false, features = ["openai", "reqwest"] }
blazen-core = { version = "0.0.0-dev", path = "../blazen-core", default-features = false }
blazen-events = { version = "0.0.0-dev", path = "../blazen-events" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
async-trait = "0.1"
futures-util = "0.3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
uuid = { version = "1", features = ["v4", "js"] }

[lints.rust]
# unsafe impl Send/Sync is required for WASM single-threaded interop
unsafe_code = "allow"
dead_code = "warn"

[lints.clippy]
all = "warn"
pedantic = "warn"
