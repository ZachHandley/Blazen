[package]
name = "blazen-wasm-sdk"
version = "0.0.0-dev"
edition = "2024"
license = "MPL-2.0"
authors = ["Zach Handley <zachhandley@gmail.com>"]
repository = "https://github.com/ZachHandley/Blazen"
rust-version = "1.91"
description = "Blazen SDK for TypeScript/JavaScript via WebAssembly"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
blazen-core = { version = "0.0.0-dev", path = "../blazen-core", default-features = false, features = ["distributed"] }
blazen-embed-tract = { version = "0.0.0-dev", path = "../blazen-embed-tract" }
blazen-events = { version = "0.0.0-dev", path = "../blazen-events", features = ["tsify"] }
blazen-llm = { version = "0.0.0-dev", path = "../blazen-llm", default-features = false, features = ["tsify"] }
blazen-memory = { version = "0.0.0-dev", path = "../blazen-memory", default-features = false }
blazen-memory-valkey = { version = "0.0.0-dev", path = "../blazen-memory-valkey", default-features = false, features = ["upstash"] }
elid = { version = "0.4.51", default-features = false, features = ["embeddings"] }
blazen-prompts = { version = "0.0.0-dev", path = "../blazen-prompts", default-features = false }
blazen-pipeline = { version = "0.0.0-dev", path = "../blazen-pipeline", default-features = false }
blazen-manager = { version = "0.0.0-dev", path = "../blazen-manager", default-features = false }
blazen-telemetry = { version = "0.0.0-dev", path = "../blazen-telemetry", default-features = false, features = ["history", "otlp-http", "langfuse", "spans"] }
blazen-peer = { version = "0.0.0-dev", path = "../blazen-peer", default-features = false, features = ["client", "http-transport"] }
blazen-controlplane = { version = "0.0.0-dev", path = "../blazen-controlplane", default-features = false }
postcard = { version = "1.1", features = ["alloc"] }
base64 = "0.22"
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry", "std"] }
tsify-next = { version = "0.5", features = ["js", "json"] }
wasm-bindgen = "0.2.125"
wasm-bindgen-futures = "0.4.75"
js-sys = "0.3.102"
web-sys = { version = "0.3.102", features = ["ReadableStream", "ReadableStreamDefaultController", "ReadableStreamDefaultReader", "ReadableStreamReadResult", "QueuingStrategy", "EventSource", "EventSourceInit", "MessageEvent", "Event", "EventTarget", "ErrorEvent", "AbortController", "AbortSignal", "TextDecoder", "TextDecodeOptions", "Response", "Request", "RequestInit", "Headers", "Window"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6.5"
console_error_panic_hook = "0.1"
async-trait = "0.1"
futures-util = "0.3"
tokio = { version = "1", default-features = false, features = ["sync"] }
bytes = "1"
chrono = { version = "0.4", default-features = false, features = ["serde", "wasmbind", "clock"] }
uuid = { version = "1", default-features = false, features = ["v4", "serde"] }
# Send/Sync wrapper for !Send types in single-threaded WASM. Required because
# `BlazenError::CallerError` carries an opaque `Box<dyn Any + Send + Sync>`
# and `JsValue` is `!Send` ŌĆö wrapping in `SendWrapper` lets us pass the
# original rejection value through the agent loop and re-throw it intact.
send_wrapper = "0.6"
blazen-3d = { version = "0.0.0-dev", path = "../blazen-3d", default-features = false, optional = true }
blazen-audio-music = { version = "0.0.0-dev", path = "../blazen-audio-music", default-features = false }
blazen-audio-vc = { version = "0.0.0-dev", path = "../blazen-audio-vc", default-features = false }

[features]
default = []
# Bundled tiktoken-rs BPE counter (~8 MB embedded BPE tables added to the
# wasm bundle). Off by default because that bundle-size cost is unacceptable
# for a default browser delivery. Opt in by building this crate with
# `wasm-pack build --features tiktoken` -- intended for the separate
# `@blazen-dev/sdk-tiktoken` npm package whose only difference from the main
# `@blazen-dev/sdk` package is this feature being enabled. Browser callers
# who don't bundle tiktoken can plug their own JS tokeniser through the
# always-on `TokenCounter` JS-callback class in `tokens.rs` instead.
tiktoken = ["blazen-llm/tiktoken"]
# `threed` exposes the [`blazen_3d`] request/result data types as
# `#[wasm_bindgen]` records so JS callers can construct them in Rust-land
# and post them to their own HTTP backend. The `Compat3dProvider` HTTP
# client itself stays *out* of WASM ŌĆö `blazen-3d`'s `compat-proxy`
# feature pulls `reqwest` which does not target `wasm32-unknown-unknown`
# cleanly. The matching JS-side shim at `js/threed.ts` wraps the
# native multipart wire format on top of the browser `fetch()` API.
threed = ["dep:blazen-3d"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
uuid = { version = "1", features = ["js"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3.75"

[lints.rust]
# unsafe impl Send/Sync is required for WASM single-threaded interop
unsafe_code = "allow"
dead_code = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# --- WASM-binding-specific allows -------------------------------------------
# Rationale for the allows below: this crate is a thin `#[wasm_bindgen]`
# adapter layer over the rest of the workspace. JS callers see TypeScript
# signatures generated by tsify/wasm-bindgen, NOT Rust docs, and the
# wasm-bindgen ABI rules constrain method signatures (e.g. owned `String`
# arguments are required because the JS->Rust boundary takes ownership of
# the string buffer; `&str` is not a valid `#[wasm_bindgen]` arg type for
# many positions).
#
# `must_use_candidate`, `missing_errors_doc`, `missing_panics_doc`,
# `return_self_not_must_use`: docs/attrs are ignored by JS callers.
# `needless_pass_by_value`: owned types are required by wasm-bindgen ABI.
# `doc_markdown`: docs are JS-facing in TS-land; backticks add noise.
# `items_after_statements`: nested `fn` helpers inside `#[wasm_bindgen]`
#   methods are a common WASM pattern for closure-free helpers.
# `cast_possible_truncation`, `cast_precision_loss`, `cast_sign_loss`,
# `cast_possible_wrap`: WASM targets pointers as 32-bit; JS only has f64;
#   js_sys::Array::length() returns u32; these casts are idiomatic at the
#   JS<->Rust boundary and the values are bounded by JS semantics.
# `unnecessary_wraps`: signatures must remain `Result<_, JsValue>` for
#   wasm-bindgen even when the current body cannot fail, to keep the JS
#   surface stable across implementation changes.
# `collapsible_if` / `collapsible_else_if`: the nested form keeps the
#   intent of separate branch conditions readable; collapsing changes the
#   logical grouping without behavioral benefit.
# `redundant_closure_for_method_calls`: `.map(|v| v.as_f64())` is
#   intentional for readability when paired with other map/and_then
#   chains in JS conversion code.
# `manual_let_else`, `while_let_loop`, `too_many_lines`: style lints that
#   don't apply uniformly to the JS-surface adapter style here.
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
return_self_not_must_use = "allow"
needless_pass_by_value = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
cast_possible_wrap = "allow"
unnecessary_wraps = "allow"
collapsible_if = "allow"
collapsible_else_if = "allow"
redundant_closure_for_method_calls = "allow"
manual_let_else = "allow"
while_let_loop = "allow"
too_many_lines = "allow"
option_option = "allow"
