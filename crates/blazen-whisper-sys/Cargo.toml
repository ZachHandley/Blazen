# Blazen fork: route ggml through blazen-ggml-sys instead of building the
# in-tree copy. Adds blazen-ggml-sys as both a regular dep AND a build-dep:
# - regular dep: cargo sets DEP_GGML_PREFIX env var on this crate's build
#   script (the DEP_<links>_<key> propagation only follows regular dep
#   edges, not build-dep edges)
# - build-dep: blazen-ggml-sys's build.rs runs before ours so the install
#   tree exists by the time we invoke cmake against it
# build.rs reads DEP_GGML_PREFIX and forwards it to whisper.cpp's cmake as
# CMAKE_PREFIX_PATH alongside WHISPER_USE_SYSTEM_GGML=ON.
system-ggml = ["dep:blazen-ggml-sys"]

[lib]
name = "whisper_rs_sys"
path = "src/lib.rs"

