[package]
name = "blazen-node"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Node.js bindings for the Blazen workflow engine"

[lib]
crate-type = ["cdylib"]

[dependencies]
blazen-core.workspace = true
blazen-events.workspace = true
blazen-llm.workspace = true
blazen-manager.workspace = true
blazen-memory.workspace = true
blazen-model-cache.workspace = true
blazen-embed-tract = { workspace = true, optional = true }
blazen-pipeline.workspace = true
blazen-prompts.workspace = true
blazen-telemetry = { workspace = true, features = ["history", "spans"] }
chrono.workspace = true
elid = { version = "0.4.3", default-features = false, features = ["embeddings"] }
napi.workspace = true
napi-derive.workspace = true
tokio-stream.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yml.workspace = true
async-trait.workspace = true
base64.workspace = true
bytes.workspace = true
futures-util.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid.workspace = true

[features]
default = []
# Exact BPE token counting via tiktoken-rs (forwarded to blazen-llm).
tiktoken = ["blazen-llm/tiktoken"]
# Local inference backends (feature-gated, populated per-phase)
embed = ["blazen-llm/embed"]
fastembed = ["blazen-llm/embed", "dep:blazen-embed-fastembed"]
tract = ["dep:blazen-embed-tract"]
candle-embed = ["blazen-llm/candle-embed"]
mistralrs = ["blazen-llm/mistralrs"]
llamacpp = ["blazen-llm/llamacpp"]
candle-llm = ["blazen-llm/candle-llm"]
diffusion = ["blazen-llm/diffusion"]
whispercpp = ["blazen-llm/whispercpp"]
piper = ["blazen-llm/piper"]
# Wasi feature alias for Cloudflare Workers / Deno / Node-fallback (wasm32-
# wasip1* via napi-rs wasi runtime). Pulls everything the wasi target
# supports: tiktoken token counting, distributed peer (HTTP/JSON client),
# OTLP-HTTP + Langfuse exporters via the host-registered HttpClient.
# Excludes `tract` (blazen-embed-tract still pulls reqwest's wasm-bindgen
# path on wasm32, which requires a browser host that napi-rs's wasi runtime
# doesn't provide), `prometheus` (no listener on wasi), and all native C/C++
# inference backends (llama.cpp, ort-sys, candle, piper, whisper).
# Note: `embed` is intentionally excluded — `blazen-embed`'s facade
# unconditionally pulls in `blazen-embed-fastembed` (and ort-sys C++ runtime)
# on non-musl targets.
wasi = ["tiktoken", "distributed-http", "otlp-http", "langfuse"]
local-all = ["embed", "fastembed", "tract", "candle-embed", "mistralrs", "llamacpp", "candle-llm", "diffusion", "whispercpp", "piper", "tiktoken", "distributed", "otlp", "prometheus", "langfuse"]
# Distributed peer-to-peer execution (cross-node sub-workflow invocation).
# Native: gRPC client+server via tonic.
distributed = ["blazen-core/distributed", "blazen-peer/server", "blazen-peer/client"]
# Wasi: HTTP/JSON client via host-registered HttpClient (no tonic).
distributed-http = ["blazen-core/distributed", "blazen-peer/http-transport"]
# Telemetry exporters
otlp = ["blazen-telemetry/otlp"]
otlp-http = ["blazen-telemetry/otlp-http"]
prometheus = ["blazen-telemetry/prometheus"]
langfuse = ["blazen-telemetry/langfuse"]

[build-dependencies]
napi-build = "2"
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }

[lints]
workspace = true

[target.'cfg(unix)'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }

[target.'cfg(not(target_os = "wasi"))'.dependencies]
blazen-llm = { workspace = true, features = ["reqwest"] }
blazen-memory-valkey = { workspace = true, features = ["redis-tcp", "upstash"] }
blazen-peer = { workspace = true, features = ["server", "client", "http-transport"] }
blazen-persist = { workspace = true, features = ["redb", "valkey"] }
tokio = { workspace = true }

[target.'cfg(target_os = "wasi")'.dependencies]
blazen-memory-valkey = { version = "0.0.0-dev", path = "../blazen-memory-valkey", registry = "forgejo", default-features = false, features = ["upstash"] }
blazen-peer = { version = "0.0.0-dev", path = "../blazen-peer", registry = "forgejo", default-features = false, features = ["http-transport"] }
tokio = { version = "1", default-features = false, features = ["sync", "macros", "io-util", "rt", "time"] }

[target.'cfg(not(target_env = "musl"))'.dependencies]
blazen-embed-fastembed = { workspace = true, optional = true }
