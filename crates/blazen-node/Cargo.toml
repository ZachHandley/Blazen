[package]
name = "blazen-node"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Node.js bindings for the Blazen workflow engine"

[lib]
crate-type = ["cdylib"]

[dependencies]
blazen-core.workspace = true
blazen-events.workspace = true
blazen-llm = { workspace = true, features = ["reqwest"] }
blazen-memory.workspace = true
blazen-memory-valkey.workspace = true
blazen-prompts.workspace = true
chrono.workspace = true
napi.workspace = true
napi-derive.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
serde.workspace = true
serde_json.workspace = true
async-trait.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[features]
default = []
# Local inference backends (feature-gated, populated per-phase)
fastembed = ["blazen-llm/fastembed"]
candle-embed = ["blazen-llm/candle-embed"]
mistralrs = ["blazen-llm/mistralrs"]
llamacpp = ["blazen-llm/llamacpp"]
candle-llm = ["blazen-llm/candle-llm"]
diffusion = ["blazen-llm/diffusion"]
whispercpp = ["blazen-llm/whispercpp"]
piper = ["blazen-llm/piper"]
local-all = ["fastembed", "candle-embed", "mistralrs", "llamacpp", "candle-llm", "diffusion", "whispercpp", "piper"]

[build-dependencies]
napi-build = "2"
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }

[lints]
workspace = true
