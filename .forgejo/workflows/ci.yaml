          sccache-key-prefix: sccache/blazen-swift
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Swift
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-swift@main
        with:
          swift-version: '6.3'

      - name: Build blazen-uniffi (release)
        if: steps.check.outputs.completed != 'true'
        # Package.swift's UniFFIBlazen target uses -L../../target/release on
        # Linux so a host build of libblazen_uniffi.so is enough for
        # swift build + swift test once Swift is on PATH.
        run: cargo build -p blazen-uniffi --release

      - name: swift build / swift test
