name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      trigger_builds:
        description: 'Force-dispatch build-artifacts.yaml even if no new tag is created (useful for re-running a partial release).'
        type: boolean
        required: false
        default: false
      version_override:
        description: 'Optional explicit semver to dispatch (no v prefix). Leave empty to use resolve-version output.'
        type: string
        required: false
        default: ''

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1

jobs:
  detect:
    name: Detect commit intent
    runs-on: ubuntu-latest
    outputs:
      web_only: ${{ steps.check.outputs.web_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inspect HEAD commit subject
        id: check
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "HEAD subject: ${MSG}"
          if [[ "$MSG" == \[web\]* ]]; then
            echo "web_only=true" >> "$GITHUB_OUTPUT"
            echo "Detected [web] prefix — Rust jobs will be skipped."
          else
            echo "web_only=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-lint
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-lint
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Format check
        if: steps.check.outputs.completed != 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-lint
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-test
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Workspace tests (unit + integration)
        if: steps.check.outputs.completed != 'true'
        # Exclude blazen-py: it hardcodes pyo3/extension-module (so the
        # wheel doesn't link libpython), which means cargo can't build a
        # standalone Rust test binary for it. blazen-py is exhaustively
        # tested by the test-python job below via uv + maturin.
        run: cargo nextest run --workspace --all-features --exclude blazen-py

      - name: Workspace tests (doc tests)
        if: steps.check.outputs.completed != 'true'
        run: cargo test --workspace --doc --all-features --exclude blazen-py

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-python:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-python
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Python + uv
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install deps and build wheel
        if: steps.check.outputs.completed != 'true'
        run: uv sync --group dev

      - name: Verify Python stubs are up to date
        if: steps.check.outputs.completed != 'true'
        # Regenerate blazen.pyi from Rust source and fail if it drifts
        # from the committed version. This enforces that stubs are
        # generated, not hand-written.
        run: |
          cargo run --example stub_gen -p blazen-py --features langfuse,otlp,prometheus,tract,distributed
          git diff --exit-code crates/blazen-py/blazen.pyi || {
            echo "::error::blazen.pyi is stale. Run 'cargo run --example stub_gen -p blazen-py --features langfuse,otlp,prometheus,tract,distributed' and commit the result."
            exit 1
          }

      - name: Run Python unit tests (parallel)
        if: steps.check.outputs.completed != 'true'
        run: uv run pytest -v -n auto --timeout=30 tests/python/test_workflow.py tests/python/test_session_refs.py tests/python/test_e2e.py tests/python/test_model_manager_smoke.py

      - name: Run Python API smoke tests (sequential, real HTTP)
        if: steps.check.outputs.completed != 'true'
        run: uv run pytest -v --timeout=300 tests/python/test_fal_smoke.py tests/python/test_llm_smoke.py tests/python/test_capabilities_smoke.py tests/python/test_provider_smoke.py
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-node:
    name: Test Node.js Bindings
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-node
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Build Node bindings
        if: steps.check.outputs.completed != 'true'
        run: |
          pnpm install
          pnpm --filter blazen run build

      - name: Run Node.js E2E tests
        if: steps.check.outputs.completed != 'true'
        # ava is the canonical napi-rs runner for this repo (see CLAUDE.md
        # § 3 Node bindings). The Node tests were migrated from
        # `node:test` to ava in commit fe723d54 because the napi-rs tokio
        # handle lifecycle hangs Node's built-in runner across repeated
        # `Promise<T>` returns.
        run: pnpm exec ava tests/node/test_workflow.mjs

      - name: Run Node.js free tests (no API keys)
        if: steps.check.outputs.completed != 'true'
        run: pnpm exec ava tests/node/test_session_refs.mjs tests/node/test_capabilities_smoke.mjs tests/node/test_e2e.mjs

      - name: Run Node.js LLM smoke tests
        if: steps.check.outputs.completed != 'true'
        run: pnpm exec ava tests/node/test_llm_smoke.mjs tests/node/test_fal_smoke.mjs
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-go:
    name: Test Go binding
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-go
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-go
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Build blazen-uniffi (release)
        if: steps.check.outputs.completed != 'true'
        run: cargo build -p blazen-uniffi --release

      - name: Stage static lib for cgo
        if: steps.check.outputs.completed != 'true'
        # bindings/go/cgo_link.go expects libblazen_uniffi.a under
        # internal/clib/linux_amd64/ on Linux x86_64. Stage the freshly-built
        # archive there so `go build` finds it at cgo link time.
        run: |
          mkdir -p bindings/go/internal/clib/linux_amd64
          cp target/release/libblazen_uniffi.a bindings/go/internal/clib/linux_amd64/

      - name: Set up Go
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: go vet / build / test
        if: steps.check.outputs.completed != 'true'
        working-directory: bindings/go
        run: |
          go vet ./...
          go build ./...
          go test ./...

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-go
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-swift:
    name: Test Swift binding
    runs-on: ubuntu-latest
    # swiftlang/swift:5.10-jammy ships a Linux Swift toolchain. macOS-only
    # XCFramework builds live in build-artifacts.yaml on a macos-latest
    # runner; the Linux container here exercises the SwiftPM build + tests
    # against the host-built libblazen_uniffi.so.
    container: swiftlang/swift:5.10-jammy
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-swift
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-swift
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Build blazen-uniffi (release)
        if: steps.check.outputs.completed != 'true'
        # Package.swift's UniFFIBlazen target uses -L../../target/release on
        # Linux so a host build of libblazen_uniffi.so is enough for swift
        # build + swift test in this container.
        run: cargo build -p blazen-uniffi --release

      - name: swift build / swift test
        if: steps.check.outputs.completed != 'true'
        working-directory: bindings/swift
        run: |
          # Ensure the dynamic loader can locate libblazen_uniffi.so at test
          # runtime — SwiftPM emits -L for the linker but doesn't add an
          # rpath, so the runtime lookup needs LD_LIBRARY_PATH.
          export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/target/release:${LD_LIBRARY_PATH:-}"
          swift build
          swift test

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-swift
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-kotlin:
    name: Test Kotlin binding
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-kotlin
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-kotlin
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Build blazen-uniffi (release)
        if: steps.check.outputs.completed != 'true'
        run: cargo build -p blazen-uniffi --release

      - name: Stage shared lib for JNA
        if: steps.check.outputs.completed != 'true'
        # JNA looks for libraries on the resources path under a platform tag.
        # On Linux x86_64 that's linux-x86-64; the file must be named
        # libblazen_uniffi.so (unix prefix + .so suffix).
        run: |
          mkdir -p bindings/kotlin/src/main/resources/linux-x86-64
          cp target/release/libblazen_uniffi.so bindings/kotlin/src/main/resources/linux-x86-64/

      - name: Set up Java
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        if: steps.check.outputs.completed != 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: gradle build + test
        if: steps.check.outputs.completed != 'true'
        working-directory: bindings/kotlin
        run: gradle build test --no-daemon

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-kotlin
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-ruby:
    name: Test Ruby binding
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-ruby
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-ruby
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Build blazen-cabi (release)
        if: steps.check.outputs.completed != 'true'
        # build.rs invokes cbindgen and writes
        # bindings/ruby/ext/blazen/blazen.h on every build. The FFI loader at
        # lib/blazen/ffi.rb prefers ext/blazen/<arch>/libblazen_cabi.so but
        # falls back to a flat ext/blazen/libblazen_cabi.so layout for CI.
        run: cargo build -p blazen-cabi --release

      - name: Stage libblazen_cabi for ffi gem
        if: steps.check.outputs.completed != 'true'
        run: |
          mkdir -p bindings/ruby/ext/blazen/linux_amd64
          cp target/release/libblazen_cabi.so bindings/ruby/ext/blazen/linux_amd64/

      - name: Set up Ruby
        if: steps.check.outputs.completed != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install bundler + gem deps
        if: steps.check.outputs.completed != 'true'
        working-directory: bindings/ruby
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Run rspec
        if: steps.check.outputs.completed != 'true'
        working-directory: bindings/ruby
        # Pending specs (live OPENAI_API_KEY paths) stay skipped — they're
        # exercised by the broader smoke jobs that fan-out per-provider.
        run: bundle exec rspec --format documentation

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-ruby
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  audit-bindings:
    name: Audit Binding Parity
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-audit-bindings
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Python + uv
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: wasm32-unknown-unknown
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-audit
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Install wasm-pack
        if: steps.check.outputs.completed != 'true'
        run: cargo install wasm-pack --locked

      - name: Regenerate Python pyi stub + drift check
        if: steps.check.outputs.completed != 'true'
        run: |
          cargo run --example stub_gen -p blazen-py --features langfuse,otlp,prometheus,tract,distributed
          git diff --exit-code crates/blazen-py/blazen.pyi || {
            echo "::error::blazen.pyi is stale; regenerate via 'cargo run --example stub_gen -p blazen-py --features langfuse,otlp,prometheus,tract,distributed'"
            exit 1
          }

      - name: Regenerate Node index.d.ts + drift check
        if: steps.check.outputs.completed != 'true'
        run: |
          pnpm install
          pnpm --filter blazen run build
          git diff --exit-code crates/blazen-node/index.d.ts || {
            echo "::error::index.d.ts is stale; regenerate via 'pnpm --filter blazen run build'"
            exit 1
          }

      - name: Regenerate wasm-pack pkg + drift check
        if: steps.check.outputs.completed != 'true'
        run: |
          wasm-pack build crates/blazen-wasm-sdk --target web --out-dir pkg --release
          git diff --exit-code crates/blazen-wasm-sdk/pkg/blazen_wasm_sdk.d.ts || {
            echo "::error::wasm-sdk pkg/blazen_wasm_sdk.d.ts is stale; regenerate via 'wasm-pack build crates/blazen-wasm-sdk --target web --out-dir pkg --release'"
            exit 1
          }

      - name: Run binding-parity audit
        if: steps.check.outputs.completed != 'true'
        run: uv run --no-project python3 tools/audit_bindings.py

      - name: Install uniffi-bindgen-go (for regen drift check)
        if: steps.check.outputs.completed != 'true'
        # uniffi-bindgen-go is pinned to uniffi-rs 0.31 to match the in-tree
        # blazen-uniffi runtime. A mismatch produces incompatible scaffolding
        # with cryptic link errors.
        run: cargo install uniffi-bindgen-go --tag v0.31.0+v0.31.0 --git https://github.com/NordSecurity/uniffi-bindgen-go

      - name: Build local uniffi-bindgen CLI + native lib
        if: steps.check.outputs.completed != 'true'
        # The script prefers target/release/uniffi-bindgen (built from
        # blazen-uniffi's bin/uniffi-bindgen.rs) so the generator version is
        # guaranteed to match the runtime scaffolding in the cdylib. The
        # second build produces the rlib that the bindgens read for metadata.
        run: |
          cargo build -p blazen-uniffi --release --bin uniffi-bindgen
          cargo build -p blazen-uniffi --release

      - name: Regenerate Go/Swift/Kotlin/Ruby bindings + drift check
        if: steps.check.outputs.completed != 'true'
        # Catches drift in the four UniFFI-driven bindings the same way the
        # earlier steps catch drift in blazen.pyi / index.d.ts / wasm pkg.
        run: |
          ./scripts/regen-bindings.sh
          git diff --exit-code bindings/ || {
            echo "::error::bindings/ is stale; regenerate via './scripts/regen-bindings.sh' and commit the result."
            exit 1
          }

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-audit-bindings
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.web_only != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: wasm32-unknown-unknown
          components: clippy
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-wasm
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: cargo check (wasm32, workspace crates)
        if: steps.check.outputs.completed != 'true'
        env:
          RUSTFLAGS: "-D warnings"
        run: |
          cargo check --target wasm32-unknown-unknown -p blazen-core --no-default-features
          cargo check --target wasm32-unknown-unknown -p blazen-memory --no-default-features
          cargo check --target wasm32-unknown-unknown -p blazen-llm --no-default-features --features tsify

      - name: Install wasm-pack
        if: steps.check.outputs.completed != 'true'
        run: cargo install wasm-pack --locked

      - name: wasm-pack build (blazen-wasm-sdk)
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-wasm-sdk
        run: wasm-pack build --target web --release

      - name: wasm-pack test (blazen-wasm-sdk, --node)
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-wasm-sdk
        run: wasm-pack test --node --release

      - name: clippy (blazen-wasm-sdk, wasm32)
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-wasm-sdk
        # blazen-wasm-sdk has its own [lints.clippy] (all=warn, pedantic=warn);
        # mirror the original .github/workflows/wasm-ci.yml by NOT applying
        # the workspace-level -D warnings here.
        run: cargo clippy --target wasm32-unknown-unknown

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Install cloudflare-worker example deps
        if: steps.check.outputs.completed != 'true'
        # The example is intentionally NOT part of the root pnpm-workspace.yaml,
        # so install with --ignore-workspace to use the example's own lockfile.
        working-directory: examples/cloudflare-worker
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: vitest (cloudflare-worker example)
        if: steps.check.outputs.completed != 'true'
        working-directory: examples/cloudflare-worker
        run: pnpm test

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-smoke-compute:
    name: Test Compute Smoke (push to main / workflow_dispatch)
    runs-on: ubuntu-latest
    needs: [detect, lint]
    # Mirrors auto-tag's gate: push-to-main and workflow_dispatch only. Keeps
    # PR feedback fast (compute is ~7 min) while still exercising compute
    # paths (image/TTS/music/transcribe/3D/bg-removal/run/submit) on the
    # release critical path. auto-tag.needs depends on this job, so the gate
    # must match — otherwise a skipped-need on workflow_dispatch would skip
    # auto-tag itself.
    if: needs.detect.outputs.web_only != 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-test-smoke-compute
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-smoke-compute
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Python + uv
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install Python deps and build wheel
        if: steps.check.outputs.completed != 'true'
        run: uv sync --group dev

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Build Node bindings
        if: steps.check.outputs.completed != 'true'
        run: |
          pnpm install
          pnpm --filter blazen run build

      - name: Run Python compute smoke tests
        if: steps.check.outputs.completed != 'true'
        # Per-test timeouts (e.g. 300s image, 270s TTS, 1200s video) live in
        # tests/python/test_fal_smoke.py decorators; the --timeout=1200 here
        # is just a fallback ceiling above the largest per-test budget.
        run: uv run pytest -v --timeout=1200 tests/python/test_fal_smoke.py
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BLAZEN_TEST_FAL_COMPUTE: "1"

      - name: Run Node compute smoke tests
        if: steps.check.outputs.completed != 'true'
        # ava per CLAUDE.md § 3 Node bindings (migrated in fe723d54).
        # Compute smokes hit fal.ai with per-test timeouts up to 1200 s,
        # so override ava's default 120 s file-level timeout.
        run: pnpm exec ava --timeout=2100s tests/node/test_fal_smoke.mjs
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BLAZEN_TEST_FAL_COMPUTE: "1"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-test-smoke-compute
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: [detect, test, test-python, test-node, test-wasm, test-smoke-compute, test-go, test-swift, test-kotlin, test-ruby, audit-bindings]
    if: needs.detect.outputs.web_only != 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Walk existing temp/v* in-flight release branches. Probe PyPI /
      # crates.io / npm directly: any branch whose version is already on a
      # public registry gets DELETEd and recorded in burned-versions.txt
      # (versions on those registries are filename-immutable; retrying with
      # new bytes is impossible). The first still-clean branch is returned
      # as the orphan to retry.
      - name: Probe for orphan temp/v* branches
        id: orphan
        uses: https://forge.blackleafdigital.com/Public/actions/check-orphan-versions@main
        with:
          temp-branch-prefix: temp/v
          max-branches: '10'
          package-name: blazen
          registries: pypi,cargo,npm
          burn-list-path: .forgejo/burned-versions.txt
          forgejo-base-url: https://forge.blackleafdigital.com
          repo: ${{ github.repository }}
          forgejo-auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Resolve candidate next version
        id: resolve
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

      - name: Pick version to build (override > orphan > bump)
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          OVERRIDE='${{ github.event.inputs.version_override }}'
          ORPHAN_VERSION='${{ steps.orphan.outputs.orphan-version }}'
          ORPHAN_BRANCH='${{ steps.orphan.outputs.orphan-branch }}'
          ABANDONED='${{ steps.orphan.outputs.abandoned }}'
          RESOLVED='${{ steps.resolve.outputs.version }}'
          IS_NEW='${{ steps.resolve.outputs.is-new }}'

          if [ -n "$OVERRIDE" ]; then
            {
              echo "version=${OVERRIDE}"
              echo "branch=temp/v${OVERRIDE}"
              echo "reason=override"
            } >> "$GITHUB_OUTPUT"
            echo "Using version_override: ${OVERRIDE}"
            exit 0
          fi

          if [ -n "$ORPHAN_VERSION" ]; then
            {
              echo "version=${ORPHAN_VERSION}"
              echo "branch=${ORPHAN_BRANCH}"
              echo "reason=orphan-retry"
            } >> "$GITHUB_OUTPUT"
            echo "Reusing in-flight orphan ${ORPHAN_BRANCH} (v${ORPHAN_VERSION})"
            exit 0
          fi

          # Build burned set from the committed file plus anything the
          # check-orphan-versions step burned in this run (which was just
          # committed via the Forgejo Contents API but isn't on disk yet).
          # awk 'NF' is empty-file safe (always exits 0); grep -v under
          # set -euo pipefail returns 1 on no matches and kills the script.
          BURNED=""
          if [ -f .forgejo/burned-versions.txt ]; then
            BURNED=$(awk 'NF' .forgejo/burned-versions.txt | paste -sd, -)
          fi
          if [ -n "$ABANDONED" ]; then
            BURNED="${BURNED:+${BURNED},}${ABANDONED}"
          fi
          is_burned() {
            case ",${BURNED}," in *,$1,*) return 0 ;; *) return 1 ;; esac
          }
          # Bump past any burned version.
          while is_burned "$RESOLVED"; do
            IFS='.' read -r MA MI PA <<< "$RESOLVED"
            PA=$((PA + 1))
            RESOLVED="${MA}.${MI}.${PA}"
            IS_NEW=true
          done

          if [ "$IS_NEW" = "true" ]; then
            {
              echo "version=${RESOLVED}"
              echo "branch=temp/v${RESOLVED}"
              echo "reason=new-release"
            } >> "$GITHUB_OUTPUT"
            echo "No orphans; new release at v${RESOLVED}"
            exit 0
          fi

          if [ '${{ github.event.inputs.trigger_builds }}' = 'true' ]; then
            {
              echo "version=${RESOLVED}"
              echo "branch=temp/v${RESOLVED}"
              echo "reason=manual-trigger"
            } >> "$GITHUB_OUTPUT"
            echo "Manual trigger rebuild of v${RESOLVED}"
            exit 0
          fi

          {
            echo "version="
            echo "branch="
            echo "reason=noop"
          } >> "$GITHUB_OUTPUT"
          echo "Nothing to build (no orphans, no new release, no manual trigger)"

      # Create or fast-forward the in-flight temp/v{VERSION} branch at the
      # current main HEAD. Permanent v{VERSION} tags are never created here
      # — release.yaml creates them only after every publish step succeeds,
      # then deletes the temp branch. This decouples "release in flight"
      # from "release completed" and makes orphan-retry safe (the temp
      # branch is mutable; the permanent tag is not).
      - name: Create or update temp/v{VERSION} branch at HEAD
        if: steps.pick.outputs.version != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          VERSION: ${{ steps.pick.outputs.version }}
          BR: ${{ steps.pick.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name  "Zach Handley"
          git config user.email "zachhandley@gmail.com"
          # Pull a clean fetch so --force-with-lease can reason about the
          # current remote tip if the branch already exists.
          git fetch origin "${BR}" || true
          git push origin "HEAD:refs/heads/${BR}" --force-with-lease

      - name: Dispatch build-artifacts workflow
        if: steps.pick.outputs.version != ''
        run: |
          VERSION='${{ steps.pick.outputs.version }}'
          BRANCH='${{ steps.pick.outputs.branch }}'
          REASON='${{ steps.pick.outputs.reason }}'
          echo "Dispatching build-artifacts for v${VERSION} on ${BRANCH} (reason: ${REASON})"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/build-artifacts.yaml/dispatches" \
            -d "{\"ref\": \"refs/heads/${BRANCH}\", \"inputs\": {\"version\": \"${VERSION}\"}}"

      - name: Dispatch deploy-website workflow
        if: steps.pick.outputs.create_tag == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/deploy-website.yaml/dispatches" \
            -d '{"ref": "main"}'

  deploy-web-only:
    name: Deploy Website (web-only commit)
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.web_only == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Dispatch deploy-website workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/deploy-website.yaml/dispatches" \
            -d '{"ref": "main"}'
