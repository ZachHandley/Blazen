name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-lint
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-test
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Workspace tests (unit + integration)
        run: cargo nextest run --workspace --all-features

      - name: Workspace tests (doc tests)
        run: cargo test --workspace --doc --all-features

  test-python:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-python
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.12

      - name: Install deps and build wheel
        run: uv sync --directory crates/blazen-py --extra dev

      - name: Run Python E2E tests
        run: uv run --directory crates/blazen-py pytest -v

  test-node:
    name: Test Node.js Bindings
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-node
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Node bindings
        run: |
          cd crates/blazen-node
          pnpm install
          pnpm run build

      - name: Run Node.js E2E tests
        run: node --test tests/node/test_workflow.mjs

  build:
    name: Build (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    needs: [test, test-python, test-node]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ github.sha }}
          step: ci-build-x86_64-unknown-linux-gnu
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: x86_64-unknown-linux-gnu
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-x86_64-unknown-linux-gnu
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Build release
        if: steps.check.outputs.completed != 'true'
        run: cargo build --workspace --release --all-features --target x86_64-unknown-linux-gnu

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ github.sha }}
          step: ci-build-x86_64-unknown-linux-gnu
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve next version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

      - name: Create and push tag
        if: steps.version.outputs.is-new == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "Zach Handley"
          git config user.email "zachhandley@gmail.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
