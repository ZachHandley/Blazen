name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      trigger_builds:
        description: 'Force-dispatch build-artifacts.yaml even if no new tag is created (useful for re-running a partial release).'
        type: boolean
        required: false
        default: false
      version_override:
        description: 'Optional explicit semver to dispatch (no v prefix). Leave empty to use resolve-version output.'
        type: string
        required: false
        default: ''

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-lint
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-test
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Workspace tests (unit + integration)
        # Exclude blazen-py: it hardcodes pyo3/extension-module (so the
        # wheel doesn't link libpython), which means cargo can't build a
        # standalone Rust test binary for it. blazen-py is exhaustively
        # tested by the test-python job below via uv + maturin.
        run: cargo nextest run --workspace --all-features --exclude blazen-py

      - name: Workspace tests (doc tests)
        run: cargo test --workspace --doc --all-features --exclude blazen-py

  test-python:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-python
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Python + uv
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install deps and build wheel
        run: uv sync --group dev

      - name: Verify Python stubs are up to date
        # Regenerate blazen.pyi from Rust source and fail if it drifts
        # from the committed version. This enforces that stubs are
        # generated, not hand-written.
        run: |
          cargo run --example stub_gen -p blazen-py
          git diff --exit-code crates/blazen-py/blazen.pyi || {
            echo "::error::blazen.pyi is stale. Run 'cargo run --example stub_gen -p blazen-py' and commit the result."
            exit 1
          }

      - name: Run Python unit tests (parallel)
        run: uv run pytest -v -n auto --timeout=30 tests/python/test_workflow.py tests/python/test_session_refs.py tests/python/test_e2e.py

      - name: Run Python API smoke tests (sequential, real HTTP)
        run: uv run pytest -v --timeout=300 tests/python/test_fal_smoke.py tests/python/test_llm_smoke.py tests/python/test_capabilities_smoke.py tests/python/test_provider_smoke.py
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  test-node:
    name: Test Node.js Bindings
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-node
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build Node bindings
        run: |
          pnpm install
          pnpm --filter blazen run build

      - name: Run Node.js E2E tests
        run: node --test tests/node/test_workflow.mjs

      - name: Run Node.js free tests (no API keys)
        run: |
          node --test tests/node/test_session_refs.mjs
          node --test tests/node/test_capabilities_smoke.mjs
          node --test tests/node/test_e2e.mjs

      - name: Run Node.js LLM smoke tests
        run: node --test tests/node/test_llm_smoke.mjs tests/node/test_fal_smoke.mjs
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: [test, test-python, test-node]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve candidate next version
        id: resolve
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

      - name: Pick version to build (orphan wins, else new tag, else override)
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          OVERRIDE='${{ github.event.inputs.version_override }}'
          RESOLVED='${{ steps.resolve.outputs.version }}'
          IS_NEW='${{ steps.resolve.outputs.is-new }}'

          if [ -n "$OVERRIDE" ]; then
            echo "version=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "reason=override" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "Using version_override: ${OVERRIDE}"
            exit 0
          fi

          TAGS=$(git tag --list 'v*' --sort=-creatordate | head -10)
          ORPHAN=""
          for TAG in $TAGS; do
            V="${TAG#v}"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
              "https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/ci-status/${V}/release-complete")
            if [ "$CODE" != "200" ]; then
              ORPHAN="$V"
              break
            fi
          done

          if [ -n "$ORPHAN" ]; then
            echo "version=${ORPHAN}" >> "$GITHUB_OUTPUT"
            echo "reason=orphan-retry" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "Rebuilding most recent orphaned version v${ORPHAN} (no bump)"
            exit 0
          fi

          if [ "$IS_NEW" = "true" ]; then
            echo "version=${RESOLVED}" >> "$GITHUB_OUTPUT"
            echo "reason=new-tag" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
            echo "No orphans; bumping to v${RESOLVED}"
            exit 0
          fi

          if [ '${{ github.event.inputs.trigger_builds }}' = 'true' ]; then
            echo "version=${RESOLVED}" >> "$GITHUB_OUTPUT"
            echo "reason=manual-trigger" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "Manual trigger rebuild of v${RESOLVED}"
            exit 0
          fi

          echo "version=" >> "$GITHUB_OUTPUT"
          echo "reason=noop" >> "$GITHUB_OUTPUT"
          echo "create_tag=false" >> "$GITHUB_OUTPUT"
          echo "Nothing to build (no orphans, no new tag, no manual trigger)"

      - name: Create and push tag
        if: steps.pick.outputs.create_tag == 'true'
        run: |
          TAG="v${{ steps.pick.outputs.version }}"
          git config user.name "Zach Handley"
          git config user.email "zachhandley@gmail.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}

      # On orphan-retry, force-move the tag to main HEAD so the dispatched
      # build-artifacts workflow picks up the latest workflow fixes. Without
      # this, the tag stays pinned at the original commit and every retry
      # re-runs the same (broken) workflow.
      - name: Force-move tag to main HEAD (orphan-retry)
        if: steps.pick.outputs.reason == 'orphan-retry'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          VERSION: ${{ steps.pick.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name  "Zach Handley"
          git config user.email "zachhandley@gmail.com"
          git tag -f "$TAG"
          if ! git push --force origin "refs/tags/${TAG}"; then
            echo "Force-push rejected (tag protection?); falling back to delete+recreate"
            git push origin ":refs/tags/${TAG}"
            git push origin "refs/tags/${TAG}"
          fi

      # Clear per-step completion markers so every matrix row re-runs against
      # the refreshed tree. Also purge the blazen-build artifact package for
      # this version so stale wheels/napi/sdist/wasm uploads don't coexist
      # with the fresh ones about to be produced. release-complete marker is
      # preserved because the orphan-probe at ci.yaml:219-238 keys on it.
      - name: Purge stale ci-status + artifacts (orphan-retry)
        if: steps.pick.outputs.reason == 'orphan-retry'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: purge-version
          version: ${{ steps.pick.outputs.version }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          keep-markers: release-complete
          purge-package: blazen-build

      - name: Dispatch build-artifacts workflow
        if: steps.pick.outputs.version != ''
        run: |
          VERSION='${{ steps.pick.outputs.version }}'
          REASON='${{ steps.pick.outputs.reason }}'
          echo "Dispatching build-artifacts for v${VERSION} (reason: ${REASON})"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/build-artifacts.yaml/dispatches" \
            -d "{\"ref\": \"v${VERSION}\", \"inputs\": {\"version\": \"${VERSION}\"}}"

      - name: Dispatch deploy-website workflow
        if: steps.pick.outputs.create_tag == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/deploy-website.yaml/dispatches" \
            -d '{"ref": "main"}'
