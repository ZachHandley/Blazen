name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      trigger_builds:
        description: 'Force-dispatch build-artifacts.yaml even if no new tag is created (useful for re-running a partial release).'
        type: boolean
        required: false
        default: false
      version_override:
        description: 'Optional explicit semver to dispatch (no v prefix). Leave empty to use resolve-version output.'
        type: string
        required: false
        default: ''

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  # candle-kernels' build.rs auto-detects compute cap via `nvidia-smi`, which
  # isn't reliably on PATH during build-script execution. Hard-pin to 89
  # (Ada — covers the 4070 Ti minibeast + 4090 BeastPC). Bump to "89;120"
  # when the inbound 5070 Ti / 5090 Blackwell rig joins CI.
  CUDA_COMPUTE_CAP: "89"
  # CUDA_HOME + PATH for nvcc are set per-job by setup-cuda-toolkit, which
  # probes /opt/cuda (Arch), /usr/local/cuda (NVIDIA repo), /usr (Ubuntu
  # nvidia-cuda-toolkit apt package), etc. The forgejo-runner systemd unit
  # has empty Environment= so the user shell's PATH addition doesn't reach
  # jobs — every Rust-building job runs setup-cuda-toolkit after Setup Rust
  # so cudarc / candle-kernels / bindgen-cuda find nvcc deterministically.

jobs:
  # ===========================================
  # Resolve version once at the top of the pipeline.
  # All downstream jobs key their ci-step-status markers on this version
  # (NOT github.sha) so multiple commits targeting the same unreleased
  # version share completed-step state. Push commit 1 → 10/11 jobs pass;
  # push commit 2 fixing the failure → only the failed job re-runs, the
  # other 10 short-circuit on the existing markers.
  #
  # `resolve-version` reads Cargo.toml (service-type: rust) before any
  # v* tag exists; afterwards it bumps the latest tag by patch. The
  # auto-tag job resolves its own version too (with orphan-probe +
  # burn-list logic) — this top-level job is purely for step-status
  # keying and stays unaware of orphan branches.
  # ===========================================
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect]
    # [skip] short-circuits the entire pipeline — don't even resolve the version.
    if: needs.detect.outputs.skip != 'true'
    outputs:
      version:          ${{ steps.version.outputs.version }}
      cursor_sha:       ${{ steps.cursor.outputs.sha }}
      only_skip_paths:  ${{ steps.skip.outputs.only-skip-paths }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          # Precedence: workflow_dispatch input > commit-msg [vX.Y.Z]
          # marker > tag-bump fallback. resolve-version treats the
          # `version:` input as highest-priority (source=input wins
          # over source=tag-bump).
          version: ${{ inputs.version_override != '' && inputs.version_override || needs.detect.outputs.version_marker }}
          tag-prefix: v
          bump: patch
          service-type: rust

      # ===========================================
      # Diff-driven test skip cursor.
      #
      # We probe ci-step-status for a `build-success` marker at the
      # currently-resolved version. The marker records the SHA of the
      # last commit whose ci.yaml run reached the end of `auto-tag`
      # successfully. The detect-changes call below then diffs
      # cursor.sha..HEAD against the skip-paths glob list — if every
      # changed file matches a skip-path, the heavy test jobs get
      # `if: needs.version.outputs.only_skip_paths != 'true'` set
      # false-y and skip; auto-tag still fires (its `if:` uses
      # `!contains(needs.*.result, 'failure')` so skipped upstreams
      # are tolerated).
      # ===========================================
      - name: Probe build-success cursor
        id: cursor
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ steps.version.outputs.version }}
          step: build-success
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Decide diff-driven test skip
        id: skip
        uses: https://forge.blackleafdigital.com/Public/actions/detect-changes@main
        with:
          baseline-sha: ${{ steps.cursor.outputs.sha }}
          skip-paths-yaml: |
            .forgejo/workflows/**
            docs/**
            **/*.md
            CHANGELOG*
            README*
            .gitignore
            .editorconfig
            .githooks/**
            ci-base/**

  detect:
    name: Detect commit intent
    runs-on: ubuntu-latest
    outputs:
      web_only:       ${{ steps.check.outputs.web_only }}
      no_publish:     ${{ steps.check.outputs.no_publish }}
      version_marker: ${{ steps.check.outputs.version_marker }}
      fast:           ${{ steps.check.outputs.fast }}
      skip:           ${{ steps.check.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inspect HEAD commit message
        id: check
        shell: bash
        run: |
          SUBJECT=$(git log -1 --pretty=%s)
          BODY=$(git log -1 --pretty=%B)
          echo "HEAD subject: ${SUBJECT}"
          if [[ "$SUBJECT" == \[web\]* ]]; then
            echo "web_only=true" >> "$GITHUB_OUTPUT"
            echo "Detected [web] prefix — Rust jobs will be skipped."
          else
            echo "web_only=false" >> "$GITHUB_OUTPUT"
          fi
          # [np] anywhere in the subject suppresses the release dispatch
          # (auto-tag job). Tests still run for signal. Mirrors ZLayer's
          # [np] semantics. workflow_dispatch ignores this — manual
          # dispatch is an explicit "release me anyway" signal.
          if [[ "$SUBJECT" == *"[np]"* ]]; then
            echo "no_publish=true" >> "$GITHUB_OUTPUT"
            echo "Detected [np] — auto-tag will be skipped (no release dispatched)."
          else
            echo "no_publish=false" >> "$GITHUB_OUTPUT"
          fi
          # [fast] anywhere in the subject skips ALL test/lint/audit jobs and
          # lets auto-tag fire on the bare commit. Intended for in-flight
          # release-cycle commits where local verification has already run
          # and the goal is just to land + redispatch build-artifacts. Pair
          # with [vX.Y.Z] to pin the version for the dispatch. auto-tag's
          # `if: !contains(needs.*.result, 'failure')` gate tolerates the
          # SKIPPED upstream test jobs, so the release flow keeps moving.
          if [[ "$SUBJECT" == *"[fast]"* ]]; then
            echo "fast=true" >> "$GITHUB_OUTPUT"
            echo "Detected [fast] — test/lint/audit jobs will be skipped; auto-tag still fires."
          else
            echo "fast=false" >> "$GITHUB_OUTPUT"
          fi
          # [skip] anywhere in the subject is a HARD no-op: NOTHING runs — no
          # lint, no tests, no build, no audit, no auto-tag/release. Only this
          # detect job executes. Use it for commits that must not trigger any
          # CI processing (workflow/registry plumbing already verified locally).
          # Unlike [fast] (which still fires auto-tag), [skip] suppresses
          # everything including the release dispatch.
          if [[ "$SUBJECT" == *"[skip]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Detected [skip] — ALL downstream jobs will be skipped."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          # [purge] anywhere in the subject forces a FRESH artifact rebuild:
          # auto-tag dispatches build-artifacts with purge_existing=true, which
          # deletes the cached `blazen-build` package + ci-status markers for the
          # version so every target rebuilds from the new sha (no stale cached
          # artifacts shipped). Use after a fix that must invalidate prior
          # artifacts. Without it, build-artifacts reuses cached step results.
          if [[ "$SUBJECT" == *"[purge]"* ]]; then
            echo "purge=true" >> "$GITHUB_OUTPUT"
            echo "Detected [purge] — build-artifacts will be dispatched with purge_existing=true."
          else
            echo "purge=false" >> "$GITHUB_OUTPUT"
          fi
          # [vX.Y.Z] anywhere in subject OR body pins the next release
          # version. Feeds resolve-version's highest-priority `version:`
          # input in both the top-level `version` job and `auto-tag`'s
          # `Resolve candidate next version` step, overriding the
          # tag-bump fallback. Sticky across subsequent pushes via the
          # existing orphan-retry in auto-tag (the first marked push
          # creates `temp/v{VERSION}` and later pushes pick it up
          # automatically even without the marker).
          # Supports stable (1.2.3) + prerelease (1.2.3-rc1).
          # Greedy match takes the FIRST occurrence; later occurrences
          # are ignored, which is fine for typical squash commits.
          if [[ "$BODY" =~ \[v([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?)\] ]]; then
            VER="${BASH_REMATCH[1]}"
            echo "version_marker=${VER}" >> "$GITHUB_OUTPUT"
            echo "Detected [v${VER}] marker — release will be pinned to v${VER}."
          else
            echo "version_marker=" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    # Runs on any CUDA-equipped self-hosted runner via the shared `nvidia`
    # label (both minibeast — 4070 Ti — and beastpc — 4090 — advertise it),
    # so the job isn't bottlenecked on a single box. CUDA is required because
    # `cargo clippy --workspace --all-features` fans the `cuda` feature out
    # across the workspace, which compiles cudarc — cudarc's build.rs panics
    # if nvcc isn't on PATH. The setup-cuda-toolkit step below adds
    # /opt/cuda/bin to PATH for the job.
    runs-on: nvidia
    needs: [detect, version]
    if: needs.detect.outputs.web_only != 'true' && needs.version.outputs.only_skip_paths != 'true' && needs.detect.outputs.fast != 'true' && needs.detect.outputs.skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-lint
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          # Shared with the `test` job: both compile the same nvidia
          # `--all-features` world, so a common sccache namespace lets `test`
          # reuse the dependency objects `lint` just built (deps are compiled
          # with plain rustc under both, so they hit; only the workspace
          # crates' clippy-driver vs rustc invocations differ).
          sccache-key-prefix: sccache/blazen-nvidia-allfeatures
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup CUDA Toolkit
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-cuda-toolkit@main
        with:
          required: 'true'

      - name: Format check
        if: steps.check.outputs.completed != 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-lint
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  lint-portable:
    name: Lint (portable / Mac, no nvcc)
    # Portable lint lane that lints the FULL workspace on a non-CUDA macOS
    # runner without nvcc. `cargo clippy --workspace --all-features` can never
    # build on a Mac: `--all-features` enables the `cuda` feature, which pulls
    # `candle-kernels` whose build.rs unconditionally compiles `.cu` PTX via
    # nvcc (NvccNotFound otherwise — no env var or cudarc feature escapes it).
    # So this lane runs in two passes: (1) the whole workspace `--all-features`
    # MINUS the 12 cuda-carrying crates (so `cuda`/nvcc is never enabled), then
    # (2) those 12 crates each linted with their Mac-safe (metal/cpu/default)
    # feature set. Together with the nvidia `lint` job above (which is the
    # authoritative `--all-features` CUDA-inclusive lint), the two lanes cover
    # 100% of crates+features.
    runs-on: macos-latest
    needs: [detect, version]
    if: needs.detect.outputs.web_only != 'true' && needs.version.outputs.only_skip_paths != 'true' && needs.detect.outputs.fast != 'true' && needs.detect.outputs.skip != 'true'
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-lint-portable
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-lint-portable
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        run: brew install cmake libomp

      - name: Clippy — pass 1 (workspace --all-features, minus cuda crates)
        if: steps.check.outputs.completed != 'true'
        # Exclude every crate carrying a `cuda` feature so `--all-features`
        # never enables `cuda` (which would require nvcc on this Mac).
        run: |
          cargo clippy --workspace --all-features \
            --exclude blazen-llm-candle \
            --exclude blazen-embed-candle \
            --exclude blazen-audio-codec \
            --exclude blazen-audio-music \
            --exclude blazen-audio-stt \
            --exclude blazen-audio-dac-vendored \
            --exclude blazen-llm-mistralrs \
            --exclude blazen-llm-llamacpp \
            --exclude blazen-image-diffusion \
            -- -D warnings
        # NOTE: the three vendored `*-sys` crates (llama-cpp-sys-2 /
        # whisper-rs-sys / diffusion-rs-sys) are NOT standalone workspace
        # members — they're path deps of their wrapper crates and carry
        # nvcc-requiring `cuda` features of their own. They are never reached
        # by this pass because their wrappers are excluded above; pass 2 lints
        # them transitively via the wrappers with the cuda feature off.

      - name: Clippy — pass 2 (cuda crates, Mac-safe metal/cpu feature sets)
        if: steps.check.outputs.completed != 'true'
        # Lint each cuda-carrying crate with its non-cuda accel flag (metal/cpu
        # or default), never the `cuda` feature. The wrapper crates pull in and
        # compile their vendored `*-sys` deps (llama-cpp-sys-2 via
        # blazen-llm-llamacpp, whisper-rs-sys via blazen-audio-stt,
        # diffusion-rs-sys via blazen-image-diffusion) with cuda OFF, so the
        # sys crates are covered here without needing their own `-p` invocation
        # (they aren't standalone workspace members and can't be `-p`'d).
        run: |
          cargo clippy -p blazen-llm-candle         --features metal -- -D warnings
          cargo clippy -p blazen-embed-candle       --features metal -- -D warnings
          cargo clippy -p blazen-audio-dac-vendored --features metal -- -D warnings
          cargo clippy -p blazen-audio-codec        --features metal,encodec,dac,snac -- -D warnings
          cargo clippy -p blazen-audio-music        --features metal,musicgen,audiogen,stable-audio -- -D warnings
          cargo clippy -p blazen-audio-stt          --features metal -- -D warnings
          cargo clippy -p blazen-llm-mistralrs      --features metal -- -D warnings
          cargo clippy -p blazen-image-diffusion    --features metal -- -D warnings
          cargo clippy -p blazen-llm-llamacpp       --features metal -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-lint-portable
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test:
    name: Test
    # Same `nvidia` shared-label GPU pool as lint (minibeast + beastpc) —
    # `--all-features` compiles cudarc, which requires nvcc on PATH; the
    # setup-cuda-toolkit step exports /opt/cuda/bin into the job env.
    runs-on: nvidia
    needs: [detect, version, lint]
    if: needs.detect.outputs.web_only != 'true' && needs.version.outputs.only_skip_paths != 'true' && needs.detect.outputs.fast != 'true' && needs.detect.outputs.skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          # Shared with the `lint` job (same nvidia `--all-features` build) so
          # this job reuses lint's cached dependency objects instead of
          # recompiling the whole graph cold.
          sccache-key-prefix: sccache/blazen-nvidia-allfeatures
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup CUDA Toolkit
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-cuda-toolkit@main
        with:
          required: 'true'

      - name: Workspace tests (unit + integration)
        if: steps.check.outputs.completed != 'true'
        # Exclude blazen-py: it hardcodes pyo3/extension-module (so the
        # wheel doesn't link libpython), which means cargo can't build a
        # standalone Rust test binary for it. blazen-py is exhaustively
        # tested by the test-python job below via uv + maturin.
        run: cargo nextest run --workspace --all-features --exclude blazen-py

      - name: Doc tests (per-crate to dodge native-symbol collisions)
        if: steps.check.outputs.completed != 'true'
        # Workspace-wide `--doc --all-features` cannot link: cargo's feature
        # unification activates blazen-uniffi/cabi/node's `local-all` default,
        # which turns on BOTH `llamacpp` (llama-cpp-sys-2) and `whispercpp`
        # (whisper-rs-sys) on blazen-llm. Those sys crates each bundle ggml's
        # gguf.cpp statically; blazen-llm also pulls sentencepiece-sys + ort-sys
        # which each bundle libprotobuf statically. Rust 1.83+ merges every
        # crate's doctests into ONE binary, so rust-lld hits duplicate
        # gguf_*/protobuf symbols. The collision poisons any workspace-context
        # doctest that links blazen-llm, even under --no-default-features.
        #
        # Run doc tests per-crate so feature unification is scoped to each
        # crate's own subtree. blazen-llm uses a curated set that exercises the
        # provider/embed/llm/diffusion surface without the mutually-conflicting
        # native audio/codec backends (all 23 of its doctests pass this way).
        # Skipped crates pull BOTH backends under --all-features and carry
        # generated/thin surfaces with no meaningful doctests: the FFI crates
        # (uniffi/cabi/node/manager) and the blazen-cli binary (the only
        # library/bin that fails a standalone `--doc --all-features` build —
        # verified by sweeping all 47 members locally). blazen-py is excluded
        # because it can't build a standalone Rust test binary (extension-module).
        run: |
          set -euo pipefail
          SKIP="blazen-py blazen-llm blazen-uniffi blazen-cabi blazen-node blazen-manager blazen-cli"
          for crate in $(cargo metadata --no-deps --format-version 1 \
              | python3 -c "import json,sys; print('\n'.join(p['name'] for p in json.load(sys.stdin)['packages']))"); do
            case " $SKIP " in *" $crate "*) continue ;; esac
            echo "::group::doctest $crate"
            cargo test --doc -p "$crate" --all-features
            echo "::endgroup::"
          done
          echo "::group::doctest blazen-llm (curated)"
          cargo test --doc -p blazen-llm --no-default-features \
            --features "content-detect,reqwest,tiktoken,embed,mistralrs,candle-llm,diffusion,vllm,ollama,tgi,lmstudio"
          echo "::endgroup::"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-python:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    needs: [detect, version, lint]
    if: needs.detect.outputs.web_only != 'true' && needs.version.outputs.only_skip_paths != 'true' && needs.detect.outputs.fast != 'true' && needs.detect.outputs.skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-python
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Python + uv
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install deps and build wheel
        if: steps.check.outputs.completed != 'true'
        run: uv sync --group dev

      - name: Verify Python stubs are up to date
        if: steps.check.outputs.completed != 'true'
        # Regenerate blazen.pyi from Rust source and fail if it drifts
        # from the committed version. This enforces that stubs are
        # generated, not hand-written.
        run: |
          cargo run --example stub_gen -p blazen-py --features langfuse,otlp,prometheus,tract,distributed
          git diff --exit-code crates/blazen-py/blazen.pyi || {
            echo "::error::blazen.pyi is stale. Run 'cargo run --example stub_gen -p blazen-py --features langfuse,otlp,prometheus,tract,distributed' and commit the result."
            exit 1
          }

      - name: Run Python unit tests (parallel)
        if: steps.check.outputs.completed != 'true'
        run: uv run pytest -v -n auto --timeout=30 tests/python/test_workflow.py tests/python/test_session_refs.py tests/python/test_e2e.py tests/python/test_model_manager_smoke.py

      # Provider FUNCTIONALITY tests: exercise Blazen's own logic (streaming,
      # structured output, agent tool-loop, request shaping, error mapping)
      # against a local mock HTTP server. No external API, no provider keys, so
      # they run fast and deterministically on every push. The real external
      # provider wire-format is verified separately, weekly, by
      # provider-conformance.yaml (the conformance tier).
      - name: Run Python provider functionality tests (mocked, no external API)
        if: steps.check.outputs.completed != 'true'
        run: uv run pytest -v -n auto --timeout=60 tests/python/test_capabilities_functionality.py tests/python/test_provider_functionality.py

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  test-node:
    name: Test Node.js Bindings
    runs-on: ubuntu-latest
    needs: [detect, version, lint]
    if: needs.detect.outputs.web_only != 'true' && needs.version.outputs.only_skip_paths != 'true' && needs.detect.outputs.fast != 'true' && needs.detect.outputs.skip != 'true'
    steps:
      - name: Checkout
