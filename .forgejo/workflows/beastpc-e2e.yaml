name: BeastPC E2E (GPU)

# End-to-end GPU validation for the audio / 3D / video / diffusion / candle-LLM
# crates. Runs on the BeastPC self-hosted Forgejo runner (4090 24 GB today;
# inbound 5090 + 128 GB rig will additionally carry the `big-vram` label).
#
# Triggers:
#   - workflow_dispatch (primary trigger today — manual gate before merging
#     GPU-touching work)
#   - push to main with a path filter on audio/3D/video/diffusion + candle-LLM
#   - push of tag v* (pre-release validation on the cut tag itself)
#   - (DISABLED) nightly schedule — re-enabled in a follow-up commit once the
#     first clean manual run has landed; see the commented `schedule:` below.

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "crates/blazen-audio-core/**"
      - "crates/blazen-audio-codec/**"
      - "crates/blazen-audio-music/**"
      - "crates/blazen-audio-tts/**"
      - "crates/blazen-audio-vc/**"
      - "crates/blazen-audio-stt/**"
      - "crates/blazen-audio-dac-vendored/**"
      - "crates/blazen-audio-piper-vendored/**"
      - "crates/blazen-3d/**"
      - "crates/blazen-image-diffusion/**"
      - "crates/blazen-llm-candle/**"
      - "crates/blazen-llm-mistralrs/**"
      - ".forgejo/workflows/beastpc-e2e.yaml"
    tags:
      - "v*"
  # schedule:
  #   # Nightly at 05:00 UTC. Disabled until a clean manual run lands —
  #   # enable in a follow-up commit so cron noise can't mask scaffolding bugs.
  #   - cron: '0 5 * * *'

concurrency:
  group: beastpc-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  # Cache models under the runner's home so re-runs hit cached weights.
  # Mirrors the convention in live-models.yaml.
  BLAZEN_TESTS_CACHE: "/root/.cache/blazen-tests"
  # candle-kernels' build.rs invokes `nvidia-smi` during build-script execution
  # to auto-detect compute cap and fails on the runner's PATH layout. Hard-pin
  # to 89 (Ada — matches the 4090 BeastPC GPU). Bump to "89;120" when the
  # inbound 5070 Ti / 5090 Blackwell box is wired in.
  CUDA_COMPUTE_CAP: "89"
  # CUDA_HOME + PATH for nvcc are set by the `Setup CUDA Toolkit` step below
  # (Public/actions/setup-cuda-toolkit@main) — it probes /opt/cuda, /usr, etc.
  # and exports CUDA_HOME deterministically. The forgejo-runner systemd unit
  # has empty Environment= so the interactive shell's CUDA path addition
  # doesn't reach jobs.

jobs:
  e2e:
    name: BeastPC GPU E2E
    runs-on: beastpc
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        # The repo pins via rust-toolchain.toml (channel = "stable"). The BeastPC
        # runner is a PERSISTENT self-hosted box that already has the toolchain;
        # raw dtolnay/rust-toolchain runs rustup-init, which fails on this runner
        # with "could not create bin directory '/home/forgejo-runner/.cargo/bin':
        # Permission denied". Use the in-house self-hosted-aware setup-rust action
        # (same as ci.yaml's `nvidia` jobs) — light, no sccache on this heavy GPU
        # box, just registry auth for the private Forgejo cargo index.
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup CUDA Toolkit
        # Probes /opt/cuda, /usr, etc. and exports CUDA_HOME + nvcc on PATH
        # deterministically (the forgejo-runner systemd unit has empty
        # Environment= so the interactive shell's CUDA path doesn't reach jobs).
        # Required because the workspace build below is --all-features (CUDA).
        uses: https://forge.blackleafdigital.com/Public/actions/setup-cuda-toolkit@main
        with:
          required: 'true'

      - name: Install nextest
        uses: https://github.com/taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Show GPU + CUDA info
        # Logs nvidia-smi + nvcc version up front so failures linked to driver
        # mismatch are obvious in the run output. Non-fatal — if either tool is
        # missing the later cargo build will surface the real error.
        run: |
          nvidia-smi || true
          nvcc --version || true

      - name: Build workspace (--all-features, CUDA-aware)
        # Heavy build against the runner's CUDA toolchain. Allocate 60 min so
        # cold builds (no incremental, no sccache) don't hit the job's overall
        # ceiling.
        timeout-minutes: 60
        run: cargo build --workspace --all-features

      # -------------------------------------------------------------------
      # Audio E2E — sequential, one GPU at a time.
      # -------------------------------------------------------------------
      - name: Audio E2E — music (stable-audio + musicgen)
        run: cargo nextest run -p blazen-audio-music --features stable-audio,musicgen --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      - name: Audio E2E — TTS (bark + f5-tts)
        run: cargo nextest run -p blazen-audio-tts --features bark,f5-tts --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      - name: Audio E2E — voice conversion (rvc)
        run: cargo nextest run -p blazen-audio-vc --features rvc --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      - name: Audio E2E — STT (whisper-streaming + whispercpp + candle)
        run: cargo nextest run -p blazen-audio-stt --features whisper-streaming,whispercpp,candle --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      # -------------------------------------------------------------------
      # GPU LLM + image diffusion E2E — sequential.
      # -------------------------------------------------------------------
      - name: LLM E2E — candle
        run: cargo nextest run -p blazen-llm-candle --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      - name: LLM E2E — mistralrs
        run: cargo nextest run -p blazen-llm-mistralrs --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      - name: Image diffusion E2E
        run: cargo nextest run -p blazen-image-diffusion --run-ignored only --test-threads=1
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      # -------------------------------------------------------------------
      # 3D E2E — compat-proxy (mocked HTTP) today; native TripoSR slot is
      # ready but commented out until blazen-3d-core lands.
      # -------------------------------------------------------------------
      - name: 3D E2E — compat-proxy (mocked HTTP)
        run: cargo nextest run -p blazen-3d --features compat-proxy --run-ignored only --test-threads=1

      # - name: 3D E2E — blazen-3d-core (TripoSR native)
      #   # Activate this line once blazen-3d-core ships its TripoSR native port.
      #   run: cargo nextest run -p blazen-3d-core --run-ignored only --test-threads=1
      #   env:
      #     BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}

      # -------------------------------------------------------------------
      # Video E2E — gated on FAL_KEY (the cloud-video smoke hits fal.ai).
      # -------------------------------------------------------------------
      - name: Video E2E — cloud_video_smoke (fal.ai)
        if: ${{ secrets.FAL_KEY != '' }}
        run: cargo nextest run --test cloud_video_smoke --run-ignored only
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}

      # -------------------------------------------------------------------
      # Binding smokes — Python + Node, GPU-gated.
      # -------------------------------------------------------------------
      - name: Setup Python + uv
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install Python deps and build wheel (GPU features)
        # Match the stub-gen feature set so feature-gated symbols compile in;
        # see CLAUDE.md § "Regenerate typegens" for the canonical list.
        run: |
          uv sync --group dev
          uv run --no-sync maturin develop -m crates/blazen-py/Cargo.toml \
              --features langfuse,otlp,prometheus,tract,distributed --release

      - name: Python GPU smokes (-k gpu, serial)
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}
          BLAZEN_TEST_STABLE_AUDIO: "1"
          BLAZEN_TEST_BARK: "1"
          BLAZEN_TEST_F5: "1"
          BLAZEN_TEST_RVC: "1"
          BLAZEN_TEST_WHISPER_STREAMING: "1"
        run: uv run --no-sync pytest tests/python/ -k gpu -p no:xdist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Build Node bindings
        run: |
          pnpm install
          pnpm --filter blazen run build

      - name: Node GPU smokes (ava, guarded on glob match)
        # The *_gpu.mjs glob may be empty today; guard the invocation so the
        # job doesn't fail purely because no GPU-tagged Node tests exist yet.
        env:
          BLAZEN_HF_TOKEN: ${{ secrets.BLAZEN_HF_TOKEN }}
        run: |
          shopt -s nullglob
          gpu_tests=(tests/node/*_gpu.mjs)
          if [ ${#gpu_tests[@]} -eq 0 ]; then
            echo "No Node GPU smoke tests found (tests/node/*_gpu.mjs) — skipping."
            exit 0
          fi
          pnpm exec ava --timeout 60s "${gpu_tests[@]}"

      # -------------------------------------------------------------------
      # Artifact collection — WAVs + GLBs + a small markdown summary derived
      # from nextest's libtest-json output (best effort; the report stays
      # valid even if some upstream tests didn't emit artifacts).
      # -------------------------------------------------------------------
      - name: Collect test artifacts (WAV + GLB) and render report
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts/wav artifacts/glb artifacts/reports

          # Audio outputs land under target/blazen-tests/ by convention; sweep
          # both that path and the generic target dir for stray *.wav / *.glb.
          find target -type f -name "*.wav" -not -path "*/deps/*" -print0 2>/dev/null \
            | xargs -0 -r -I{} cp -n "{}" artifacts/wav/ || true
          find target -type f -name "*.glb" -not -path "*/deps/*" -print0 2>/dev/null \
            | xargs -0 -r -I{} cp -n "{}" artifacts/glb/ || true

          # Render a small markdown summary. We re-run nextest with `list` to
          # enumerate executed binaries on this run; failures (if any) already
          # surfaced through job-level red.
          {
            echo "# BeastPC E2E summary"
            echo
            echo "- Commit: \`${GITHUB_SHA:-unknown}\`"
            echo "- Ref:    \`${GITHUB_REF:-unknown}\`"
            echo "- Runner: \`${RUNNER_NAME:-beastpc}\`"
            echo
            echo "## WAV artifacts"
            ls -1 artifacts/wav 2>/dev/null | sed 's/^/- /' || echo "_none_"
            echo
            echo "## GLB artifacts"
            ls -1 artifacts/glb 2>/dev/null | sed 's/^/- /' || echo "_none_"
          } > artifacts/reports/summary.md

          # If `jq` is on the runner, attach a pass/fail table from
          # nextest's libtest-json output for the most recent invocation —
          # otherwise just skip silently.
          if command -v jq >/dev/null 2>&1; then
            cargo nextest list --workspace --message-format json 2>/dev/null \
              | jq -r 'select(.type=="test") | "- " + .name' \
              >> artifacts/reports/summary.md || true
          fi

      - name: Upload artifacts (WAV + GLB + report)
        if: always()
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: beastpc-e2e-${{ github.run_id }}
          path: |
            artifacts/wav/**
            artifacts/glb/**
            artifacts/reports/**
          if-no-files-found: warn
          retention-days: 14
