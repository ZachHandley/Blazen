name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch



  publish-rust:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-publish-rust
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Publish crates in dependency order
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/cargo-publish-workspace@main
        with:
          version: ${{ needs.version.outputs.version }}
          registry: crates-io
          exclude: blazen-py,blazen-node
          cargo-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          max-backoff-seconds: '300'
          max-attempts-per-crate: '5'

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-wheels:
    name: Build wheels (${{ matrix.target }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            container-kind: manylinux
            manylinux: "2_28"
          - target: aarch64-unknown-linux-gnu
            runs-on: arm64
            container: quay.io/pypa/manylinux_2_28_aarch64
            container-kind: manylinux
            manylinux: "2_28"
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            container: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl
            container-kind: musl
            manylinux: "musllinux_1_2"
            openssl-vendored: "1"
          - target: aarch64-unknown-linux-musl
            runs-on: arm64
            container: ghcr.io/rust-cross/rust-musl-cross:aarch64-musl
            container-kind: musl
            manylinux: "musllinux_1_2"
            openssl-vendored: "1"
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
      OPENSSL_STATIC: ${{ matrix.openssl-vendored }}
      OPENSSL_VENDORED: ${{ matrix.openssl-vendored }}
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Bootstrap Node.js for actions (manylinux)
        if: matrix.container-kind == 'manylinux'
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          yum install -y nodejs

      - name: Bootstrap Node.js for actions (musl)
        if: matrix.container-kind == 'musl'
        run: |
          apt-get update -qq
          apt-get install -y -qq curl
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (manylinux)
        if: matrix.container-kind == 'manylinux'
        run: yum install -y cmake openssl-devel ccache pkg-config curl

      - name: Install system deps (musl)
        if: matrix.container-kind == 'musl'
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ccache pkg-config curl libssl-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ccache

      - name: Install Git Bash (Windows)
        if: runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-msvc@main
        with:
          arch: x64

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: ${{ matrix.target }}
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-wheels-${{ matrix.target }}
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Python 3.10
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.10'
      - name: Setup Python 3.11
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.11'
      - name: Setup Python 3.12
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'
      - name: Setup Python 3.13
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.13'
      - name: Setup Python 3.14
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.14'

      - name: Install maturin
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            uv tool install --with patchelf maturin
          else
            uv tool install maturin
          fi

      - name: Stamp version
        shell: bash
        run: uv run --no-project python scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Build wheels
        shell: bash
        run: |
          INTERPRETERS=""
          for V in 3.10 3.11 3.12 3.13 3.14; do
            INTERP=$(uv python find "$V" 2>/dev/null) && INTERPRETERS="$INTERPRETERS -i $INTERP" || echo "Python $V unavailable, skipping"
          done
          echo "Building for ${{ matrix.target }} with: $INTERPRETERS"
          MANYLINUX_FLAG=""
          if [ -n "${{ matrix.manylinux }}" ]; then
            MANYLINUX_FLAG="--manylinux ${{ matrix.manylinux }}"
          fi
          maturin build --release \
            -m crates/blazen-py/Cargo.toml \
            --target ${{ matrix.target }} \
            $MANYLINUX_FLAG \
            $INTERPRETERS

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
      - name: Stamp version
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}
      - name: Build sdist
        run: uvx maturin sdist -m crates/blazen-py/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v3
        with:
          name: sdist
          path: target/wheels/*.tar.gz
          if-no-files-found: error

  publish-python:
    name: Publish Python Package
    needs: [version, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install uv
        if: steps.check.outputs.completed != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Download all artifacts
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          path: dist/

      - name: Flatten wheel subdirectories
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p dist/flat
          find dist/ -mindepth 2 -name '*.whl' -exec mv {} dist/flat/ \;
          find dist/ -mindepth 2 -name '*.tar.gz' -exec mv {} dist/flat/ \;
          ls -lh dist/flat/

      - name: List artifacts before upload
        if: steps.check.outputs.completed != 'true'
        run: ls -lh dist/

      - name: Publish to PyPI
        if: steps.check.outputs.completed != 'true'
        run: |
          uvx twine upload \
            -u __token__ \
            -p ${{ secrets.PYPI_TOKEN }} \
            dist/flat/*.whl dist/flat/*.tar.gz

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-napi:
    name: Build napi binary (${{ matrix.target }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            container-kind: manylinux
          - target: aarch64-unknown-linux-gnu
            runs-on: arm64
            container: quay.io/pypa/manylinux_2_28_aarch64
            container-kind: manylinux
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            container: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl
            container-kind: musl
            openssl-vendored: "1"
          - target: aarch64-unknown-linux-musl
            runs-on: arm64
            container: ghcr.io/rust-cross/rust-musl-cross:aarch64-musl
            container-kind: musl
            openssl-vendored: "1"
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
      OPENSSL_STATIC: ${{ matrix.openssl-vendored }}
      OPENSSL_VENDORED: ${{ matrix.openssl-vendored }}
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Bootstrap Node.js for actions (manylinux)
        if: matrix.container-kind == 'manylinux'
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          yum install -y nodejs

      - name: Bootstrap Node.js for actions (musl)
        if: matrix.container-kind == 'musl'
        run: |
          apt-get update -qq
          apt-get install -y -qq curl
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (manylinux)
        if: matrix.container-kind == 'manylinux'
        run: yum install -y cmake openssl-devel ccache pkg-config curl

      - name: Install system deps (musl)
        if: matrix.container-kind == 'musl'
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ccache pkg-config curl libssl-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ccache

      - name: Install Git Bash (Windows)
        if: runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-msvc@main
        with:
          arch: x64

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: ${{ matrix.target }}
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-napi-${{ matrix.target }}
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Node.js
        uses: https://forge.blackleafdigital.com/Public/actions/setup-node@main
        with:
          node-version: '20'
          package-manager: pnpm

      - name: Setup Python (for stamping)
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Stamp version
        shell: bash
        run: uv run --no-project python scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Install npm deps
        shell: bash
        run: pnpm install

      - name: Build napi binary
        shell: bash
        run: |
          pnpm --filter blazen exec napi build \
            --release \
            --platform \
            --target ${{ matrix.target }} \
            --features local-all \
            --js index.js

      - name: Upload napi artifact
        uses: actions/upload-artifact@v3
        with:
          name: napi-${{ matrix.target }}
          path: crates/blazen-node/blazen.*.node
          if-no-files-found: error

  publish-node:
    name: Publish Node Package
    needs: [version, build-napi]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Install dependencies
        if: steps.check.outputs.completed != 'true'
        run: pnpm install

      - name: Download napi artifacts
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          path: crates/blazen-node/artifacts

      - name: Move napi artifacts into npm subpackages
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: pnpm exec napi artifacts

      - name: List napi subpackages
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: ls -la npm/ || true

      - name: Publish subpackages and main package to npm
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          pnpm exec napi prepublish -t npm --skip-gh-release
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-wasm:
    name: Publish WASM SDK
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-bucket: ${{ secrets.S3_BUCKET }}
          sccache-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-region: ${{ secrets.S3_REGION }}
          sccache-access-key: ${{ secrets.S3_ACCESS_KEY }}
          sccache-secret-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-publish-wasm
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Install wasm-pack
        if: steps.check.outputs.completed != 'true'
        run: which wasm-pack || cargo install wasm-pack

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Build WASM SDK
        if: steps.check.outputs.completed != 'true'
        run: |
          cd crates/blazen-wasm-sdk
          wasm-pack build --target bundler --release

      - name: Publish to npm
        if: steps.check.outputs.completed != 'true'
        run: |
          cd crates/blazen-wasm-sdk/pkg
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          npm publish --access public

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, publish-rust, publish-python, publish-node, publish-wasm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install git-cliff
        if: steps.check.outputs.completed != 'true'
        run: |
          GC_VERSION="2.7.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv "git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/
          git-cliff --version

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="v${{ needs.version.outputs.version }}"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git-cliff "${LAST_TAG}..${VERSION}" --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          else
            git-cliff --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          fi

          cat > RELEASE_NOTES.md << NOTES_EOF
          $(cat CHANGELOG_RELEASE.md)

          ## Installation

          **Rust:**
          \`\`\`bash
          cargo add blazen
          \`\`\`

          **Python:**
          \`\`\`bash
          pip install blazen
          \`\`\`

          **Node.js:**
          \`\`\`bash
          pnpm add blazen
          \`\`\`

          **WebAssembly:**
          \`\`\`bash
          npm install @blazen/sdk
          \`\`\`
          NOTES_EOF

      - name: Create Forgejo release
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="v${{ needs.version.outputs.version }}"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"name\": \"Blazen ${VERSION}\",
              \"body\": $(jq -Rs . < RELEASE_NOTES.md),
              \"draft\": false,
              \"prerelease\": false
            }"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  mirror-github:
    name: Mirror to GitHub
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Dispatch mirror workflow
        run: |
          curl -s -X POST \
