name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

  test-llm-smoke:
    name: LLM Smoke Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.12

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore cargo cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build Python bindings
        run: uv sync --directory crates/blazen-py --extra dev

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build Node bindings
        run: |
          cd crates/blazen-node
          pnpm install
          pnpm run build

      - name: Run Python LLM smoke tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run --directory crates/blazen-py pytest -v -k "llm_smoke"

      - name: Run Node LLM smoke tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node --test tests/node/test_llm_smoke.mjs

      - name: Save cargo cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  publish-rust:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    needs: [version, test-llm-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Restore cargo cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Stamp versions
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Stamping all crate versions with $VERSION"
          # Update workspace version
          sed -i "s/^version = \"0.1.0\"/version = \"$VERSION\"/" Cargo.toml
          # Update internal dependency versions
          sed -i "s/blazen-events = { version = \"0.1.0\"/blazen-events = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-macros = { version = \"0.1.0\"/blazen-macros = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-core = { version = \"0.1.0\"/blazen-core = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-llm = { version = \"0.1.0\"/blazen-llm = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-persist = { version = \"0.1.0\"/blazen-persist = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-pipeline = { version = \"0.1.0\"/blazen-pipeline = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-prompts = { version = \"0.1.0\"/blazen-prompts = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen-telemetry = { version = \"0.1.0\"/blazen-telemetry = { version = \"$VERSION\"/" Cargo.toml
          sed -i "s/blazen = { version = \"0.1.0\"/blazen = { version = \"$VERSION\"/" Cargo.toml

      - name: Publish crates in dependency order
        if: steps.check.outputs.completed != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order with --no-verify (workspace deps are local/forgejo, not crates.io)
          cargo publish -p blazen-events --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-macros --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-persist --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-core --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-llm --all-features --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-prompts --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-pipeline --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-telemetry --all-features --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen --all-features --no-verify --allow-dirty
          sleep 10
          cargo publish -p blazen-cli --no-verify --allow-dirty

      - name: Save cargo cache
        if: always() && steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-python:
    name: Publish Python Package
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Install uv
        if: steps.check.outputs.completed != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install Python interpreters
        if: steps.check.outputs.completed != 'true'
        run: |
          uv python install 3.10 3.11 3.12 3.13 3.14 || true
          echo "Installed interpreters:"
          uv python list --only-installed

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # Update workspace version so maturin picks it up
          sed -i "s/^version = \"0.1.0\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build wheels for all Python versions
        if: steps.check.outputs.completed != 'true'
        run: |
          # Resolve full paths to uv-managed interpreters
          INTERPRETERS=""
          for V in 3.10 3.11 3.12 3.13 3.14; do
            INTERP=$(uv python find "$V" 2>/dev/null) && INTERPRETERS="$INTERPRETERS -i $INTERP" || echo "Python $V not available, skipping"
          done
          echo "Building with: $INTERPRETERS"
          uvx maturin build --release -m crates/blazen-py/Cargo.toml $INTERPRETERS

      - name: Build sdist
        if: steps.check.outputs.completed != 'true'
        run: uvx maturin sdist -m crates/blazen-py/Cargo.toml

      - name: Publish to PyPI
        if: steps.check.outputs.completed != 'true'
        run: |
          uvx twine upload \
            -u __token__ \
            -p ${{ secrets.PYPI_TOKEN }} \
            target/wheels/*.whl target/wheels/*.tar.gz

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-node:
    name: Publish Node Package
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # Update workspace version
          sed -i "s/^version = \"0.1.0\"/version = \"$VERSION\"/" Cargo.toml
          # Update package.json version
          sed -i "s/\"version\": \"0.1.0\"/\"version\": \"$VERSION\"/" crates/blazen-node/package.json

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        if: steps.check.outputs.completed != 'true'
        run: |
          cd crates/blazen-node
          pnpm install

      - name: Build with napi
        if: steps.check.outputs.completed != 'true'
        run: |
          cd crates/blazen-node
          pnpm run build

      - name: Publish to npm
        if: steps.check.outputs.completed != 'true'
        run: |
          cd crates/blazen-node
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          pnpm publish --no-git-checks

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, publish-rust, publish-python, publish-node]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install git-cliff
        if: steps.check.outputs.completed != 'true'
        run: |
          GC_VERSION="2.7.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv "git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/
          git-cliff --version

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="v${{ needs.version.outputs.version }}"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git-cliff "${LAST_TAG}..${VERSION}" --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          else
            git-cliff --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          fi

          cat > RELEASE_NOTES.md << NOTES_EOF
          $(cat CHANGELOG_RELEASE.md)

          ## Installation

          **Rust:**
          \`\`\`bash
          cargo add blazen
          \`\`\`

          **Python:**
          \`\`\`bash
          pip install blazen
          \`\`\`

          **Node.js:**
          \`\`\`bash
          pnpm add blazen
          \`\`\`
          NOTES_EOF

      - name: Create Forgejo release
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="v${{ needs.version.outputs.version }}"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"name\": \"Blazen ${VERSION}\",
              \"body\": $(jq -Rs . < RELEASE_NOTES.md),
              \"draft\": false,
              \"prerelease\": false
            }"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
