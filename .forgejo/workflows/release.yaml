name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (no v prefix). Leave empty to auto-resolve via resolve-version.'
        required: false
        type: string
        default: ''
  push:
    # Subdirectory-tagged binding releases. Go modules use `bindings/go/vX.Y.Z`
    # as the canonical tag form (Go's module proxy resolves this tag when
    # users `go get github.com/.../bindings/go@vX.Y.Z`). Swift releases use
    # the same subdirectory pattern for parity. Tag pushes here only run
    # the binding-specific release-go / release-swift jobs; the full
    # crate/wheel/npm publish flow continues to fire from workflow_dispatch.
    tags:
      - 'bindings/go/v*'
      - 'bindings/swift/v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    # workflow_dispatch only — binding tag pushes (bindings/go/v*,
    # bindings/swift/v*) flow into release-go / release-swift below and
    # must NOT trigger the main Rust/Python/Node publish pipeline.
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.pick.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version (fallback if no input)
        id: resolve
        if: github.event.inputs.version == ''
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

      - name: Pick version (input wins, else fallback)
        id: pick
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          FALLBACK="${{ steps.resolve.outputs.version }}"
          if [ -n "$INPUT" ]; then
            echo "version=${INPUT}" >> "$GITHUB_OUTPUT"
            echo "Using dispatch input version: ${INPUT}"
          elif [ -n "$FALLBACK" ]; then
            echo "version=${FALLBACK}" >> "$GITHUB_OUTPUT"
            echo "Using resolve-version fallback: ${FALLBACK}"
          else
            echo "::error::No version supplied via input AND resolve-version produced no output"
            exit 1
          fi

  fetch-artifacts:
    name: Fetch Build Artifacts
    runs-on: ubuntu-latest
    needs: version
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts from Forgejo generic package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"

          mkdir -p dist/wheels dist/sdist dist/napi dist/wasm

          # List artifacts known to be produced by build-artifacts.yaml.
          # We expect: wheels-<6 targets>.tar.gz, sdist.tar.gz, napi-<6 targets>.tar.gz, wasm.tar.gz
          WHEEL_TARGETS=(
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            aarch64-apple-darwin
            x86_64-pc-windows-msvc
          )
          NAPI_TARGETS=(
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            aarch64-apple-darwin
            x86_64-pc-windows-msvc
            wasm32-wasi
          )

          fetch_or_die() {
            local URL="$1"
            local DEST="$2"
            local CODE
            CODE=$(curl --silent --output "$DEST" --write-out '%{http_code}' -u "$AUTH" "$URL")
            if [ "$CODE" != "200" ]; then
              echo "::error::Failed to download $URL (HTTP $CODE). Run build-artifacts.yaml for v${VERSION} first."
              rm -f "$DEST"
              exit 1
            fi
          }

          for T in "${WHEEL_TARGETS[@]}"; do
            fetch_or_die "${BASE}/wheels-${T}.tar.gz" "/tmp/wheels-${T}.tar.gz"
            tar -xzf "/tmp/wheels-${T}.tar.gz" -C dist/wheels
          done

          # Restore the maturin sdist filename so twine/PyPI accept it (PEP 625
          # requires {package_name}-{version}.tar.gz). build-artifacts.yaml
          # uploaded it under a generic name; rename on the way down.
          fetch_or_die "${BASE}/sdist.tar.gz" "dist/sdist/blazen-${VERSION}.tar.gz"

          for T in "${NAPI_TARGETS[@]}"; do
            fetch_or_die "${BASE}/napi-${T}.tar.gz" "/tmp/napi-${T}.tar.gz"
            tar -xzf "/tmp/napi-${T}.tar.gz" -C dist/napi
          done

          fetch_or_die "${BASE}/wasm.tar.gz" "/tmp/wasm.tar.gz"
          tar -xzf "/tmp/wasm.tar.gz" -C dist/wasm
          # build-artifacts.yaml tars `crates/blazen-wasm-sdk/pkg` so the result is dist/wasm/pkg/

          echo "Fetched artifacts:"
          ls -lh dist/wheels/ dist/sdist/ dist/napi/ dist/wasm/ dist/wasm/pkg/ 2>/dev/null || true

      - name: Upload to current run for downstream jobs
        uses: actions/upload-artifact@v3
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish-rust:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-publish-rust
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Publish crates in dependency order
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/cargo-publish-workspace@main
        with:
          version: ${{ needs.version.outputs.version }}
          registry: crates-io
          exclude: blazen-py,blazen-node
          cargo-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          max-backoff-seconds: '300'
          max-attempts-per-crate: '5'

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-python:
    name: Publish Python Package
    needs: [version, fetch-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install uv
        if: steps.check.outputs.completed != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Download release-dist artifact
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          name: release-dist
          path: dist

      - name: List artifacts before upload
        if: steps.check.outputs.completed != 'true'
        run: ls -lh dist/wheels/ dist/sdist/

      - name: Publish to PyPI
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/pypi-publish-workspace@main
        with:
          version: ${{ needs.version.outputs.version }}
          package-name: blazen
          pypi-token: ${{ secrets.PYPI_TOKEN }}
          dist-dir: dist
          wheel-glob: wheels/*.whl
          sdist-glob: sdist/*.tar.gz

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-node:
    name: Publish Node Package
    needs: [version, fetch-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Install dependencies
        if: steps.check.outputs.completed != 'true'
        run: pnpm install

      - name: Download release-dist artifact
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          name: release-dist
          path: dist

      - name: Stage napi binaries for napi artifacts step
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p crates/blazen-node/artifacts
          # napi-rs's `napi artifacts` command expects per-target subdirectories
          # under artifacts/, each containing the target's blazen.*.node file.
          # Our fetched dist/napi/ has all .node files flat (one per target,
          # filename-encoded). napi-rs auto-detects target from filename, so
          # we just copy each .node into a directory named after itself.
          shopt -s nullglob
          NODE_FILES=(dist/napi/blazen.*.node)
          if [ ${#NODE_FILES[@]} -eq 0 ]; then
            echo "::error::No napi .node binaries found in dist/napi/"
            exit 1
          fi
          for F in "${NODE_FILES[@]}"; do
            BASE=$(basename "$F" .node)
            SUB="crates/blazen-node/artifacts/${BASE}"
            mkdir -p "$SUB"
            cp "$F" "$SUB/"
          done

          # Stage wasi shim + wasm binary. The wasm32-wasi target produces three
          # files (blazen.wasi.cjs, blazen.wasi-browser.js, blazen.wasm32-wasi.wasm)
          # that all belong to the @blazen-dev/blazen-wasm32-wasi subpackage.
          # Without these, `napi artifacts` finds nothing for the wasi target,
          # `napi prepublish` skips it, and V8-isolate consumers (Cloudflare
          # Workers / Deno) have no working sidecar to fall back to.
          # `napi artifacts` walks artifacts/ recursively and routes by filename
          # pattern, so any subdir works as long as all three live together.
          # Explicit file list (not glob) so a missing file fails loud instead
          # of silently re-introducing the original bug.
          WASI_FILES=(
            dist/napi/blazen.wasi.cjs
            dist/napi/blazen.wasi-browser.js
            dist/napi/blazen.wasm32-wasi.wasm
          )
          WASI_SUB="crates/blazen-node/artifacts/wasm32-wasi"
          mkdir -p "$WASI_SUB"
          for F in "${WASI_FILES[@]}"; do
            if [ ! -f "$F" ]; then
              echo "::error::Missing wasi artifact: $F (build-artifacts.yaml's wasm32-wasi leg did not run, or its upload step changed)"
              exit 1
            fi
            cp "$F" "$WASI_SUB/"
          done
          ls -laR crates/blazen-node/artifacts/

      - name: Create npm subpackage dirs
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: pnpm exec napi create-npm-dirs

      - name: Move napi artifacts into npm subpackages
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: pnpm exec napi artifacts

      - name: Patch wasm32-wasi subpackage exports map + typedefs
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        shell: bash
        run: |
          set -euo pipefail
          # Two things happening here:
          #
          # 1. wasm-file subpath export. The top-level `blazen/workers` entry does
          #      import wasm from '@blazen-dev/blazen-wasm32-wasi/blazen.wasm32-wasi.wasm'
          #    which only resolves under exports-map-enforcing resolvers (Node >=16,
          #    wrangler, @cloudflare/vite-plugin) if the wasm32-wasi subpackage
          #    exposes the .wasm file as an exports subpath. napi-rs's default
          #    generated package.json doesn't, so we patch it here.
          #
          # 2. Typedefs. napi-rs's per-target subpackages contain only the binary +
          #    JS loaders; the typed napi API surface lives in the main `blazen`
          #    package's index.d.ts. Without a .d.ts here,
          #    `@blazen-dev/wasi`'s `export * from '@blazen-dev/blazen-wasm32-wasi'`
          #    (crates/blazen-workers-alias/index.d.ts) resolves to `any` under any
          #    TS-aware resolver. Copy the main index.d.ts in so the subpackage is
          #    type-aware on its own merits; per-condition `types` under `.` is
          #    what modern Node 16+/TS 5+ reads, top-level `types` is the fallback
          #    for older resolvers.
          #
          # Kept symmetric with examples/astro-cloudflare/scripts/stage-local-blazen.sh.
          PKG="npm/wasm32-wasi/package.json"
          if [ ! -f "$PKG" ]; then
            echo "::error::expected $PKG to exist after `napi artifacts`"
            exit 1
          fi

          cp index.d.ts npm/wasm32-wasi/blazen.wasi.d.ts

          jq '.types = "./blazen.wasi.d.ts" |
              .exports = {
                ".": {
                  "types":   "./blazen.wasi.d.ts",
                  "browser": "./blazen.wasi-browser.js",
                  "module":  "./blazen.wasi-browser.js",
                  "import":  "./blazen.wasi-browser.js",
                  "require": "./blazen.wasi.cjs",
                  "default": "./blazen.wasi.cjs"
                },
                "./blazen.wasm32-wasi.wasm": "./blazen.wasm32-wasi.wasm",
                "./package.json": "./package.json"
              }' "$PKG" > "$PKG.tmp"
          mv "$PKG.tmp" "$PKG"
          echo "=== patched $PKG ==="
          cat "$PKG"

      - name: List napi subpackages
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: ls -la npm/ || true

      - name: List napi npm subpackages to be published
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        shell: bash
        run: |
          echo "=== napi/ subpackages ==="
          ls -la npm/ || true
          echo "=== Per-target package.jsons ==="
          for d in npm/*/; do
            echo "--- $d ---"
            cat "$d/package.json" 2>/dev/null | head -30
          done

      - name: Publish subpackages and main package to npm
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc

          # napi prepublish publishes each per-target subpackage. napi-rs's
          # pre-publish.ts internally catches npm's "cannot publish over the
          # previously published versions" error and continues, so duplicate
          # subpackage versions are handled transparently. No `|| true` needed.
          #
          # --no-gh-release is REQUIRED on Forgejo runners: napi-rs v3 defaults
          # ghRelease=true and fires against api.github.com whenever
          # GITHUB_REPOSITORY is set in env. Forgejo sets that for
          # GitHub-Actions compatibility, so without the flag napi gets 401s
          # trying to use the Forgejo token against github.com.
          pnpm exec napi prepublish -t npm --no-gh-release

          # Guard the main package publish: skip if this version is already on npm.
          if npm view "blazen@${VERSION}" version >/dev/null 2>&1; then
            echo "blazen@${VERSION} already on npm; skipping publish"
          else
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-workers-alias:
    name: Publish @blazen-dev/wasi alias
    needs: [version, publish-node]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-workers-alias
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Publish @blazen-dev/wasi
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-workers-alias
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          if npm view "@blazen-dev/wasi@${VERSION}" version >/dev/null 2>&1; then
            echo "@blazen-dev/wasi@${VERSION} already on npm; skipping publish"
          else
            npm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-workers-alias
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-wasm:
    name: Publish WASM SDK
    runs-on: ubuntu-latest
    needs: [version, fetch-artifacts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Download release-dist artifact
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          name: release-dist
          path: dist

      - name: Publish to npm
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          cd dist/wasm/pkg
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${VERSION} already on npm; skipping publish"
          else
            npm publish --access public
          fi

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  release-go:
    name: Release Go binding
    runs-on: ubuntu-latest
    # Fires only on a `bindings/go/v*` tag push. Go modules ship source, so
    # no compiled artefact needs to be uploaded — the publish mechanism is
    # the tag itself, which Go's module proxy resolves on first
    # `go get github.com/zachhandley/Blazen/bindings/go@vX.Y.Z`. We still
    # cut a Forgejo release with auto-generated notes so users can find
    # the version-to-commit mapping in the UI.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/bindings/go/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve binding version from tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # TAG is e.g. bindings/go/v0.5.1
          VERSION="${TAG#bindings/go/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Go binding tag: ${TAG} (version=${VERSION})"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Sanity-check go mod download
        shell: bash
        # Verifies the tag is publicly resolvable as a Go module by the
        # proxy. The proxy fetches the tag's tree synchronously on first
        # request, so this both validates correctness and primes the cache.
        # GOPROXY=direct skips the public proxy on Forgejo's outbound
        # network (which may be restricted) and fetches via VCS directly.
        env:
          GOPROXY: direct
          GOFLAGS: -mod=mod
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          MODULE="github.com/zachhandley/Blazen/bindings/go"
          SCRATCH="${GITHUB_WORKSPACE}/target/scratch/go-modtest"
          mkdir -p "${SCRATCH}"
          (
            cd "${SCRATCH}"
            go mod init modtest
            go mod download "${MODULE}@${VERSION}" || {
              echo "::warning::go mod download ${MODULE}@${VERSION} failed; the tag may need a few minutes to propagate. Continuing — release notes will still be cut."
            }
          )
          rm -rf "${SCRATCH}"

      - name: Install git-cliff
        run: |
          GC_VERSION="2.7.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv "git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          # Diff from previous bindings/go tag if one exists; else fall back
          # to the full history. --include-path scopes commits to the Go
          # binding subtree so the notes don't list unrelated workspace work.
          PREV_TAG=$(git tag --list 'bindings/go/v*' --sort=-v:refname | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            git-cliff "${PREV_TAG}..HEAD" --tag "${TAG}" --include-path 'bindings/go/**' -o GO_RELEASE_NOTES.md || \
              git-cliff "${PREV_TAG}..HEAD" --tag "${TAG}" -o GO_RELEASE_NOTES.md
          else
            git-cliff --tag "${TAG}" --include-path 'bindings/go/**' -o GO_RELEASE_NOTES.md || \
              git-cliff --tag "${TAG}" -o GO_RELEASE_NOTES.md
          fi

          cat > GO_NOTES_FINAL.md << NOTES_EOF
          $(cat GO_RELEASE_NOTES.md)

          ## Installation

          \`\`\`bash
          go get github.com/zachhandley/Blazen/bindings/go@${{ steps.tag.outputs.version }}
          \`\`\`

          Go modules ship as source; there is no compiled artefact attached to
          this release. The native \`libblazen_uniffi\` library is staged under
          \`bindings/go/internal/clib/<GOOS>_<GOARCH>/\` and is built by
          consumers via \`scripts/build-uniffi-lib.sh\` (see binding README).
          NOTES_EOF

      - name: Create Forgejo release for Go tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          BODY=$(jq -Rs . < GO_NOTES_FINAL.md)
          curl --fail -sS -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Blazen Go binding ${TAG}\",
              \"body\": ${BODY},
              \"draft\": false,
              \"prerelease\": false
            }" || {
              echo "::warning::Release POST failed; release may already exist at this tag (idempotent)."
            }

  release-swift:
    name: Release Swift binding
    runs-on: ubuntu-latest
    # Fires only on a `bindings/swift/v*` tag push. The XCFramework is built
    # by build-artifacts.yaml's build-swift-xcframework job on macOS and
    # uploaded to the Forgejo generic blazen-build package. We download it
    # here and attach to the release as an asset. If the XCFramework is
    # missing (no macOS runner available at build time) the release is
    # still cut, with a warning in the notes and no binary asset.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/bindings/swift/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve binding version from tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#bindings/swift/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download XCFramework from Forgejo generic package
        id: xcf
        shell: bash
        # The XCFramework lives under the BlazenFFI-xcframework artefact
        # produced by build-artifacts.yaml#build-swift-xcframework. Look it
        # up by the binding version (which the build pipeline used as the
        # generic-package version). If the runner that produced it never
        # ran (no macOS available) the fetch returns non-200 and we
        # continue without an asset.
        run: |
          set +e
          VERSION="${{ steps.tag.outputs.version }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}/BlazenFFI.xcframework.zip"
          CODE=$(curl --silent --output BlazenFFI.xcframework.zip --write-out '%{http_code}' -u "$AUTH" "$URL")
          if [ "$CODE" = "200" ]; then
            echo "have_xcf=true" >> "$GITHUB_OUTPUT"
            ls -lh BlazenFFI.xcframework.zip
          else
            echo "have_xcf=false" >> "$GITHUB_OUTPUT"
            echo "::warning::XCFramework not available for v${VERSION} (HTTP ${CODE}). Release will be cut without a binary asset."
            rm -f BlazenFFI.xcframework.zip
          fi

      - name: Install git-cliff
        run: |
          GC_VERSION="2.7.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv "git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git tag --list 'bindings/swift/v*' --sort=-v:refname | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            git-cliff "${PREV_TAG}..HEAD" --tag "${TAG}" --include-path 'bindings/swift/**' -o SWIFT_RELEASE_NOTES.md || \
              git-cliff "${PREV_TAG}..HEAD" --tag "${TAG}" -o SWIFT_RELEASE_NOTES.md
          else
            git-cliff --tag "${TAG}" --include-path 'bindings/swift/**' -o SWIFT_RELEASE_NOTES.md || \
              git-cliff --tag "${TAG}" -o SWIFT_RELEASE_NOTES.md
          fi

          cat > SWIFT_NOTES_FINAL.md << NOTES_EOF
          $(cat SWIFT_RELEASE_NOTES.md)

          ## Installation

          \`\`\`swift
          // Package.swift dependency
          .package(url: "https://github.com/zachhandley/Blazen", from: "${{ steps.tag.outputs.version }}")
          \`\`\`

          The \`BlazenFFI.xcframework.zip\` asset (when present) bundles the
          UniFFI static library as a universal macOS XCFramework. SwiftPM
          consumers resolve \`BlazenSwift\` directly from the repo subtree
          at \`bindings/swift/\`.
          NOTES_EOF

      - name: Create Forgejo release for Swift tag
        id: rel
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          BODY=$(jq -Rs . < SWIFT_NOTES_FINAL.md)
          RESP=$(curl -sS -w '\n%{http_code}' -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Blazen Swift binding ${TAG}\",
              \"body\": ${BODY},
              \"draft\": false,
              \"prerelease\": false
            }")
          CODE=$(printf '%s' "$RESP" | tail -n1)
          BODY_JSON=$(printf '%s' "$RESP" | sed '$d')
          if [ "$CODE" = "201" ] || [ "$CODE" = "200" ]; then
            RELEASE_ID=$(printf '%s' "$BODY_JSON" | jq -r '.id')
          else
            # Idempotent: if the release already exists, look it up by tag.
            echo "::warning::Release POST returned ${CODE}; fetching existing release by tag"
            RELEASE_ID=$(curl --fail -sS \
              -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
              "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases/tags/${TAG}" \
              | jq -r '.id')
          fi
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

      - name: Attach XCFramework to release
        if: steps.xcf.outputs.have_xcf == 'true'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_ID="${{ steps.rel.outputs.release_id }}"
          curl --fail -sS -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            -F "attachment=@BlazenFFI.xcframework.zip" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=BlazenFFI.xcframework.zip"

  release-ruby:
    name: Release Ruby gem
    runs-on: ubuntu-latest
    needs: version
    # Fires from workflow_dispatch only. Skipped if RUBYGEMS_API_KEY isn't set
    # in repo secrets (a missing key shows up as an empty string after env
    # interpolation, so the gate is on the env var, not `secrets.*` directly
    # since Forgejo expressions can't `if:` on secrets).
    if: github.event_name == 'workflow_dispatch'
    env:
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: release-ruby
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Gate on RUBYGEMS_API_KEY presence
        if: steps.check.outputs.completed != 'true'
        id: gate
        shell: bash
        run: |
          if [ -z "${RUBYGEMS_API_KEY}" ]; then
            echo "::warning::RUBYGEMS_API_KEY not set; skipping Ruby gem publish."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Ruby
        if: steps.check.outputs.completed != 'true' && steps.gate.outputs.has_key == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Stamp version
        if: steps.check.outputs.completed != 'true' && steps.gate.outputs.has_key == 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Download libblazen_cabi binaries from Forgejo generic package
        if: steps.check.outputs.completed != 'true' && steps.gate.outputs.has_key == 'true'
        shell: bash
        # Each ext/blazen/<arch>/ directory is what lib/blazen/ffi.rb's
        # arch_subdir lookup expects. Maps the upload names from
        # build-artifacts.yaml#build-cabi back to Ruby's arch dirs.
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"

          # name|ruby_dir|filename
          declare -a LIBS=(
            "libblazen_cabi-linux-x86_64.so|linux_amd64|libblazen_cabi.so"
            "libblazen_cabi-linux-aarch64.so|linux_arm64|libblazen_cabi.so"
            "libblazen_cabi-darwin-x86_64.dylib|darwin_amd64|libblazen_cabi.dylib"
            "libblazen_cabi-darwin-aarch64.dylib|darwin_arm64|libblazen_cabi.dylib"
            "libblazen_cabi-windows-x86_64.dll|windows_amd64|blazen_cabi.dll"
          )

          STAGED=0
          for LINE in "${LIBS[@]}"; do
            IFS='|' read -r SRC ARCH DEST <<< "$LINE"
            URL="${BASE}/${SRC}"
            mkdir -p "bindings/ruby/ext/blazen/${ARCH}"
            DEST_PATH="bindings/ruby/ext/blazen/${ARCH}/${DEST}"
            CODE=$(curl --silent --output "${DEST_PATH}" --write-out '%{http_code}' \
              -u "${AUTH}" "${URL}")
            if [ "${CODE}" = "200" ]; then
              echo "  ✓ ${SRC} → ${DEST_PATH}"
              STAGED=$((STAGED + 1))
            else
              echo "::warning::${SRC} not available (HTTP ${CODE}); ${ARCH} will be missing from gem"
              rm -f "${DEST_PATH}"
              rmdir "bindings/ruby/ext/blazen/${ARCH}" 2>/dev/null || true
            fi
          done

          if [ "${STAGED}" -eq 0 ]; then
            echo "::error::No libblazen_cabi binaries staged; aborting"
            exit 1
          fi
          echo "Staged ${STAGED} platform binary(ies)."

      - name: Build gem
        if: steps.check.outputs.completed != 'true' && steps.gate.outputs.has_key == 'true'
        working-directory: bindings/ruby
        run: |
          gem install bundler --no-document
          gem build blazen.gemspec
          ls -lh ./*.gem

      - name: Push to RubyGems
        if: steps.check.outputs.completed != 'true' && steps.gate.outputs.has_key == 'true'
        working-directory: bindings/ruby
        shell: bash
        # `gem push` reads ~/.gem/credentials, so write the API key there
        # rather than passing it on argv (where it would land in process listings
        # and CI logs). Tolerate "already pushed" so retries are idempotent —
        # RubyGems hard-rejects re-pushes of the same version, the same way
        # PyPI and crates.io do.
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p "${HOME}/.gem"
          printf -- ":rubygems_api_key: %s\n" "${RUBYGEMS_API_KEY}" > "${HOME}/.gem/credentials"
          chmod 0600 "${HOME}/.gem/credentials"
          GEM_FILE="blazen-${VERSION}.gem"
          if [ ! -f "${GEM_FILE}" ]; then
            echo "::error::Expected ${GEM_FILE} not produced by 'gem build'"
            ls -lh ./*.gem
            exit 1
          fi
          if gem push "${GEM_FILE}"; then
            echo "Pushed ${GEM_FILE} to RubyGems."
          else
            CODE=$?
            # gem push returns 1 for "already pushed" (the server emits HTTP 422
            # "Repushing of gem versions is not allowed"). Tolerate that case
            # for retry safety; otherwise re-raise.
            if gem search -r --exact blazen | grep -qE "^blazen \(${VERSION}"; then
              echo "::warning::blazen ${VERSION} already on RubyGems; skipping."
            else
              echo "::error::gem push failed (exit ${CODE}) and ${VERSION} is not on RubyGems."
              exit "${CODE}"
            fi
          fi

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: release-ruby
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, publish-rust, publish-python, publish-node, publish-workers-alias, publish-wasm, release-ruby]
    # workflow_dispatch only — binding tag pushes flow through release-go /
    # release-swift, which cut their own subtree-scoped releases.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install git-cliff
        if: steps.check.outputs.completed != 'true'
        run: |
          GC_VERSION="2.7.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv "git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/
          git-cliff --version

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="v${{ needs.version.outputs.version }}"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git-cliff "${LAST_TAG}..HEAD" --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          else
            git-cliff --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          fi

          cat > RELEASE_NOTES.md << NOTES_EOF
          $(cat CHANGELOG_RELEASE.md)

          ## Installation

          **Rust:**
          \`\`\`bash
          cargo add blazen
          \`\`\`

          **Python:**
          \`\`\`bash
          pip install blazen
          \`\`\`

          **Node.js:**
          \`\`\`bash
          pnpm add blazen
          \`\`\`

          **Browser (WebAssembly SDK):**
          \`\`\`bash
          npm install @blazen-dev/wasm
          \`\`\`

          **Cloudflare Workers / Deno (wasi):**
          \`\`\`bash
          pnpm add blazen   # auto-resolves the wasi sidecar
          # or pin explicitly:
          pnpm add @blazen-dev/wasi
          \`\`\`
          Workers users must register an HttpClient at module load:
          \`\`\`javascript
          import { HttpClient, setDefaultHttpClient } from 'blazen';
          const client = HttpClient.fromCallback(async (req) => {
            const res = await fetch(req.url, { method: req.method, headers: req.headers, body: req.body });
            const body = new Uint8Array(await res.arrayBuffer());
            return { status: res.status, headers: [...res.headers.entries()], body };
          });
          setDefaultHttpClient(client);
          \`\`\`
          NOTES_EOF

      # Resolve the temp/v{VERSION} branch HEAD so the release tag is created
      # at the exact commit that produced the published artifacts. If the
      # branch is gone (e.g. a previous run already cut the tag), fall back
      # to the existing tag's SHA for idempotency.
      - name: Resolve temp branch SHA
        id: tempsha
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REPO: ${{ github.repository }}
          AUTH: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          TAG="v${VERSION}"
          API="https://forge.blackleafdigital.com/api/v1/repos/${REPO}"

          BR_RESP=$(curl -s -u "$AUTH" -w '\n%{http_code}' "${API}/branches/${BR}")
          BR_CODE=$(printf '%s' "$BR_RESP" | tail -n1)
          BR_BODY=$(printf '%s' "$BR_RESP" | sed '$d')
          if [ "$BR_CODE" = "200" ]; then
            SHA=$(printf '%s' "$BR_BODY" | jq -r '.commit.id')
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "::error::branch ${BR} returned 200 but no commit.id"
              exit 1
            fi
            echo "Found temp branch ${BR} at ${SHA}"
            echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
            echo "branch_present=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback: tag may already exist from a prior partial run.
          TAG_RESP=$(curl -s -u "$AUTH" -w '\n%{http_code}' "${API}/tags/${TAG}")
          TAG_CODE=$(printf '%s' "$TAG_RESP" | tail -n1)
          TAG_BODY=$(printf '%s' "$TAG_RESP" | sed '$d')
          if [ "$TAG_CODE" = "200" ]; then
            SHA=$(printf '%s' "$TAG_BODY" | jq -r '.commit.sha // .id')
            echo "temp branch missing; tag ${TAG} already exists at ${SHA}"
            echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
            echo "branch_present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Cannot resolve a SHA for ${TAG}: branch ${BR} not found (HTTP ${BR_CODE}) and tag not found (HTTP ${TAG_CODE})."
          exit 1

      - name: Create Forgejo release (cuts permanent tag)
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          VERSION="v${{ needs.version.outputs.version }}"
          SHA="${{ steps.tempsha.outputs.sha }}"

          # tag_name + target_commitish creates the tag at the named SHA.
          # If the tag already exists, Forgejo accepts the call as long as
          # it's at the same commit; otherwise this fails loudly (good).
          BODY=$(jq -Rs . < RELEASE_NOTES.md)
          curl --fail -sS -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"target_commitish\": \"${SHA}\",
              \"name\": \"Blazen ${VERSION}\",
              \"body\": ${BODY},
              \"draft\": false,
              \"prerelease\": false
            }" || {
              # Idempotent fallback: if the release already exists, that's fine.
              echo "::warning::Release POST failed; assuming it already exists at this SHA."
            }

      - name: Delete temp/v{VERSION} branch
        if: steps.check.outputs.completed != 'true' && steps.tempsha.outputs.branch_present == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REPO: ${{ github.repository }}
          AUTH: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          API="https://forge.blackleafdigital.com/api/v1/repos/${REPO}/branches/${BR}"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE -u "$AUTH" "$API")
          case "$CODE" in
            204|404) echo "temp branch ${BR} deleted (HTTP ${CODE})" ;;
            *) echo "::warning::Failed to delete ${BR} (HTTP ${CODE}); manual cleanup may be needed" ;;
          esac

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  mirror-github:
    name: Mirror to GitHub
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Dispatch mirror workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/mirror-github.yaml/dispatches" \
            -d '{"ref": "main"}'

  cleanup-artifacts:
    name: Cleanup Build Artifacts
    runs-on: ubuntu-latest
    needs: [version, publish-rust, publish-python, publish-node, publish-workers-alias, publish-wasm, create-release, mirror-github]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: cleanup-artifacts
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Delete build artifacts from Forgejo generic package
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"

          FILES=(
            wheels-x86_64-unknown-linux-gnu.tar.gz
            wheels-aarch64-unknown-linux-gnu.tar.gz
            wheels-x86_64-unknown-linux-musl.tar.gz
            wheels-aarch64-unknown-linux-musl.tar.gz
            wheels-aarch64-apple-darwin.tar.gz
            wheels-x86_64-pc-windows-msvc.tar.gz
            sdist.tar.gz
            napi-x86_64-unknown-linux-gnu.tar.gz
            napi-aarch64-unknown-linux-gnu.tar.gz
            napi-x86_64-unknown-linux-musl.tar.gz
            napi-aarch64-unknown-linux-musl.tar.gz
            napi-aarch64-apple-darwin.tar.gz
            napi-x86_64-pc-windows-msvc.tar.gz
            napi-wasm32-wasi.tar.gz
            wasm.tar.gz
            libblazen_cabi-linux-x86_64.so
            libblazen_cabi-linux-aarch64.so
            libblazen_cabi-darwin-x86_64.dylib
            libblazen_cabi-darwin-aarch64.dylib
            libblazen_cabi-windows-x86_64.dll
          )

          for F in "${FILES[@]}"; do
            CODE=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              -X DELETE -u "$AUTH" "${BASE}/${F}")
            if [ "$CODE" = "204" ] || [ "$CODE" = "404" ]; then
              echo "Deleted (or already gone): ${F} [${CODE}]"
            else
              echo "::warning::Unexpected status ${CODE} deleting ${F}; continuing"
            fi
          done

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: cleanup-artifacts
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  mark-release-complete:
    name: Mark Release Complete
    runs-on: ubuntu-latest
    needs: [version, cleanup-artifacts]
    steps:
      - name: Mark release complete
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: release-complete
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
