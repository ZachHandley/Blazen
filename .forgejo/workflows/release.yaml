name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (no v prefix). Leave empty to auto-resolve via resolve-version.'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pick.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version (fallback if no input)
        id: resolve
        if: github.event.inputs.version == ''
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

      - name: Pick version (input wins, else fallback)
        id: pick
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          FALLBACK="${{ steps.resolve.outputs.version }}"
          if [ -n "$INPUT" ]; then
            echo "version=${INPUT}" >> "$GITHUB_OUTPUT"
            echo "Using dispatch input version: ${INPUT}"
          elif [ -n "$FALLBACK" ]; then
            echo "version=${FALLBACK}" >> "$GITHUB_OUTPUT"
            echo "Using resolve-version fallback: ${FALLBACK}"
          else
            echo "::error::No version supplied via input AND resolve-version produced no output"
            exit 1
          fi

  fetch-artifacts:
    name: Fetch Build Artifacts
    runs-on: ubuntu-latest
    needs: version
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts from Forgejo generic package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"

          mkdir -p dist/wheels dist/sdist dist/napi dist/wasm

          # List artifacts known to be produced by build-artifacts.yaml.
          # We expect: wheels-<6 targets>.tar.gz, sdist.tar.gz, napi-<6 targets>.tar.gz, wasm.tar.gz
          WHEEL_TARGETS=(
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            aarch64-apple-darwin
            x86_64-pc-windows-msvc
          )
          NAPI_TARGETS=(
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            aarch64-apple-darwin
            x86_64-pc-windows-msvc
            wasm32-wasi
          )

          fetch_or_die() {
            local URL="$1"
            local DEST="$2"
            local CODE
            CODE=$(curl --silent --output "$DEST" --write-out '%{http_code}' -u "$AUTH" "$URL")
            if [ "$CODE" != "200" ]; then
              echo "::error::Failed to download $URL (HTTP $CODE). Run build-artifacts.yaml for v${VERSION} first."
              rm -f "$DEST"
              exit 1
            fi
          }

          for T in "${WHEEL_TARGETS[@]}"; do
            fetch_or_die "${BASE}/wheels-${T}.tar.gz" "/tmp/wheels-${T}.tar.gz"
            tar -xzf "/tmp/wheels-${T}.tar.gz" -C dist/wheels
          done

          # Restore the maturin sdist filename so twine/PyPI accept it (PEP 625
          # requires {package_name}-{version}.tar.gz). build-artifacts.yaml
          # uploaded it under a generic name; rename on the way down.
          fetch_or_die "${BASE}/sdist.tar.gz" "dist/sdist/blazen-${VERSION}.tar.gz"

          for T in "${NAPI_TARGETS[@]}"; do
            fetch_or_die "${BASE}/napi-${T}.tar.gz" "/tmp/napi-${T}.tar.gz"
            tar -xzf "/tmp/napi-${T}.tar.gz" -C dist/napi
          done

          fetch_or_die "${BASE}/wasm.tar.gz" "/tmp/wasm.tar.gz"
          tar -xzf "/tmp/wasm.tar.gz" -C dist/wasm
          # build-artifacts.yaml tars `crates/blazen-wasm-sdk/pkg` so the result is dist/wasm/pkg/

          echo "Fetched artifacts:"
          ls -lh dist/wheels/ dist/sdist/ dist/napi/ dist/wasm/ dist/wasm/pkg/ 2>/dev/null || true

      - name: Upload to current run for downstream jobs
        uses: actions/upload-artifact@v3
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish-rust:
    name: Publish Rust Crates
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-publish-rust
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Publish crates in dependency order
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/cargo-publish-workspace@main
        with:
          version: ${{ needs.version.outputs.version }}
          registry: crates-io
          exclude: blazen-py,blazen-node
          cargo-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          max-backoff-seconds: '300'
          max-attempts-per-crate: '5'

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-python:
    name: Publish Python Package
    needs: [version, fetch-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install uv
        if: steps.check.outputs.completed != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Download release-dist artifact
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          name: release-dist
          path: dist

      - name: List artifacts before upload
        if: steps.check.outputs.completed != 'true'
        run: ls -lh dist/wheels/ dist/sdist/

      - name: Publish to PyPI
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/pypi-publish-workspace@main
        with:
          version: ${{ needs.version.outputs.version }}
          package-name: blazen
          pypi-token: ${{ secrets.PYPI_TOKEN }}
          dist-dir: dist
          wheel-glob: wheels/*.whl
          sdist-glob: sdist/*.tar.gz

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-node:
    name: Publish Node Package
    needs: [version, fetch-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Install dependencies
        if: steps.check.outputs.completed != 'true'
        run: pnpm install

      - name: Download release-dist artifact
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          name: release-dist
          path: dist

      - name: Stage napi binaries for napi artifacts step
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p crates/blazen-node/artifacts
          # napi-rs's `napi artifacts` command expects per-target subdirectories
          # under artifacts/, each containing the target's blazen.*.node file.
          # Our fetched dist/napi/ has all .node files flat (one per target,
          # filename-encoded). napi-rs auto-detects target from filename, so
          # we just copy each .node into a directory named after itself.
          shopt -s nullglob
          NODE_FILES=(dist/napi/blazen.*.node)
          if [ ${#NODE_FILES[@]} -eq 0 ]; then
            echo "::error::No napi .node binaries found in dist/napi/"
            exit 1
          fi
          for F in "${NODE_FILES[@]}"; do
            BASE=$(basename "$F" .node)
            SUB="crates/blazen-node/artifacts/${BASE}"
            mkdir -p "$SUB"
            cp "$F" "$SUB/"
          done
          ls -la crates/blazen-node/artifacts/

      - name: Create npm subpackage dirs
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: pnpm exec napi create-npm-dirs

      - name: Move napi artifacts into npm subpackages
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: pnpm exec napi artifacts

      - name: List napi subpackages
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        run: ls -la npm/ || true

      - name: List napi npm subpackages to be published
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        shell: bash
        run: |
          echo "=== napi/ subpackages ==="
          ls -la npm/ || true
          echo "=== Per-target package.jsons ==="
          for d in npm/*/; do
            echo "--- $d ---"
            cat "$d/package.json" 2>/dev/null | head -30
          done

      - name: Publish subpackages and main package to npm
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-node
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc

          # napi prepublish publishes each per-target subpackage. napi-rs's
          # pre-publish.ts internally catches npm's "cannot publish over the
          # previously published versions" error and continues, so duplicate
          # subpackage versions are handled transparently. No `|| true` needed.
          #
          # --no-gh-release is REQUIRED on Forgejo runners: napi-rs v3 defaults
          # ghRelease=true and fires against api.github.com whenever
          # GITHUB_REPOSITORY is set in env. Forgejo sets that for
          # GitHub-Actions compatibility, so without the flag napi gets 401s
          # trying to use the Forgejo token against github.com.
          pnpm exec napi prepublish -t npm --no-gh-release

          # Guard the main package publish: skip if this version is already on npm.
          if npm view "blazen@${VERSION}" version >/dev/null 2>&1; then
            echo "blazen@${VERSION} already on npm; skipping publish"
          else
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-node
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-workers-alias:
    name: Publish @blazen-dev/wasi alias
    needs: [version, publish-node]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-workers-alias
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version
        if: steps.check.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Publish @blazen-dev/wasi
        if: steps.check.outputs.completed != 'true'
        working-directory: crates/blazen-workers-alias
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          if npm view "@blazen-dev/wasi@${VERSION}" version >/dev/null 2>&1; then
            echo "@blazen-dev/wasi@${VERSION} already on npm; skipping publish"
          else
            npm publish --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-workers-alias
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-wasm:
    name: Publish WASM SDK
    runs-on: ubuntu-latest
    needs: [version, fetch-artifacts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: publish-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Download release-dist artifact
        if: steps.check.outputs.completed != 'true'
        uses: actions/download-artifact@v3
        with:
          name: release-dist
          path: dist

      - name: Publish to npm
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          cd dist/wasm/pkg
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_ACCESS_TOKEN }}" > .npmrc
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${VERSION} already on npm; skipping publish"
          else
            npm publish --access public
          fi

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: publish-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, publish-rust, publish-python, publish-node, publish-workers-alias, publish-wasm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install git-cliff
        if: steps.check.outputs.completed != 'true'
        run: |
          GC_VERSION="2.7.0"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv "git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/
          git-cliff --version

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="v${{ needs.version.outputs.version }}"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git-cliff "${LAST_TAG}..HEAD" --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          else
            git-cliff --tag "${VERSION}" -o CHANGELOG_RELEASE.md
          fi

          cat > RELEASE_NOTES.md << NOTES_EOF
          $(cat CHANGELOG_RELEASE.md)

          ## Installation

          **Rust:**
          \`\`\`bash
          cargo add blazen
          \`\`\`

          **Python:**
          \`\`\`bash
          pip install blazen
          \`\`\`

          **Node.js:**
          \`\`\`bash
          pnpm add blazen
          \`\`\`

          **Browser (WebAssembly SDK):**
          \`\`\`bash
          npm install @blazen-dev/wasm
          \`\`\`

          **Cloudflare Workers / Deno (wasi):**
          \`\`\`bash
          pnpm add blazen   # auto-resolves the wasi sidecar
          # or pin explicitly:
          pnpm add @blazen-dev/wasi
          \`\`\`
          Workers users must register an HttpClient at module load:
          \`\`\`javascript
          import { HttpClient, setDefaultHttpClient } from 'blazen';
          const client = HttpClient.fromCallback(async (req) => {
            const res = await fetch(req.url, { method: req.method, headers: req.headers, body: req.body });
            const body = new Uint8Array(await res.arrayBuffer());
            return { status: res.status, headers: [...res.headers.entries()], body };
          });
          setDefaultHttpClient(client);
          \`\`\`
          NOTES_EOF

      # Resolve the temp/v{VERSION} branch HEAD so the release tag is created
      # at the exact commit that produced the published artifacts. If the
      # branch is gone (e.g. a previous run already cut the tag), fall back
      # to the existing tag's SHA for idempotency.
      - name: Resolve temp branch SHA
        id: tempsha
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REPO: ${{ github.repository }}
          AUTH: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          TAG="v${VERSION}"
          API="https://forge.blackleafdigital.com/api/v1/repos/${REPO}"

          BR_RESP=$(curl -s -u "$AUTH" -w '\n%{http_code}' "${API}/branches/${BR}")
          BR_CODE=$(printf '%s' "$BR_RESP" | tail -n1)
          BR_BODY=$(printf '%s' "$BR_RESP" | sed '$d')
          if [ "$BR_CODE" = "200" ]; then
            SHA=$(printf '%s' "$BR_BODY" | jq -r '.commit.id')
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "::error::branch ${BR} returned 200 but no commit.id"
              exit 1
            fi
            echo "Found temp branch ${BR} at ${SHA}"
            echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
            echo "branch_present=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback: tag may already exist from a prior partial run.
          TAG_RESP=$(curl -s -u "$AUTH" -w '\n%{http_code}' "${API}/tags/${TAG}")
          TAG_CODE=$(printf '%s' "$TAG_RESP" | tail -n1)
          TAG_BODY=$(printf '%s' "$TAG_RESP" | sed '$d')
          if [ "$TAG_CODE" = "200" ]; then
            SHA=$(printf '%s' "$TAG_BODY" | jq -r '.commit.sha // .id')
            echo "temp branch missing; tag ${TAG} already exists at ${SHA}"
            echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
            echo "branch_present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Cannot resolve a SHA for ${TAG}: branch ${BR} not found (HTTP ${BR_CODE}) and tag not found (HTTP ${TAG_CODE})."
          exit 1

      - name: Create Forgejo release (cuts permanent tag)
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          VERSION="v${{ needs.version.outputs.version }}"
          SHA="${{ steps.tempsha.outputs.sha }}"

          # tag_name + target_commitish creates the tag at the named SHA.
          # If the tag already exists, Forgejo accepts the call as long as
          # it's at the same commit; otherwise this fails loudly (good).
          BODY=$(jq -Rs . < RELEASE_NOTES.md)
          curl --fail -sS -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${VERSION}\",
              \"target_commitish\": \"${SHA}\",
              \"name\": \"Blazen ${VERSION}\",
              \"body\": ${BODY},
              \"draft\": false,
              \"prerelease\": false
            }" || {
              # Idempotent fallback: if the release already exists, that's fine.
              echo "::warning::Release POST failed; assuming it already exists at this SHA."
            }

      - name: Delete temp/v{VERSION} branch
        if: steps.check.outputs.completed != 'true' && steps.tempsha.outputs.branch_present == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REPO: ${{ github.repository }}
          AUTH: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          API="https://forge.blackleafdigital.com/api/v1/repos/${REPO}/branches/${BR}"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE -u "$AUTH" "$API")
          case "$CODE" in
            204|404) echo "temp branch ${BR} deleted (HTTP ${CODE})" ;;
            *) echo "::warning::Failed to delete ${BR} (HTTP ${CODE}); manual cleanup may be needed" ;;
          esac

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: create-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  mirror-github:
    name: Mirror to GitHub
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Dispatch mirror workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/mirror-github.yaml/dispatches" \
            -d '{"ref": "main"}'

  cleanup-artifacts:
    name: Cleanup Build Artifacts
    runs-on: ubuntu-latest
    needs: [version, publish-rust, publish-python, publish-node, publish-workers-alias, publish-wasm, create-release, mirror-github]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: cleanup-artifacts
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Delete build artifacts from Forgejo generic package
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"

          FILES=(
            wheels-x86_64-unknown-linux-gnu.tar.gz
            wheels-aarch64-unknown-linux-gnu.tar.gz
            wheels-x86_64-unknown-linux-musl.tar.gz
            wheels-aarch64-unknown-linux-musl.tar.gz
            wheels-aarch64-apple-darwin.tar.gz
            wheels-x86_64-pc-windows-msvc.tar.gz
            sdist.tar.gz
            napi-x86_64-unknown-linux-gnu.tar.gz
            napi-aarch64-unknown-linux-gnu.tar.gz
            napi-x86_64-unknown-linux-musl.tar.gz
            napi-aarch64-unknown-linux-musl.tar.gz
            napi-aarch64-apple-darwin.tar.gz
            napi-x86_64-pc-windows-msvc.tar.gz
            napi-wasm32-wasi.tar.gz
            wasm.tar.gz
          )

          for F in "${FILES[@]}"; do
            CODE=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              -X DELETE -u "$AUTH" "${BASE}/${F}")
            if [ "$CODE" = "204" ] || [ "$CODE" = "404" ]; then
              echo "Deleted (or already gone): ${F} [${CODE}]"
            else
              echo "::warning::Unexpected status ${CODE} deleting ${F}; continuing"
            fi
          done

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: cleanup-artifacts
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  mark-release-complete:
    name: Mark Release Complete
    runs-on: ubuntu-latest
    needs: [version, cleanup-artifacts]
    steps:
      - name: Mark release complete
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: release-complete
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
