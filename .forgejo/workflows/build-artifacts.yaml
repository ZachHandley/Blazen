name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to build (no v prefix), e.g. 1.2.3'
        type: string
        required: true
      ensure_temp_branch:
        description: 'Create temp/v{version} from the dispatch ref if it does not already exist. Use when dispatching manually to skip ci.yaml and go straight to build + release.'
        type: boolean
        required: false
        default: false

concurrency:
  group: build-artifacts-${{ github.event.inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - id: set
        run: echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      # When dispatched manually with `ensure_temp_branch=true`, create
      # temp/v{VERSION} from the dispatch ref so release.yaml (dispatched by
      # the dispatch-release job at the end of this workflow on
      # refs/heads/temp/v{VERSION}) has a branch to consume. This lets us skip
      # ci.yaml entirely: dispatch build-artifacts.yaml -> temp branch is
      # created -> artifacts are built/uploaded -> release.yaml fires on the
      # temp branch -> publishes + cuts the permanent v{VERSION} tag.
      #
      # Idempotent: if the branch already exists on origin, leave it alone.
      - name: Checkout (for ensure_temp_branch)
        if: github.event.inputs.ensure_temp_branch == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure temp/v{VERSION} branch exists on origin
        if: github.event.inputs.ensure_temp_branch == 'true'
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version }}
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          if git ls-remote --exit-code --heads origin "${BR}" >/dev/null 2>&1; then
            echo "Branch ${BR} already exists on origin; leaving it untouched."
            exit 0
          fi
          git config user.name  "Zach Handley"
          git config user.email "zachhandley@gmail.com"
          # Push the current dispatch ref's HEAD up as temp/v{VERSION}.
          git push origin "HEAD:refs/heads/${BR}"
          echo "Created ${BR} at $(git rev-parse HEAD)"

  build-wheels:
    name: Build wheels (${{ matrix.target }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-gnu
            container-kind: manylinux
            manylinux: "2_34"
          - target: aarch64-unknown-linux-gnu
            runs-on: arm64
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:aarch64-unknown-linux-gnu
            container-kind: manylinux
            manylinux: "2_34"
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-musl
            container-kind: musl
            manylinux: "musllinux_1_2"
            openssl-vendored: "1"
          - target: aarch64-unknown-linux-musl
            runs-on: arm64
            container: alpine:3.20
            container-kind: alpine
            manylinux: "musllinux_1_2"
            openssl-vendored: "1"
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
      credentials:
        username: zachhandley
        password: ${{ secrets.FORGEJO_ACTIONS_TOKEN }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
      OPENSSL_STATIC: ${{ matrix.openssl-vendored }}
      OPENSSL_VENDORED: ${{ matrix.openssl-vendored }}
    steps:
      - name: Setup container runtime
        if: matrix.container-kind
        uses: https://forge.blackleafdigital.com/Public/actions/setup-container-runtime@main

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-wheels-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      # The marker says "this step finished" but doesn't actually prove the
      # artifact made it to the Forgejo generic package. If the marker is set
      # but the artifact is missing (e.g., manually purged, registry rolled
      # back), short-circuiting on the marker alone leaves the release
      # pipeline pointing at a 404. So: gate downstream skipping on BOTH
      # marker-present AND artifact-HEAD-200. Every step below now reads
      # `steps.verify.outputs.completed` instead of `steps.check.outputs.completed`.
      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: wheels-${{ matrix.target }}.tar.gz
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Diagnose inherited env (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "=== Process env: CMAKE_* and *LAUNCHER* ==="
          Get-ChildItem Env: | Where-Object { $_.Name -like 'CMAKE*' -or $_.Name -like '*LAUNCHER*' } | Format-List
          Write-Host "=== Machine-scope CMAKE / LAUNCHER ==="
          [Environment]::GetEnvironmentVariables('Machine').GetEnumerator() |
            Where-Object { $_.Key -like 'CMAKE*' -or $_.Key -like '*LAUNCHER*' } |
            Format-Table -AutoSize
          Write-Host "=== User-scope CMAKE / LAUNCHER ==="
          [Environment]::GetEnvironmentVariables('User').GetEnumerator() |
            Where-Object { $_.Key -like 'CMAKE*' -or $_.Key -like '*LAUNCHER*' } |
            Format-Table -AutoSize

      - name: Install system deps (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        run: yum install -y cmake openssl-devel ccache pkg-config curl perl-core perl-Time-Piece clang-devel

      - name: Install protoc (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: protobuf-compiler
          cross-platform: 'true'

      - name: Install system deps (musl)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'musl'
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ccache pkg-config curl libssl-dev patchelf libclang-dev protobuf-compiler

      - name: Install system deps (alpine)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'alpine'
        run: |
          apk add --no-cache \
            bash curl git \
            gcc g++ musl-dev linux-headers \
            cmake make ccache \
            pkgconf openssl-dev \
            clang-dev llvm-dev \
            perl patchelf libffi-dev \
            protobuf-dev

      - name: Ensure musl toolchain on PATH and pin cargo linker
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'musl'
        shell: bash
        run: |
          # rust-musl-cross images install the toolchain under the FULL rust
          # target triple (e.g. aarch64-unknown-linux-musl-gcc), not the
          # shortened gcc triple. Use the matrix target verbatim as the prefix.
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl|aarch64-unknown-linux-musl) triple="${{ matrix.target }}" ;;
            *) echo "::error::Unexpected musl target: ${{ matrix.target }}"; exit 1 ;;
          esac

          # Probe for the cross toolchain bin dir; rust-musl-cross images differ.
          bindir=""
          for d in \
            "/usr/local/musl/bin" \
            "/opt/${triple}-cross/bin" \
            "/usr/local/${triple}/bin"; do
            if [ -x "$d/${triple}-gcc" ]; then
              bindir="$d"
              break
            fi
          done
          if [ -z "$bindir" ]; then
            echo "::error::Could not locate ${triple}-gcc; searched /usr/local/musl/bin, /opt/${triple}-cross/bin, /usr/local/${triple}/bin"
            echo "PATH=$PATH"
            find / -name "${triple}-gcc" -type f 2>/dev/null | head
            exit 1
          fi
          echo "Found cross toolchain at $bindir"

          echo "$bindir" >> "$GITHUB_PATH"

          # Create short-triple symlinks so cargo's DEFAULT linker lookup works
          # without any env-var plumbing. Rust's target spec for
          # {arch}-unknown-linux-musl defaults the linker to the short form
          # `{arch}-linux-musl-gcc`, which does NOT exist in this image (only
          # the long-form `{arch}-unknown-linux-musl-gcc` is present in
          # /usr/local/musl/bin, verified via `podman run ... ls`). Every prior
          # attempt to fix this via env vars (CARGO_TARGET_*_LINKER / CC_* /
          # CXX_*) failed because $GITHUB_ENV writes don't propagate through
          # pnpm -> napi-rs / uvx -> maturin to the cargo subprocess on this
          # Forgejo runner. Symlink both into $bindir (already on PATH) and
          # /usr/local/bin as a second-chance hit.
          short_triple="${triple/-unknown-/-}"   # aarch64-unknown-linux-musl -> aarch64-linux-musl
          ln -sf "${bindir}/${triple}-gcc" "${bindir}/${short_triple}-gcc"
          ln -sf "${bindir}/${triple}-g++" "${bindir}/${short_triple}-g++"
          ln -sf "${bindir}/${triple}-gcc" "/usr/local/bin/${short_triple}-gcc"
          ln -sf "${bindir}/${triple}-g++" "/usr/local/bin/${short_triple}-g++"
          echo "Short-triple symlinks in place:"
          ls -l "${bindir}/${short_triple}-gcc" "/usr/local/bin/${short_triple}-gcc"

          # Also write absolute-path env vars as belt-and-suspenders. If they
          # propagate, great; if they don't, the symlinks above still win via
          # cargo's default lookup.
          cargo_env=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${cargo_env}_LINKER=${bindir}/${triple}-gcc" >> "$GITHUB_ENV"
          triple_under=$(echo "${{ matrix.target }}" | tr '-' '_')
          echo "CC_${triple_under}=${bindir}/${triple}-gcc" >> "$GITHUB_ENV"
          echo "CXX_${triple_under}=${bindir}/${triple}-g++" >> "$GITHUB_ENV"

      - name: Alias gcc as aarch64-linux-musl-gcc (alpine)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'alpine'
        shell: bash
        run: |
          # rustc's target spec for aarch64-unknown-linux-musl defaults the
          # linker name to `aarch64-linux-musl-gcc`. On Alpine arm64, /usr/bin/gcc
          # IS a native musl compiler -- symlink it under the expected name so
          # rustc's default lookup resolves without env-var plumbing (which
          # doesn't always propagate through pnpm -> napi / uvx -> maturin).
          ln -sf /usr/bin/gcc /usr/local/bin/aarch64-linux-musl-gcc
          ln -sf /usr/bin/g++ /usr/local/bin/aarch64-linux-musl-g++
          echo "CC_aarch64_unknown_linux_musl=/usr/local/bin/aarch64-linux-musl-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_musl=/usr/local/bin/aarch64-linux-musl-g++" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=/usr/local/bin/aarch64-linux-musl-gcc" >> "$GITHUB_ENV"

      - name: Install system deps (macOS)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'macOS'
        run: brew install cmake ccache

      - name: Configure CMake to use ccache (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          fi

      - name: Install Git Bash (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Setup MSVC (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-msvc@main
        with:
          arch: x64
          year: "2022"
          toolset: "14.4"
          install-if-missing: "true"

      - name: Install libclang (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-libclang@main
        with:
          version: '17.0.6'

      - name: Setup Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-ninja@main

      - name: Force CMAKE_GENERATOR=Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"

      - name: Isolate CARGO_TARGET_DIR per matrix entry (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          # Single self-hosted runner = sequential matrix; $GITHUB_WORKSPACE
          # (host bind-mount) is shared across entries. setup-rust defaults
          # CARGO_TARGET_DIR to $GITHUB_WORKSPACE/target (setup-rust/src/
          # index.ts:326), which lets a manylinux-glibc entry leave a
          # build-script-build linked against /lib64/ld-linux-x86-64.so.2.
          # A subsequent musl-container entry reuses that binary; execve
          # ENOENTs on PT_INTERP. Per-entry isolation sidesteps the class.
          # sccache S3 keys are rustc-hash + argv based (not target-dir
          # based), so cache hits are preserved.
          TARGET_DIR="${GITHUB_WORKSPACE}/target-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${TARGET_DIR}"
          echo "CARGO_TARGET_DIR=${TARGET_DIR}" >> "$GITHUB_ENV"

      - name: Isolate CARGO_HOME per job (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          # setup-rust defaults CARGO_HOME to $RUNNER_TOOL_CACHE/cargo (host-
          # shared) and /tmp isn't reliably durable inside Forgejo job
          # containers. $GITHUB_WORKSPACE is the host-bind-mounted checkout
          # dir and persists for the whole job. Include github.job +
          # matrix.target so sequential matrix entries don't carry stale
          # sccache binaries from a previous entry's $CARGO_HOME/bin.
          CARGO_HOME_DIR="${GITHUB_WORKSPACE}/.cargo-home-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${CARGO_HOME_DIR}"
          echo "CARGO_HOME=${CARGO_HOME_DIR}" >> "$GITHUB_ENV"

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: ${{ matrix.target }}
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-wheels-${{ matrix.target }}
          ccache: true
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Verify sccache on PATH
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -u
          WRAPPER="${RUSTC_WRAPPER:-}"
          if [ -z "$WRAPPER" ]; then
            exit 0
          fi
          if [[ "$WRAPPER" == /* || "$WRAPPER" == ?:* ]]; then
            if [ ! -x "$WRAPPER" ]; then
              echo "::warning::RUSTC_WRAPPER=$WRAPPER not executable; disabling sccache for this job"
              echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
              exit 0
            fi
          elif ! command -v "$WRAPPER" >/dev/null 2>&1; then
            echo "::warning::RUSTC_WRAPPER=$WRAPPER not found on PATH; disabling sccache for this job"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            exit 0
          fi
          "$WRAPPER" --version

      - name: Setup Python 3.10
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.10'
      - name: Setup Python 3.11
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.11'
      - name: Setup Python 3.12
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'
      - name: Setup Python 3.13
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.13'
      - name: Setup Python 3.14
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.14'

      - name: Stamp version
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: uv run --no-project python scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Build wheels (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          # openssl-src's rsaz-2k-avx512.s / aes-cfb-avx512.s fail to assemble
          # under any C-compiler cache wrapper (`character following name is
          # not '#'` — the wrapper's preprocessor pass mangles GAS `.s`
          # directives). Two independent injection paths need scrubbing:
          #
          #   1. yum `ccache` drops compiler shims under /usr/lib{,64}/ccache
          #      which shadow real cc via PATH. Strip those dirs.
          #   2. `setup-rust@main` with `sccache: true` exports
          #      RUSTC_WRAPPER=/opt/cargo/bin/sccache. cc-rs 1.2.59's
          #      `rustc_wrapper_fallback()` (src/lib.rs:3200-3212) auto-injects
          #      that as the C-compiler wrapper when the file_stem matches
          #      "sccache"/"cachepot"/"buildcache" — there is no per-compile
          #      opt-out in cc-rs. Unsetting RUSTC_WRAPPER here is the only
          #      lever; it's step-scoped, so other jobs keep sccache.
          #
          # Also strip CMake launcher env vars so llama-cpp-sys-2 / aws-lc-sys
          # don't re-forward them to sub-builds (the Windows build step does
          # the same for the same reason).
          PATH="$(echo ":${PATH}:" | sed -e 's#:/usr/lib/ccache:#:#g' -e 's#:/usr/lib64/ccache:#:#g' -e 's#^:##' -e 's#:$##')"
          export PATH
          unset CMAKE_C_COMPILER_LAUNCHER CMAKE_CXX_COMPILER_LAUNCHER
          unset RUSTC_WRAPPER

          # GNU manylinux: enable gcc-toolset-14 so cmake/cargo see gcc 14.
          # System gcc 8.5 emits an unresolvable __cxx11::filesystem_error
          # typeinfo from C++17 stdlib code; gcc-toolset-14 emits the modern
          # ABI-tag form. The wheel's symbol footprint (max GLIBC 2.32 via
          # ort-sys's prebuilt onnxruntime, max GLIBCXX 3.4.25) lands within
          # manylinux_2_34's allowance.
          if [[ "${{ matrix.container-kind }}" == "manylinux" && "${{ matrix.target }}" == *"-linux-gnu" ]]; then
            if [ -f /opt/rh/gcc-toolset-14/enable ]; then
              set +u
              source /opt/rh/gcc-toolset-14/enable
              set -u
              echo "Activated gcc-toolset-14: $(gcc --version | head -1)"
            else
              echo "ERROR: /opt/rh/gcc-toolset-14/enable missing in $(uname -m) ci-base image" >&2
              exit 1
            fi
          fi

          INTERPRETERS=""
          for V in 3.10 3.11 3.12 3.13 3.14; do
            INTERP=$(uv python find "$V" 2>/dev/null) && INTERPRETERS="$INTERPRETERS -i $INTERP" || echo "Python $V unavailable, skipping"
          done
          echo "Building for ${{ matrix.target }} with: $INTERPRETERS"
          MANYLINUX_FLAG=""
          if [ -n "${{ matrix.manylinux }}" ]; then
            MANYLINUX_FLAG="--manylinux ${{ matrix.manylinux }}"
          fi
          # On stable cargo, RUSTFLAGS does NOT apply to build.rs scripts when
          # --target is passed explicitly; [host] rustflags / CARGO_HOST_RUSTFLAGS
          # are nightly-only. On alpine aarch64-musl the host triple already
          # equals the matrix target (aarch64-unknown-linux-musl), so drop
          # --target and export RUSTFLAGS -- cargo unifies host+target
          # compilation and the flag reaches build.rs, making the host binary
          # dynamically linked so bindgen can dlopen libclang (llama-cpp-sys-2
          # etc.). Non-alpine Linux targets still cross-compile, keep --target.
          TARGET_FLAG="--target ${{ matrix.target }}"
          if [[ "${{ matrix.container-kind }}" == "alpine" ]]; then
            export RUSTFLAGS="-C target-feature=-crt-static"
            TARGET_FLAG=""
          fi
          uvx maturin build --release \
            -m crates/blazen-py/Cargo.toml \
            $TARGET_FLAG \
            $MANYLINUX_FLAG \
            $INTERPRETERS

          # Diagnostic: show the symbol envelope auditwheel observed.
          if [[ "${{ matrix.container-kind }}" == "manylinux" && "${{ matrix.target }}" == *"-linux-gnu" ]]; then
            WHEELS_DIR="${CARGO_TARGET_DIR:-target}/wheels"
            for whl in "$WHEELS_DIR"/*.whl; do
              echo "--- $whl ---"
              uvx auditwheel show "$whl" || true
            done
          fi

      - name: Build wheels (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # Strip inherited CMake launcher vars from this PowerShell process.
          # llama-cpp-sys-2/build.rs:538-543 iterates env::vars() and forwards
          # every CMAKE_* as -D to cmake; clearing them here means child
          # processes (maturin -> cargo -> build.rs) inherit a clean env, no
          # -DCMAKE_*_COMPILER_LAUNCHER=ccache reaches cmake, Ninja never
          # tries to spawn ccache.
          Remove-Item Env:CMAKE_C_COMPILER_LAUNCHER   -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_CXX_COMPILER_LAUNCHER -ErrorAction SilentlyContinue
          Get-ChildItem Env: | Where-Object Name -like 'CMAKE_*LAUNCHER*' |
            ForEach-Object { Remove-Item "Env:$($_.Name)" -ErrorAction SilentlyContinue }

          $maturinArgs = @('build','--release','-m','crates/blazen-py/Cargo.toml','--target','${{ matrix.target }}')
          if ('${{ matrix.manylinux }}' -ne '') {
            $maturinArgs += '--manylinux'
            $maturinArgs += '${{ matrix.manylinux }}'
          }
          foreach ($V in '3.10','3.11','3.12','3.13','3.14') {
            $p = & uv python find $V 2>$null
            if ($LASTEXITCODE -eq 0 -and $p) {
              $maturinArgs += '-i'
              $maturinArgs += $p
            } else {
              Write-Host "Python $V unavailable, skipping"
            }
          }
          Write-Host "Running: uvx maturin $($maturinArgs -join ' ')"
          & uvx maturin @maturinArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload wheels to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          tar -czf "wheels-${TARGET}.tar.gz" -C "${CARGO_TARGET_DIR:-target}/wheels" .
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}/wheels-${TARGET}.tar.gz"
          # Forgejo's generic package PUT returns 409 if the file exists. On a
          # mark-step retry the upload already succeeded, so DELETE+PUT on 409
          # keeps the step idempotent.
          code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            --upload-file "wheels-${TARGET}.tar.gz" "$URL")
          case "$code" in
            200|201) echo "Uploaded (HTTP $code)" ;;
            409)
              echo "::warning::Package exists (HTTP 409); deleting and re-uploading"
              curl --fail -s -X DELETE \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" "$URL"
              curl --fail -s -X PUT \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
                --upload-file "wheels-${TARGET}.tar.gz" "$URL"
              ;;
            *) echo "::error::Upload failed (HTTP $code)"; exit 1 ;;
          esac

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-wheels-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-sdist:
    name: Build sdist
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-sdist
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: sdist.tar.gz
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install uv
        if: steps.verify.outputs.completed != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Stamp version
        if: steps.verify.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Build sdist
        if: steps.verify.outputs.completed != 'true'
        run: uvx maturin sdist -m crates/blazen-py/Cargo.toml

      - name: Upload sdist to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          shopt -s nullglob
          SDIST_FILES=(target/wheels/*.tar.gz)
          if [ ${#SDIST_FILES[@]} -eq 0 ]; then
            echo "::error::No sdist tarball found in target/wheels/"
            exit 1
          fi
          if [ ${#SDIST_FILES[@]} -gt 1 ]; then
            echo "::warning::Multiple sdist tarballs found; uploading first: ${SDIST_FILES[0]}"
          fi
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}/sdist.tar.gz"
          # 409 on retry → delete + re-upload (see wheels step for rationale).
          code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            --upload-file "${SDIST_FILES[0]}" "$URL")
          case "$code" in
            200|201) echo "Uploaded (HTTP $code)" ;;
            409)
              echo "::warning::Package exists (HTTP 409); deleting and re-uploading"
              curl --fail -s -X DELETE \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" "$URL"
              curl --fail -s -X PUT \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
                --upload-file "${SDIST_FILES[0]}" "$URL"
              ;;
            *) echo "::error::Upload failed (HTTP $code)"; exit 1 ;;
          esac

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-sdist
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-napi:
    name: Build napi binary (${{ matrix.target }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-gnu
            container-kind: manylinux
          - target: aarch64-unknown-linux-gnu
            runs-on: arm64
            container: quay.io/pypa/manylinux_2_28_aarch64
            container-kind: manylinux
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-musl
            container-kind: musl
            openssl-vendored: "1"
          - target: aarch64-unknown-linux-musl
            runs-on: arm64
            container: alpine:3.20
            container-kind: alpine
            openssl-vendored: "1"
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
          - target: wasm32-wasi
            rustc-target: wasm32-wasip1-threads
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-gnu
            container-kind: manylinux
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
      credentials:
        username: zachhandley
        password: ${{ secrets.FORGEJO_ACTIONS_TOKEN }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
      OPENSSL_STATIC: ${{ matrix.openssl-vendored }}
      OPENSSL_VENDORED: ${{ matrix.openssl-vendored }}
    steps:
      - name: Setup container runtime
        if: matrix.container-kind
        uses: https://forge.blackleafdigital.com/Public/actions/setup-container-runtime@main

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-napi-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: napi-${{ matrix.target }}.tar.gz
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Diagnose inherited env (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "=== Process env: CMAKE_* and *LAUNCHER* ==="
          Get-ChildItem Env: | Where-Object { $_.Name -like 'CMAKE*' -or $_.Name -like '*LAUNCHER*' } | Format-List
          Write-Host "=== Machine-scope CMAKE / LAUNCHER ==="
          [Environment]::GetEnvironmentVariables('Machine').GetEnumerator() |
            Where-Object { $_.Key -like 'CMAKE*' -or $_.Key -like '*LAUNCHER*' } |
            Format-Table -AutoSize
          Write-Host "=== User-scope CMAKE / LAUNCHER ==="
          [Environment]::GetEnvironmentVariables('User').GetEnumerator() |
            Where-Object { $_.Key -like 'CMAKE*' -or $_.Key -like '*LAUNCHER*' } |
            Format-Table -AutoSize

      - name: Install system deps (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        run: yum install -y cmake openssl-devel ccache pkg-config curl perl-core perl-Time-Piece clang-devel

      - name: Install protoc (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: protobuf-compiler
          cross-platform: 'true'

      - name: Install system deps (musl)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'musl'
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake ccache pkg-config curl libssl-dev libclang-dev protobuf-compiler

      - name: Install system deps (alpine)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'alpine'
        run: |
          apk add --no-cache \
            bash curl git \
            gcc g++ musl-dev linux-headers \
            cmake make ccache \
            pkgconf openssl-dev \
            clang-dev llvm-dev \
            perl patchelf libffi-dev \
            protobuf-dev

      - name: Ensure musl toolchain on PATH and pin cargo linker
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'musl'
        shell: bash
        run: |
          # rust-musl-cross images install the toolchain under the FULL rust
          # target triple (e.g. aarch64-unknown-linux-musl-gcc), not the
          # shortened gcc triple. Use the matrix target verbatim as the prefix.
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl|aarch64-unknown-linux-musl) triple="${{ matrix.target }}" ;;
            *) echo "::error::Unexpected musl target: ${{ matrix.target }}"; exit 1 ;;
          esac

          # Probe for the cross toolchain bin dir; rust-musl-cross images differ.
          bindir=""
          for d in \
            "/usr/local/musl/bin" \
            "/opt/${triple}-cross/bin" \
            "/usr/local/${triple}/bin"; do
            if [ -x "$d/${triple}-gcc" ]; then
              bindir="$d"
              break
            fi
          done
          if [ -z "$bindir" ]; then
            echo "::error::Could not locate ${triple}-gcc; searched /usr/local/musl/bin, /opt/${triple}-cross/bin, /usr/local/${triple}/bin"
            echo "PATH=$PATH"
            find / -name "${triple}-gcc" -type f 2>/dev/null | head
            exit 1
          fi
          echo "Found cross toolchain at $bindir"

          echo "$bindir" >> "$GITHUB_PATH"

          # Create short-triple symlinks so cargo's DEFAULT linker lookup works
          # without any env-var plumbing. Rust's target spec for
          # {arch}-unknown-linux-musl defaults the linker to the short form
          # `{arch}-linux-musl-gcc`, which does NOT exist in this image (only
          # the long-form `{arch}-unknown-linux-musl-gcc` is present in
          # /usr/local/musl/bin, verified via `podman run ... ls`). Every prior
          # attempt to fix this via env vars (CARGO_TARGET_*_LINKER / CC_* /
          # CXX_*) failed because $GITHUB_ENV writes don't propagate through
          # pnpm -> napi-rs / uvx -> maturin to the cargo subprocess on this
          # Forgejo runner. Symlink both into $bindir (already on PATH) and
          # /usr/local/bin as a second-chance hit.
          short_triple="${triple/-unknown-/-}"   # aarch64-unknown-linux-musl -> aarch64-linux-musl
          ln -sf "${bindir}/${triple}-gcc" "${bindir}/${short_triple}-gcc"
          ln -sf "${bindir}/${triple}-g++" "${bindir}/${short_triple}-g++"
          ln -sf "${bindir}/${triple}-gcc" "/usr/local/bin/${short_triple}-gcc"
          ln -sf "${bindir}/${triple}-g++" "/usr/local/bin/${short_triple}-g++"
          echo "Short-triple symlinks in place:"
          ls -l "${bindir}/${short_triple}-gcc" "/usr/local/bin/${short_triple}-gcc"

          # Also write absolute-path env vars as belt-and-suspenders. If they
          # propagate, great; if they don't, the symlinks above still win via
          # cargo's default lookup.
          cargo_env=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${cargo_env}_LINKER=${bindir}/${triple}-gcc" >> "$GITHUB_ENV"
          triple_under=$(echo "${{ matrix.target }}" | tr '-' '_')
          echo "CC_${triple_under}=${bindir}/${triple}-gcc" >> "$GITHUB_ENV"
          echo "CXX_${triple_under}=${bindir}/${triple}-g++" >> "$GITHUB_ENV"

      - name: Alias gcc as aarch64-linux-musl-gcc (alpine)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'alpine'
        shell: bash
        run: |
          # rustc's target spec for aarch64-unknown-linux-musl defaults the
          # linker name to `aarch64-linux-musl-gcc`. On Alpine arm64, /usr/bin/gcc
          # IS a native musl compiler -- symlink it under the expected name so
          # rustc's default lookup resolves without env-var plumbing (which
          # doesn't always propagate through pnpm -> napi / uvx -> maturin).
          ln -sf /usr/bin/gcc /usr/local/bin/aarch64-linux-musl-gcc
          ln -sf /usr/bin/g++ /usr/local/bin/aarch64-linux-musl-g++
          echo "CC_aarch64_unknown_linux_musl=/usr/local/bin/aarch64-linux-musl-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_musl=/usr/local/bin/aarch64-linux-musl-g++" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=/usr/local/bin/aarch64-linux-musl-gcc" >> "$GITHUB_ENV"

      - name: Install system deps (macOS)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'macOS'
        run: brew install cmake ccache

      - name: Configure CMake to use ccache (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          fi

      - name: Install Git Bash (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Setup MSVC (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-msvc@main
        with:
          arch: x64
          year: "2022"
          toolset: "14.4"
          install-if-missing: "true"

      - name: Install libclang (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-libclang@main
        with:
          version: '17.0.6'

      - name: Setup Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-ninja@main

      - name: Force CMAKE_GENERATOR=Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"

      - name: Isolate CARGO_TARGET_DIR per matrix entry (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          # Single self-hosted runner = sequential matrix; $GITHUB_WORKSPACE
          # (host bind-mount) is shared across entries. setup-rust defaults
          # CARGO_TARGET_DIR to $GITHUB_WORKSPACE/target (setup-rust/src/
          # index.ts:326), which lets a manylinux-glibc entry leave a
          # build-script-build linked against /lib64/ld-linux-x86-64.so.2.
          # A subsequent musl-container entry reuses that binary; execve
          # ENOENTs on PT_INTERP. Per-entry isolation sidesteps the class.
          # sccache S3 keys are rustc-hash + argv based (not target-dir
          # based), so cache hits are preserved.
          TARGET_DIR="${GITHUB_WORKSPACE}/target-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${TARGET_DIR}"
          echo "CARGO_TARGET_DIR=${TARGET_DIR}" >> "$GITHUB_ENV"

      - name: Isolate CARGO_HOME per job (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          # setup-rust defaults CARGO_HOME to $RUNNER_TOOL_CACHE/cargo (host-
          # shared) and /tmp isn't reliably durable inside Forgejo job
          # containers. $GITHUB_WORKSPACE is the host-bind-mounted checkout
          # dir and persists for the whole job. Include github.job +
          # matrix.target so sequential matrix entries don't carry stale
          # sccache binaries from a previous entry's $CARGO_HOME/bin.
          CARGO_HOME_DIR="${GITHUB_WORKSPACE}/.cargo-home-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${CARGO_HOME_DIR}"
          echo "CARGO_HOME=${CARGO_HOME_DIR}" >> "$GITHUB_ENV"

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          # rustc-target overrides matrix.target for the rustup toolchain triple
          # (e.g. wasm32-wasi -> wasm32-wasip1-threads). Native triples leave
          # rustc-target unset, falling back to matrix.target.
          targets: ${{ matrix.rustc-target || matrix.target }}
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-napi-${{ matrix.target }}
          ccache: true
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Verify sccache on PATH
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -u
          WRAPPER="${RUSTC_WRAPPER:-}"
          if [ -z "$WRAPPER" ]; then
            exit 0
          fi
          if [[ "$WRAPPER" == /* || "$WRAPPER" == ?:* ]]; then
            if [ ! -x "$WRAPPER" ]; then
              echo "::warning::RUSTC_WRAPPER=$WRAPPER not executable; disabling sccache for this job"
              echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
              exit 0
            fi
          elif ! command -v "$WRAPPER" >/dev/null 2>&1; then
            echo "::warning::RUSTC_WRAPPER=$WRAPPER not found on PATH; disabling sccache for this job"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            exit 0
          fi
          "$WRAPPER" --version

      - name: Setup Node.js
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-node@main
        with:
          node-version: '22'
          package-manager: pnpm

      - name: Setup Python (for stamping)
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Stamp version
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: uv run --no-project python scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Install npm deps
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: pnpm install

      - name: Build napi binary (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          # Strip ccache compiler shims + CMake launcher env + unset
          # RUSTC_WRAPPER — see Build wheels (non-Windows) for the full
          # rationale (openssl-src `.s` asm breaks under any cc wrapper; cc-rs
          # auto-injects $RUSTC_WRAPPER as the cc wrapper when its stem is
          # sccache/cachepot/buildcache, per cc-rs src/lib.rs:3200-3212).
          # Mirrors what Build napi binary (Windows) does with
          # Remove-Item Env:CMAKE_*_COMPILER_LAUNCHER.
          PATH="$(echo ":${PATH}:" | sed -e 's#:/usr/lib/ccache:#:#g' -e 's#:/usr/lib64/ccache:#:#g' -e 's#^:##' -e 's#:$##')"
          export PATH
          unset CMAKE_C_COMPILER_LAUNCHER CMAKE_CXX_COMPILER_LAUNCHER
          unset RUSTC_WRAPPER

          # Alpine aarch64-musl bypasses napi-rs/cli and invokes cargo directly.
          # Why: napi-rs/cli@3.5.1 unconditionally injects `--target <triple>` via
          # BuildCommand.setTarget() (cli.js:1363) regardless of user flags. On
          # stable cargo, passing --target makes RUSTFLAGS apply only to the
          # target, not to build.rs scripts ([host] rustflags is nightly-only,
          # CARGO_HOST_RUSTFLAGS is nightly-only). So `RUSTFLAGS=-C target-feature=
          # -crt-static` never reaches build.rs, build.rs statically links against
          # musl+crt-static, and bindgen's libclang dlopen() fails with musl's
          # static-binary dlfcn stub ("Dynamic loading not supported") in
          # llama-cpp-sys-2 / ort-sys / piper-sys / whisper-rs-sys / candle-*-sys.
          #
          # Calling cargo directly with no --target lets cargo unify host+target
          # (host IS aarch64-unknown-linux-musl on alpine arm64), so RUSTFLAGS
          # reaches build.rs, build.rs is dynamic, dlopen works. napi's post-build
          # (index.js / index.d.ts / type-defs) is regenerated at release time
          # by `napi prepublish` in release.yaml:333 — each build-matrix entry
          # only needs to upload the .node binary, and the upload step below
          # tars `blazen.*.node` which is exactly what we produce via cp.
          #
          # Non-alpine non-Windows entries (manylinux gnu/musl on x86_64, aarch64
          # gnu manylinux) still use napi-rs/cli because napi's --target injection
          # is what they want (real cross or same-triple-as-host with dynamic glibc).
          if [[ "${{ matrix.target }}" == "wasm32-wasi" ]]; then
            # wasm32-wasip1-threads target: napi-rs emits a JS shim
            # (blazen.wasi*.cjs / blazen.wasi-browser.js) plus the actual
            # wasm binary (blazen.wasm32-wasi.wasm). The `wasi` feature alias
            # in crates/blazen-node/Cargo.toml selects the wasi-safe feature
            # set (tiktoken, distributed-http, otlp-http, langfuse). `tract` is
            # intentionally excluded because blazen-embed-tract still drags
            # `wasm-bindgen` via reqwest's wasm32 path; see Cargo.toml.
            #
            # EMNAPI_LINK_DIR points at the emnapi sysroot inside pnpm's
            # virtual store so napi-rs can link against the wasi runtime
            # bundled with `emnapi` (already pulled in by `pnpm install`
            # above).
            export EMNAPI_LINK_DIR="$(pwd)/node_modules/.pnpm/emnapi@1.9.0/node_modules/emnapi/lib/wasm32-wasip1-threads"
            pnpm --filter blazen exec napi build \
              --release \
              --platform \
              --target wasm32-wasip1-threads \
              --no-default-features \
              --features wasi \
              --js index.js
          elif [[ "${{ matrix.container-kind }}" == "alpine" ]]; then
            export RUSTFLAGS="-C target-feature=-crt-static"
            (cd crates/blazen-node && cargo build --release --features local-all)
            cp "${CARGO_TARGET_DIR:-target}/release/libblazen_node.so" \
               crates/blazen-node/blazen.linux-arm64-musl.node
          else
            pnpm --filter blazen exec napi build \
              --release \
              --platform \
              --target ${{ matrix.target }} \
              --features local-all \
              --js index.js
          fi

      - name: Build napi binary (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # Strip inherited CMake launcher vars — see Build wheels (Windows)
          # for proof chain (llama-cpp-sys-2/build.rs:538-543 forwards every
          # CMAKE_* env var as -D to cmake).
          Remove-Item Env:CMAKE_C_COMPILER_LAUNCHER   -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_CXX_COMPILER_LAUNCHER -ErrorAction SilentlyContinue
          Get-ChildItem Env: | Where-Object Name -like 'CMAKE_*LAUNCHER*' |
            ForEach-Object { Remove-Item "Env:$($_.Name)" -ErrorAction SilentlyContinue }

          & pnpm --filter blazen exec napi build `
            --release `
            --platform `
            --target ${{ matrix.target }} `
            --features local-all `
            --js index.js
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload napi binary to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          cd crates/blazen-node
          shopt -s nullglob
          if [[ "${TARGET}" == "wasm32-wasi" ]]; then
            # napi-rs v3 wasi outputs: blazen.wasi.cjs / blazen.wasi-browser.js
            # JS shims plus the blazen.wasm32-wasi.wasm binary. Globs cover all
            # variants emitted by current napi-cli without pinning exact names.
            NODE_FILES=(blazen.wasi*.cjs blazen.wasi*.js blazen.wasm32-wasi.wasm)
          else
            NODE_FILES=(blazen.*.node)
          fi
          if [ ${#NODE_FILES[@]} -eq 0 ]; then
            echo "::error::No napi binaries found in crates/blazen-node/ — build did not produce output"
            exit 1
          fi
          tar -czf "../../napi-${TARGET}.tar.gz" "${NODE_FILES[@]}"
          cd ../..
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}/napi-${TARGET}.tar.gz"
          # 409 on retry → delete + re-upload (see wheels step for rationale).
          code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            --upload-file "napi-${TARGET}.tar.gz" "$URL")
          case "$code" in
            200|201) echo "Uploaded (HTTP $code)" ;;
            409)
              echo "::warning::Package exists (HTTP 409); deleting and re-uploading"
              curl --fail -s -X DELETE \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" "$URL"
              curl --fail -s -X PUT \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
                --upload-file "napi-${TARGET}.tar.gz" "$URL"
              ;;
            *) echo "::error::Upload failed (HTTP $code)"; exit 1 ;;
          esac

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-napi-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-wasm:
    name: Build WASM SDK
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: wasm.tar.gz
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-build-wasm
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Verify sccache on PATH
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -u
          WRAPPER="${RUSTC_WRAPPER:-}"
          if [ -z "$WRAPPER" ]; then
            exit 0
          fi
          if [[ "$WRAPPER" == /* || "$WRAPPER" == ?:* ]]; then
            if [ ! -x "$WRAPPER" ]; then
              echo "::warning::RUSTC_WRAPPER=$WRAPPER not executable; disabling sccache for this job"
              echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
              exit 0
            fi
          elif ! command -v "$WRAPPER" >/dev/null 2>&1; then
            echo "::warning::RUSTC_WRAPPER=$WRAPPER not found on PATH; disabling sccache for this job"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            exit 0
          fi
          "$WRAPPER" --version

      - name: Install wasm-pack
        if: steps.verify.outputs.completed != 'true'
        run: which wasm-pack || cargo install wasm-pack

      - name: Stamp version
        if: steps.verify.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }}

      - name: Build WASM SDK
        if: steps.verify.outputs.completed != 'true'
        run: |
          cd crates/blazen-wasm-sdk
          wasm-pack build --target bundler --release

      - name: Rename pkg to @blazen-dev/wasm
        if: steps.verify.outputs.completed != 'true'
        run: python3 scripts/stamp-version.py ${{ needs.version.outputs.version }} --rename-wasm-pkg

      - name: Upload wasm pkg to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          tar -czf wasm.tar.gz -C crates/blazen-wasm-sdk pkg
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}/wasm.tar.gz"
          # 409 on retry → delete + re-upload (see wheels step for rationale).
          code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            --upload-file wasm.tar.gz "$URL")
          case "$code" in
            200|201) echo "Uploaded (HTTP $code)" ;;
            409)
              echo "::warning::Package exists (HTTP 409); deleting and re-uploading"
              curl --fail -s -X DELETE \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" "$URL"
              curl --fail -s -X PUT \
                -u "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
                --upload-file wasm.tar.gz "$URL"
              ;;
            *) echo "::error::Upload failed (HTTP $code)"; exit 1 ;;
          esac

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-uniffi:
    name: Build blazen-uniffi (${{ matrix.target }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-gnu
            container-kind: manylinux
            artifact-os: linux
            artifact-arch: x86_64
            dyn-ext: so
            static-ext: a
          - target: aarch64-unknown-linux-gnu
            runs-on: arm64
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:aarch64-unknown-linux-gnu
            container-kind: manylinux
            artifact-os: linux
            artifact-arch: aarch64
            dyn-ext: so
            static-ext: a
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
            artifact-os: darwin
            artifact-arch: aarch64
            dyn-ext: dylib
            static-ext: a
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
            artifact-os: darwin
            artifact-arch: x86_64
            dyn-ext: dylib
            static-ext: a
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact-os: windows
            artifact-arch: x86_64
            dyn-ext: dll
            static-ext: lib
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
      credentials:
        username: zachhandley
        password: ${{ secrets.FORGEJO_ACTIONS_TOKEN }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
    steps:
      - name: Setup container runtime
        if: matrix.container-kind
        uses: https://forge.blackleafdigital.com/Public/actions/setup-container-runtime@main

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-uniffi-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      # build-uniffi uploads two files per matrix entry: a static archive
      # (.a / .lib) consumed by Go, and a dynamic library (.so / .dylib /
      # .dll) consumed by Kotlin/Ruby. Both must exist on the generic package
      # registry for the release pipeline to succeed, so verify both.
      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: |
            libblazen_uniffi-${{ matrix.artifact-os }}-${{ matrix.artifact-arch }}.${{ matrix.static-ext }}
            libblazen_uniffi-${{ matrix.artifact-os }}-${{ matrix.artifact-arch }}.${{ matrix.dyn-ext }}
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system deps (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        run: yum install -y cmake openssl-devel ccache pkg-config curl perl-core perl-Time-Piece clang-devel

      - name: Install protoc (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: protobuf-compiler
          cross-platform: 'true'

      - name: Install system deps (macOS)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'macOS'
        run: brew install cmake ccache

      - name: Install Git Bash (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Setup MSVC (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-msvc@main
        with:
          arch: x64
          year: "2022"
          toolset: "14.4"
          install-if-missing: "true"

      - name: Install libclang (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-libclang@main
        with:
          version: '17.0.6'

      - name: Setup Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-ninja@main

      - name: Force CMAKE_GENERATOR=Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"

      - name: Isolate CARGO_TARGET_DIR per matrix entry (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          TARGET_DIR="${GITHUB_WORKSPACE}/target-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${TARGET_DIR}"
          echo "CARGO_TARGET_DIR=${TARGET_DIR}" >> "$GITHUB_ENV"

      - name: Isolate CARGO_HOME per job (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          CARGO_HOME_DIR="${GITHUB_WORKSPACE}/.cargo-home-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${CARGO_HOME_DIR}"
          echo "CARGO_HOME=${CARGO_HOME_DIR}" >> "$GITHUB_ENV"

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: ${{ matrix.target }}
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-uniffi-${{ matrix.target }}
          ccache: true
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Setup Python (for build-uniffi-lib.sh helper)
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Build blazen-uniffi (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        # Strip ccache shims + RUSTC_WRAPPER for the same reason the Build
        # wheels (non-Windows) step does — openssl-src's .s asm breaks under
        # any C-compiler cache wrapper, and cc-rs auto-injects RUSTC_WRAPPER
        # as the cc wrapper when its stem is sccache/cachepot/buildcache.
        run: |
          PATH="$(echo ":${PATH}:" | sed -e 's#:/usr/lib/ccache:#:#g' -e 's#:/usr/lib64/ccache:#:#g' -e 's#^:##' -e 's#:$##')"
          export PATH
          unset CMAKE_C_COMPILER_LAUNCHER CMAKE_CXX_COMPILER_LAUNCHER
          unset RUSTC_WRAPPER

          if [[ "${{ matrix.container-kind }}" == "manylinux" && "${{ matrix.target }}" == *"-linux-gnu" ]]; then
            if [ -f /opt/rh/gcc-toolset-14/enable ]; then
              set +u
              source /opt/rh/gcc-toolset-14/enable
              set -u
            fi
          fi

          cargo build -p blazen-uniffi --release --target ${{ matrix.target }}

      - name: Build blazen-uniffi (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item Env:CMAKE_C_COMPILER_LAUNCHER   -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_CXX_COMPILER_LAUNCHER -ErrorAction SilentlyContinue
          Get-ChildItem Env: | Where-Object Name -like 'CMAKE_*LAUNCHER*' |
            ForEach-Object { Remove-Item "Env:$($_.Name)" -ErrorAction SilentlyContinue }
          & cargo build -p blazen-uniffi --release --target ${{ matrix.target }}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect artefacts (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${CARGO_TARGET_DIR:-target}/${{ matrix.target }}/release"
          STAGE="${GITHUB_WORKSPACE}/uniffi-stage"
          mkdir -p "${STAGE}"
          OS="${{ matrix.artifact-os }}"
          ARCH="${{ matrix.artifact-arch }}"
          # Static lib (.a) — Go consumes this via cgo.
          if [ -f "${OUT_DIR}/libblazen_uniffi.a" ]; then
            cp "${OUT_DIR}/libblazen_uniffi.a" "${STAGE}/libblazen_uniffi-${OS}-${ARCH}.a"
          fi
          # Dynamic lib — Kotlin (JNA), Ruby (ffi) consume this.
          if [ "$OS" = "linux" ] && [ -f "${OUT_DIR}/libblazen_uniffi.so" ]; then
            cp "${OUT_DIR}/libblazen_uniffi.so" "${STAGE}/libblazen_uniffi-${OS}-${ARCH}.so"
          fi
          if [ "$OS" = "darwin" ] && [ -f "${OUT_DIR}/libblazen_uniffi.dylib" ]; then
            cp "${OUT_DIR}/libblazen_uniffi.dylib" "${STAGE}/libblazen_uniffi-${OS}-${ARCH}.dylib"
          fi
          echo "Staged:"
          ls -lh "${STAGE}/"

      - name: Collect artefacts (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${CARGO_TARGET_DIR:-target}/${{ matrix.target }}/release"
          STAGE="${GITHUB_WORKSPACE}/uniffi-stage"
          mkdir -p "${STAGE}"
          ARCH="${{ matrix.artifact-arch }}"
          # MSVC emits blazen_uniffi.lib (static, for Go cgo) and
          # blazen_uniffi.dll (dynamic, for Kotlin JNA / Ruby ffi). No `lib`
          # prefix on Windows.
          if [ -f "${OUT_DIR}/blazen_uniffi.lib" ]; then
            cp "${OUT_DIR}/blazen_uniffi.lib" "${STAGE}/libblazen_uniffi-windows-${ARCH}.lib"
          fi
          if [ -f "${OUT_DIR}/blazen_uniffi.dll" ]; then
            cp "${OUT_DIR}/blazen_uniffi.dll" "${STAGE}/libblazen_uniffi-windows-${ARCH}.dll"
          fi
          ls -lh "${STAGE}/"

      - name: Upload static (.a / .lib)
        if: steps.verify.outputs.completed != 'true'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: libblazen_uniffi-${{ matrix.target }}-static
          path: |
            uniffi-stage/libblazen_uniffi-*.a
            uniffi-stage/libblazen_uniffi-*.lib
          if-no-files-found: warn

      - name: Upload dynamic (.so / .dylib / .dll)
        if: steps.verify.outputs.completed != 'true'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: libblazen_uniffi-${{ matrix.target }}-dynamic
          path: |
            uniffi-stage/libblazen_uniffi-*.so
            uniffi-stage/libblazen_uniffi-*.dylib
            uniffi-stage/libblazen_uniffi-*.dll
          if-no-files-found: warn

      - name: Upload artefacts to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          shopt -s nullglob
          for F in uniffi-stage/libblazen_uniffi-*; do
            NAME=$(basename "$F")
            URL="${BASE}/${NAME}"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -u "$AUTH" --upload-file "$F" "$URL")
            case "$CODE" in
              200|201) echo "Uploaded ${NAME} (HTTP $CODE)" ;;
              409)
                echo "::warning::${NAME} exists (HTTP 409); deleting and re-uploading"
                curl --fail -s -X DELETE -u "$AUTH" "$URL"
                curl --fail -s -X PUT -u "$AUTH" --upload-file "$F" "$URL"
                ;;
              *) echo "::error::Upload ${NAME} failed (HTTP $CODE)"; exit 1 ;;
            esac
          done

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-uniffi-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-cabi:
    name: Build blazen-cabi (${{ matrix.target }})
    needs: version
    # Builds libblazen_cabi.{so,dylib,dll} for the same target matrix as
    # build-uniffi. Consumed by the Ruby gem (via release-ruby in
    # release.yaml, which downloads these artefacts, stages them under
    # bindings/ruby/ext/blazen/<arch>/, and runs `gem build`).
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:x86_64-unknown-linux-gnu
            container-kind: manylinux
            artifact-os: linux
            artifact-arch: x86_64
            dyn-ext: so
            ruby-arch-dir: linux_amd64
          - target: aarch64-unknown-linux-gnu
            runs-on: arm64
            container: forge.blackleafdigital.com/blackleafdigital/blazen-ci-base:aarch64-unknown-linux-gnu
            container-kind: manylinux
            artifact-os: linux
            artifact-arch: aarch64
            dyn-ext: so
            ruby-arch-dir: linux_arm64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
            artifact-os: darwin
            artifact-arch: aarch64
            dyn-ext: dylib
            ruby-arch-dir: darwin_arm64
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            deployment-target: "14.0"
            artifact-os: darwin
            artifact-arch: x86_64
            dyn-ext: dylib
            ruby-arch-dir: darwin_amd64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact-os: windows
            artifact-arch: x86_64
            dyn-ext: dll
            ruby-arch-dir: windows_amd64
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
      credentials:
        username: zachhandley
        password: ${{ secrets.FORGEJO_ACTIONS_TOKEN }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
    steps:
      - name: Setup container runtime
        if: matrix.container-kind
        uses: https://forge.blackleafdigital.com/Public/actions/setup-container-runtime@main

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-cabi-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      # build-cabi uploads only the dynamic library per target (Ruby's ffi
      # gem loads it at runtime). Verify it exists on the generic package
      # registry before short-circuiting.
      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: libblazen_cabi-${{ matrix.artifact-os }}-${{ matrix.artifact-arch }}.${{ matrix.dyn-ext }}
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system deps (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        run: yum install -y cmake openssl-devel ccache pkg-config curl perl-core perl-Time-Piece clang-devel

      - name: Install protoc (manylinux)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind == 'manylinux'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: protobuf-compiler
          cross-platform: 'true'

      - name: Install system deps (macOS)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'macOS'
        run: brew install cmake ccache

      - name: Install Git Bash (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Setup MSVC (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-msvc@main
        with:
          arch: x64
          year: "2022"
          toolset: "14.4"
          install-if-missing: "true"

      - name: Install libclang (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-libclang@main
        with:
          version: '17.0.6'

      - name: Setup Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-ninja@main

      - name: Force CMAKE_GENERATOR=Ninja (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"

      - name: Isolate CARGO_TARGET_DIR per matrix entry (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          TARGET_DIR="${GITHUB_WORKSPACE}/target-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${TARGET_DIR}"
          echo "CARGO_TARGET_DIR=${TARGET_DIR}" >> "$GITHUB_ENV"

      - name: Isolate CARGO_HOME per job (Linux containers)
        if: steps.verify.outputs.completed != 'true' && matrix.container-kind != ''
        shell: bash
        run: |
          CARGO_HOME_DIR="${GITHUB_WORKSPACE}/.cargo-home-${{ github.job }}-${{ matrix.target }}"
          mkdir -p "${CARGO_HOME_DIR}"
          echo "CARGO_HOME=${CARGO_HOME_DIR}" >> "$GITHUB_ENV"

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: ${{ matrix.target }}
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-cabi-${{ matrix.target }}
          ccache: true
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Build blazen-cabi (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        # Same ccache/RUSTC_WRAPPER scrubbing as build-uniffi — openssl-src's
        # .s asm breaks under any C-compiler cache wrapper, and cc-rs auto-
        # injects RUSTC_WRAPPER as the cc wrapper when its stem is sccache.
        run: |
          PATH="$(echo ":${PATH}:" | sed -e 's#:/usr/lib/ccache:#:#g' -e 's#:/usr/lib64/ccache:#:#g' -e 's#^:##' -e 's#:$##')"
          export PATH
          unset CMAKE_C_COMPILER_LAUNCHER CMAKE_CXX_COMPILER_LAUNCHER
          unset RUSTC_WRAPPER

          if [[ "${{ matrix.container-kind }}" == "manylinux" && "${{ matrix.target }}" == *"-linux-gnu" ]]; then
            if [ -f /opt/rh/gcc-toolset-14/enable ]; then
              set +u
              source /opt/rh/gcc-toolset-14/enable
              set -u
            fi
          fi

          cargo build -p blazen-cabi --release --target ${{ matrix.target }}

      - name: Build blazen-cabi (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item Env:CMAKE_C_COMPILER_LAUNCHER   -ErrorAction SilentlyContinue
          Remove-Item Env:CMAKE_CXX_COMPILER_LAUNCHER -ErrorAction SilentlyContinue
          Get-ChildItem Env: | Where-Object Name -like 'CMAKE_*LAUNCHER*' |
            ForEach-Object { Remove-Item "Env:$($_.Name)" -ErrorAction SilentlyContinue }
          & cargo build -p blazen-cabi --release --target ${{ matrix.target }}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect artefacts (non-Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${CARGO_TARGET_DIR:-target}/${{ matrix.target }}/release"
          STAGE="${GITHUB_WORKSPACE}/cabi-stage"
          mkdir -p "${STAGE}"
          OS="${{ matrix.artifact-os }}"
          ARCH="${{ matrix.artifact-arch }}"
          # Only the dynamic lib — Ruby's ffi gem loads at runtime.
          if [ "$OS" = "linux" ] && [ -f "${OUT_DIR}/libblazen_cabi.so" ]; then
            cp "${OUT_DIR}/libblazen_cabi.so" "${STAGE}/libblazen_cabi-${OS}-${ARCH}.so"
          fi
          if [ "$OS" = "darwin" ] && [ -f "${OUT_DIR}/libblazen_cabi.dylib" ]; then
            cp "${OUT_DIR}/libblazen_cabi.dylib" "${STAGE}/libblazen_cabi-${OS}-${ARCH}.dylib"
          fi
          echo "Staged:"
          ls -lh "${STAGE}/"

      - name: Collect artefacts (Windows)
        if: steps.verify.outputs.completed != 'true' && runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${CARGO_TARGET_DIR:-target}/${{ matrix.target }}/release"
          STAGE="${GITHUB_WORKSPACE}/cabi-stage"
          mkdir -p "${STAGE}"
          ARCH="${{ matrix.artifact-arch }}"
          # MSVC emits blazen_cabi.dll (no `lib` prefix).
          if [ -f "${OUT_DIR}/blazen_cabi.dll" ]; then
            cp "${OUT_DIR}/blazen_cabi.dll" "${STAGE}/libblazen_cabi-windows-${ARCH}.dll"
          fi
          ls -lh "${STAGE}/"

      - name: Upload dynamic (.so / .dylib / .dll)
        if: steps.verify.outputs.completed != 'true'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: libblazen_cabi-${{ matrix.target }}-dynamic
          path: |
            cabi-stage/libblazen_cabi-*.so
            cabi-stage/libblazen_cabi-*.dylib
            cabi-stage/libblazen_cabi-*.dll
          if-no-files-found: warn

      - name: Upload artefacts to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          BASE="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          shopt -s nullglob
          for F in cabi-stage/libblazen_cabi-*; do
            NAME=$(basename "$F")
            URL="${BASE}/${NAME}"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -u "$AUTH" --upload-file "$F" "$URL")
            case "$CODE" in
              200|201) echo "Uploaded ${NAME} (HTTP $CODE)" ;;
              409)
                echo "::warning::${NAME} exists (HTTP 409); deleting and re-uploading"
                curl --fail -s -X DELETE -u "$AUTH" "$URL"
                curl --fail -s -X PUT -u "$AUTH" --upload-file "$F" "$URL"
                ;;
              *) echo "::error::Upload ${NAME} failed (HTTP $CODE)"; exit 1 ;;
            esac
          done

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-cabi-${{ matrix.target }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-swift-xcframework:
    name: Build Swift XCFramework
    needs: version
    # macOS-only — the XCFramework bundles per-Apple-arch static archives that
    # SwiftPM consumers (iOS / macOS apps) link against. If no macos-latest
    # runner is configured on the Forgejo deployment, this job becomes a
    # no-op (other release jobs gate on its presence via job-level `if:` so
    # missing-macos is a warning, not a hard failure).
    runs-on: macos-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: build-swift-xcframework
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Verify artifact present
        id: verify
        uses: https://forge.blackleafdigital.com/Public/actions/verify-artifact@main
        with:
          marker-complete: ${{ steps.check.outputs.completed }}
          version: ${{ needs.version.outputs.version }}
          filename: BlazenFFI.xcframework.zip
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache/blazen-uniffi-xcframework
          registries: '[{"name": "forgejo", "index": "sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/", "token": "${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

      - name: Install system deps
        if: steps.verify.outputs.completed != 'true'
        run: brew install cmake

      - name: Build per-arch static libs
        if: steps.verify.outputs.completed != 'true'
        run: |
          cargo build -p blazen-uniffi --release --target aarch64-apple-darwin
          cargo build -p blazen-uniffi --release --target x86_64-apple-darwin

      - name: Assemble XCFramework
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="${GITHUB_WORKSPACE}/swift-xcframework-stage"
          mkdir -p "${STAGE}/macos-universal"

          # Universal binary covering both macOS architectures. iOS device /
          # simulator slices would require additional rust targets; macOS-only
          # is sufficient for the first Swift release cut.
          lipo -create \
            target/aarch64-apple-darwin/release/libblazen_uniffi.a \
            target/x86_64-apple-darwin/release/libblazen_uniffi.a \
            -output "${STAGE}/macos-universal/libblazen_uniffi.a"

          # Headers — UniFFI emits a C header alongside the swift glue when
          # the Swift binding is regenerated. Source it from the in-tree
          # bindings/swift/Sources/BlazenFFI module map directory.
          HDR_SRC="bindings/swift/Sources/BlazenFFI"
          mkdir -p "${STAGE}/headers"
          if [ -d "${HDR_SRC}" ]; then
            cp -r "${HDR_SRC}/." "${STAGE}/headers/"
          else
            echo "::warning::Expected ${HDR_SRC} not found; XCFramework headers will be missing."
          fi

          xcodebuild -create-xcframework \
            -library "${STAGE}/macos-universal/libblazen_uniffi.a" \
            -headers "${STAGE}/headers" \
            -output "${STAGE}/BlazenFFI.xcframework"

          # Zip for release upload (xcframework is a directory bundle).
          (cd "${STAGE}" && zip -r BlazenFFI.xcframework.zip BlazenFFI.xcframework)
          ls -lh "${STAGE}/"

      - name: Upload XCFramework artefact
        if: steps.verify.outputs.completed != 'true'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: BlazenFFI-xcframework
          path: swift-xcframework-stage/BlazenFFI.xcframework.zip
          if-no-files-found: error

      - name: Upload XCFramework to Forgejo generic package
        if: steps.verify.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/blazen-build/${VERSION}/BlazenFFI.xcframework.zip"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -u "$AUTH" --upload-file "swift-xcframework-stage/BlazenFFI.xcframework.zip" "$URL")
          case "$CODE" in
            200|201) echo "Uploaded (HTTP $CODE)" ;;
            409)
              echo "::warning::Package exists (HTTP 409); deleting and re-uploading"
              curl --fail -s -X DELETE -u "$AUTH" "$URL"
              curl --fail -s -X PUT -u "$AUTH" \
                --upload-file "swift-xcframework-stage/BlazenFFI.xcframework.zip" "$URL"
              ;;
            *) echo "::error::Upload failed (HTTP $CODE)"; exit 1 ;;
          esac

      - name: Mark step complete
        if: steps.verify.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: build-swift-xcframework
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  dispatch-release:
    name: Dispatch Release
    runs-on: ubuntu-latest
    # build-swift-xcframework is intentionally NOT in `needs:` — if the
    # macOS runner is unavailable, the XCFramework is missing but the rest
    # of the release still proceeds; release-swift gates on artefact
    # presence rather than this job's success.
    needs: [version, build-wheels, build-sdist, build-napi, build-wasm, build-uniffi, build-cabi]
    steps:
      - name: Dispatch release.yaml
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          # Dispatch on the in-flight temp branch — the permanent v${VERSION}
          # tag doesn't exist yet, it's cut by release.yaml#create-release
          # only after every publish step succeeds.
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forge.blackleafdigital.com/api/v1/repos/${{ github.repository }}/actions/workflows/release.yaml/dispatches" \
            -d "{\"ref\": \"refs/heads/temp/v${VERSION}\", \"inputs\": {\"version\": \"${VERSION}\"}}"
